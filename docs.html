<style>
:root {
  --bg: #fcfcfc;
  --bg-sidebar: #fafafa;
  --bg-code: #f5f5f5;
  --bg-pre: #fafafa;
  --bg-hover: #f0f0f0;
  --bg-active: #f5f0ff;
  --border: #ebebeb;
  --border-strong: #e0e0e0;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --text-faint: #9b9b9b;
  --accent: #6f4cff;
  --accent-soft: #f1ecff;
  --radius: 8px;
  --radius-sm: 6px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg: #0f0f10;
  --bg-sidebar: #131315;
  --bg-code: #1c1c1f;
  --bg-pre: #18181b;
  --bg-hover: #1f1f22;
  --bg-active: #1f1733;
  --border: #25252a;
  --border-strong: #2e2e34;
  --text: #ededed;
  --text-muted: #9ca3af;
  --text-faint: #6b7280;
  --accent: #a78bfa;
  --accent-soft: #1f1733;
  --shadow: 0 1px 2px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-feature-settings: "cv11", "ss01", "ss03";
  color: var(--text);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#layout { display: flex; height: 100vh; }

/* Sidebar */
#sidebar {
  width: 290px;
  min-width: 290px;
  border-right: 1px solid var(--border);
  background: var(--bg-sidebar);
  overflow-y: auto;
  padding: 24px 0 40px;
  display: flex;
  flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.sidebar-header {
  padding: 0 24px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.4;
}
.theme-toggle {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 7px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.theme-toggle:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-strong); }
#search {
  margin: 0 16px 18px;
  width: calc(100% - 32px);
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
#search::placeholder { color: var(--text-faint); }
#nav { padding-bottom: 20px; }
#nav h2 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin: 22px 24px 6px;
  font-weight: 600;
}
#nav a {
  display: block;
  padding: 6px 24px;
  font-size: 13.5px;
  color: var(--text-muted);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  line-height: 1.5;
}
#nav a:hover { background: var(--bg-hover); color: var(--text); }
#nav a.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

/* Content */
#content {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}
#content::-webkit-scrollbar { width: 8px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
#topbar {
  padding: 14px 64px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-faint);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  position: sticky;
  top: 0;
  background: var(--bg);
  backdrop-filter: blur(8px);
  z-index: 10;
}
#rendered {
  max-width: 760px;
  padding: 48px 64px 120px;
  font-size: 15px;
}

/* Typography */
#rendered h1, #rendered h2, #rendered h3, #rendered h4, #rendered h5 {
  letter-spacing: -0.015em;
  line-height: 1.25;
  color: var(--text);
  font-weight: 600;
}
#rendered h1 {
  font-size: 32px;
  margin: 0 0 0.4em;
  font-weight: 700;
  letter-spacing: -0.025em;
}
#rendered h2 {
  font-size: 22px;
  margin: 2.2em 0 0.6em;
  padding-top: 0.4em;
}
#rendered h3 {
  font-size: 17px;
  margin: 1.8em 0 0.5em;
}
#rendered h4 {
  font-size: 15px;
  margin: 1.4em 0 0.4em;
  color: var(--text-muted);
}
#rendered > h1:first-child { margin-top: 0; }
#rendered p { margin: 0.8em 0; color: var(--text); }
#rendered p, #rendered li { line-height: 1.65; }
#rendered ul, #rendered ol { padding-left: 22px; margin: 0.8em 0; }
#rendered li { margin: 0.3em 0; }
#rendered strong { font-weight: 600; }

/* Inline code */
#rendered code {
  background: var(--bg-code);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  color: var(--text);
  word-break: break-word;
}

/* Code blocks */
#rendered pre {
  background: var(--bg-pre);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  overflow-x: auto;
  margin: 1.2em 0;
  font-size: 13px;
  line-height: 1.55;
  box-shadow: var(--shadow);
}
#rendered pre code {
  background: transparent;
  border: none;
  padding: 0;
  font-size: 13px;
  color: var(--text);
}
#rendered pre::-webkit-scrollbar { height: 8px; }
#rendered pre::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* Tables */
#rendered table {
  border-collapse: collapse;
  margin: 1.4em 0;
  font-size: 13.5px;
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
#rendered th, #rendered td {
  border-bottom: 1px solid var(--border);
  padding: 9px 14px;
  text-align: left;
  vertical-align: top;
}
#rendered tr:last-child td { border-bottom: none; }
#rendered th {
  background: var(--bg-pre);
  font-weight: 600;
  font-size: 12.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
#rendered tr:hover td { background: var(--bg-pre); }

/* Blockquote */
#rendered blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 18px;
  margin: 1.2em 0;
  background: var(--accent-soft);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text);
}
#rendered blockquote p { margin: 0.5em 0; }

/* Links */
#rendered a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
#rendered a:hover { border-bottom-color: var(--accent); }

/* HR */
#rendered hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2.5em 0;
}

@media (max-width: 768px) {
  #sidebar { width: 240px; min-width: 240px; }
  #rendered { padding: 32px 28px 80px; }
  #topbar { padding: 12px 28px; }
}
</style>
</head>

<script>
const DOCS = {"README.md": "# EmbedPress Developer Documentation\n\nWelcome to the EmbedPress developer documentation. This is the **free** plugin \u2014 for the Pro extension, see the corresponding `docs/` folder in the `embedpress-pro` repo.\n\nEmbedPress is a WordPress plugin that turns 250+ external sources (videos, audio, PDFs, calendars, social feeds, maps, documents\u2026) into clean, configurable embeds available as **Gutenberg blocks**, **Elementor widgets**, and the classic **`[embed]` / `[embedpress]` shortcode**.\n\nThis documentation explains **how the plugin is built**, **why it's designed the way it is**, and **how to extend it safely**.\n\n---\n\n## Table of contents\n\n### Architecture\n- [Architecture Overview](architecture/overview.md) \u2014 the 30,000-ft view of the codebase\n- [Data Flow](architecture/data-flow.md) \u2014 how a URL becomes a rendered embed\n- [WordPress Integration](architecture/wordpress-integration.md) \u2014 hooks, lifecycle, autoloading\n- [Free + Pro Coupling](architecture/free-pro-coupling.md) \u2014 how Pro extends the free plugin\n\n### Folder Structure\n- [Folder Reference](architecture/folders.md) \u2014 what every top-level folder does\n\n### Editors\n- [Gutenberg Architecture](gutenberg/README.md)\n- [Elementor Architecture](elementor/README.md)\n- [Classic Shortcode](architecture/shortcode.md)\n\n### Providers\n- [Provider System](providers/README.md) \u2014 adapter pattern, URL routing, embed generation\n- [Adding a New Provider](providers/adding-a-provider.md) \u2014 step-by-step\n- [Provider Catalog](providers/catalog.md) \u2014 every shipped provider, what it does\n\n### Features\n- [Custom Video Player](features/custom-player.md)\n- [PDF Embedder + 3D Flipbook](features/pdf.md)\n- [PDF Gallery](features/pdf-gallery.md)\n- [Document Block (DOC/PPT/XLS)](features/document.md)\n- [Analytics](features/analytics.md)\n- [Social Share](features/social-share.md)\n- [Universal Wrapper / Auto-embed](features/wrapper.md)\n- [Onboarding Wizard](features/onboarding.md)\n\n### APIs & External Integrations\n- [REST API](api/rest.md)\n- [oEmbed Integration](api/oembed.md)\n- [Provider HTTP calls](api/external.md)\n\n### Developer Guides\n- [Coding Standards](guides/coding-standards.md)\n- [Hooks & Filters Reference](guides/hooks-and-filters.md)\n- [Extending EmbedPress](guides/extending.md)\n- [Debugging & Troubleshooting](guides/debugging.md)\n- [Build & Asset Pipeline](guides/build-pipeline.md)\n- [Testing](guides/testing.md)\n\n### Contributing\n- [Local Development Setup](contributing/setup.md)\n- [Pull Request Guidelines](contributing/pull-requests.md)\n- [Release Process](contributing/release.md)\n\n---\n\n## Quick orientation\n\nIf you have **15 minutes** and want to grok the plugin:\n\n1. Read [Architecture Overview](architecture/overview.md) \u2014 explains the four entry points (shortcode, block, widget, auto-embed) and how they all funnel into the same renderer.\n2. Skim [Data Flow](architecture/data-flow.md) \u2014 follow a YouTube URL from paste to rendered iframe.\n3. Open [Provider System](providers/README.md) \u2014 the heart of the plugin. Almost every customer-facing feature lives in or hooks into a Provider.\n\nIf you're **adding a feature**, start with [Extending EmbedPress](guides/extending.md). If you're **fixing a bug**, start with [Debugging](guides/debugging.md).\n\n---\n\n## Conventions used in these docs\n\n- **File paths** are relative to the plugin root (`/Applications/Workspace/GitHub/embedpress/`).\n- **Code snippets** are illustrative \u2014 always cross-check against the actual file before relying on signatures.\n- **\"Pro\"** in italics or in a callout means the behavior described requires the Pro plugin to be active.\n- **PHP namespaces** are written `EmbedPress\\Foo\\Bar` (the leading `\\` from `EMBEDPRESS_NAMESPACE` is omitted in prose for readability).\n\n## Where this documentation lives in the codebase\n\n```\ndocs/\n\u251c\u2500\u2500 README.md              \u2190 you are here\n\u251c\u2500\u2500 architecture/          \u2190 high-level design\n\u251c\u2500\u2500 providers/             \u2190 provider system\n\u251c\u2500\u2500 elementor/             \u2190 Elementor widget internals\n\u251c\u2500\u2500 gutenberg/             \u2190 Gutenberg block internals\n\u251c\u2500\u2500 features/              \u2190 per-feature deep dives\n\u251c\u2500\u2500 api/                   \u2190 REST + external HTTP\n\u251c\u2500\u2500 guides/                \u2190 cross-cutting how-tos\n\u2514\u2500\u2500 contributing/          \u2190 local dev, PRs, release\n```\n\nWhen you ship a feature, **update the matching doc in the same PR**. Documentation that drifts is worse than no documentation.\n\n## Legacy notes\n\nA few pre-existing scratch / issue notes from past tickets live in `docs/legacy/`:\n\n- `legacy/BLOCK_KEY_FIXES.md`\n- `legacy/LOCALIZATION_KEYS.md`\n- `legacy/broken-embeds-detection.md`\n- `legacy/exclude-height-sources.md`\n- `legacy/google-docs-block-standard-structure.md`\n\nThese are kept for historical context only. New documentation goes into the structured subfolders above.\n", "api/external.md": "# External Service Calls\n\nMost providers don't make network calls \u2014 they construct an iframe URL from the user-supplied URL and let the browser do the loading. A few do need server-side fetches.\n\n## Providers that fetch\n\n| Provider | Why it fetches |\n|---|---|\n| **GooglePhotos** | Albums require scraping the share URL to derive the embeddable HTML. |\n| **OpenSea** | Server-side resolves NFT metadata for the widget. |\n| **GettyImages** | Resolves image metadata. |\n| **Wrapper (rare)** | Some Wrapper variants probe the URL to determine content type. |\n\n## Pro-only fetches\n\n| Module | Why |\n|---|---|\n| **Broken Embeds Detector** | HEAD / oEmbed probe to determine if an embedded URL is dead. |\n| **Country Restriction (Custom Player)** | GeoIP lookup for visitor (or via JS) |\n\n## How we make HTTP calls\n\nAlways via `wp_remote_get` / `wp_remote_post` \u2014 never `curl_init` directly. This:\n\n- Respects WP's HTTP API filters.\n- Honors site proxy settings.\n- Lets test suites mock cleanly.\n\n```php\n$response = wp_remote_get($url, [\n    'timeout'    => 5,\n    'redirection'=> 3,\n    'user-agent' => 'Mozilla/5.0 (compatible; EmbedPress/' . EMBEDPRESS_PLUGIN_VERSION . ')',\n]);\n\nif (is_wp_error($response)) {\n    return /* fallback */;\n}\n\n$code = wp_remote_retrieve_response_code($response);\n$body = wp_remote_retrieve_body($response);\n```\n\n## User-Agent string\n\nWe lead with `Mozilla/5.0 (compatible; \u2026)` because some hosts (Cloudflare-fronted, Google) actively block obvious bot UAs. Without the Mozilla prefix you get spurious 403s on URLs that work fine in a browser.\n\n## Error handling\n\nTreat anything except a clean 200 as inconclusive, not broken. The Broken Embeds Detector explicitly maps 401/403/405/406/429/5xx to `STATUS_UNKNOWN` \u2014 only 404 and 410 are confidently \"broken.\" See the [feature notes](../features/) for the rationale.\n\n## Same-origin special-case\n\nSelf-hosted URLs (host matches `home_url()` or `site_url()`) should never be probed. PHP can't reliably reach `localhost:8080` from inside a Docker container, and many production setups have no hairpin NAT. The detector short-circuits same-origin URLs to \"OK / self-hosted-skipped.\"\n\n## Caching\n\nProvider fetches that are deterministic (e.g., Google Photos album HTML) are cached with WP transients. Cache TTL defaults to 12 hours; configurable per provider.\n", "api/oembed.md": "# oEmbed Integration\n\nEmbedPress hooks WordPress's native oEmbed system so that pasted URLs auto-embed in post content **and** so that the editor's oEmbed preview agrees with what the frontend will render.\n\n## How WP's oEmbed works (recap)\n\n1. A URL on its own line in post content triggers WP's auto-embed pass.\n2. WP's `WP_oEmbed` checks the URL against its registered providers list.\n3. If a match exists, WP fetches the oEmbed JSON from that provider and uses the returned HTML.\n\n## How EmbedPress changes that\n\nEmbedPress filters `oembed_providers` (and related filters) to:\n\n- Register every host in `providers.php` as known to WP's oEmbed.\n- Short-circuit the upstream HTTP fetch \u2014 instead, route the URL through our own provider chain (`Core::parseContent`) and return the HTML directly.\n\nThis gives us:\n\n- **Consistency**: a YouTube URL renders the same via auto-embed, shortcode, block, and widget.\n- **No extra HTTP**: we don't double-fetch when our provider already builds the embed locally.\n- **Custom controls applied**: the auto-embedded URL still goes through `Feature_Enhancer`, so site-wide settings (lazy load, share strip, etc.) apply.\n\n## Filters used\n\n| Filter | What we do |\n|---|---|\n| `oembed_providers` | Add EmbedPress-known hosts |\n| `pre_oembed_result` | Short-circuit fetch, return our HTML |\n| `embed_oembed_html` | Final HTML decoration |\n\n## When upstream oEmbed actually runs\n\nFor URLs that don't match any EmbedPress provider, we fall through to WP's normal oEmbed behavior. The Wrapper provider also doesn't go through oEmbed \u2014 it just builds an iframe directly.\n", "api/rest.md": "# REST API\n\nEmbedPress exposes REST endpoints under the `embedpress/v1` namespace, registered across `Core.php` and `EmbedPress/Includes/Classes/Analytics/REST_API.php`.\n\n> The list below was verified by `grep -rn register_rest_route EmbedPress/`. If you add a new route, update this doc in the same PR.\n\n## Authentication\n\n- **Admin endpoints** require capability + nonce (`X-WP-Nonce`).\n- **Public endpoints** (analytics tracker, oembed proxy) accept anonymous calls but are scoped/rate-limited where appropriate.\n\n## Free endpoints\n\n### Embed proxy\n\n| Route | Method | Purpose | Defined in |\n|---|---|---|---|\n| `/embedpress/v1/oembed/{provider}` | GET / POST | Resolve a URL through `Shortcode::parseContent` and return embed HTML \u2014 used by editor previews and as the auto-embed routing target | `EmbedPress/Core.php` ~line 410 |\n\n### Feedback\n\n| Route | Method | Purpose |\n|---|---|---|\n| `/embedpress/v1/send-feedback` | POST | Submit user feedback / rating | `Core.php` ~line 663 |\n\n### Analytics\n\nAll in `EmbedPress/Includes/Classes/Analytics/REST_API.php`. The full list:\n\n| Route | Method | Purpose |\n|---|---|---|\n| `/embedpress/v1/analytics/track` | POST | Frontend tracker writes events |\n| `/embedpress/v1/analytics/data` | GET | Aggregate data for the dashboard |\n| `/embedpress/v1/analytics/content` | GET | Content table (per-post breakdown) |\n| `/embedpress/v1/analytics/views` | GET | View counts |\n| `/embedpress/v1/analytics/spline-chart` | GET | Time-series chart data |\n| `/embedpress/v1/analytics/overview` | GET | Overview cards |\n| `/embedpress/v1/analytics/embed-details` | GET | Per-embed detail panel |\n| `/embedpress/v1/analytics/milestones` | GET / POST | List + persist milestone notifications |\n| `/embedpress/v1/analytics/milestones/read` | POST | Mark milestone read |\n| `/embedpress/v1/analytics/features` | GET / POST | Feature toggle state |\n| `/embedpress/v1/analytics/geo` | GET | Country breakdown (Pro tier extends) |\n| `/embedpress/v1/analytics/device` | GET | Device breakdown |\n| `/embedpress/v1/analytics/browser` | GET | Browser breakdown |\n| `/embedpress/v1/analytics/browser-info` | GET | Detailed browser info |\n| `/embedpress/v1/analytics/unique-viewers-per-embed` | GET | Unique viewers (Pro tier) |\n| `/embedpress/v1/analytics/referral` | GET | Referrer breakdown (Pro tier) |\n| `/embedpress/v1/analytics/export` | GET | CSV / Excel / PDF export |\n| `/embedpress/v1/analytics/email-settings` | GET / POST | Email report config |\n| `/embedpress/v1/analytics/sync-counters` | POST | Reconcile counter rows |\n| `/embedpress/v1/analytics/tracking-setting` | GET / POST | Tracking preferences |\n| `/embedpress/v1/analytics/cleanup-redundant-data` | POST | Maintenance cleanup |\n| `/embedpress/v1/analytics/performance-stats` | GET | Internal performance dashboard |\n\nSeveral routes branch on Pro activation \u2014 Pro-tier capabilities (unique viewers per embed, referral, advanced geo) are gated inside the same handler, not separate Pro routes. See [Analytics](../features/analytics.md).\n\n## Pro endpoints\n\nPro currently does **not** register new feature routes under `embedpress-pro/v1` or anywhere else. The only Pro-side `register_rest_route` call lives in the bundled licensing dependency:\n\n- `includes/Dependencies/WPDeveloper/Licensing/RESTApi.php` \u2014 license activation, deactivation, status. Namespace is dynamic (constructed by `LicenseManager`).\n\nAdding a Pro REST namespace is a real architectural decision; if you need it, raise it explicitly in a design doc rather than just bolting one on.\n\n## Patterns we follow\n\n- **Validate args via `args` schema in `register_rest_route`** \u2014 don't validate in the handler.\n- **Return `WP_Error` with explicit status codes** for failure.\n- **Sanitize input on the way in, escape on the way out**, even for admin-only endpoints.\n- **Nonce check via `permission_callback` only** \u2014 don't sprinkle nonce checks inside handlers.\n\n## Example handler skeleton\n\n```php\nregister_rest_route('embedpress/v1', '/foo', [\n    'methods'  => WP_REST_Server::READABLE,\n    'permission_callback' => function () {\n        return current_user_can('manage_options');\n    },\n    'args' => [\n        'id' => [\n            'required'          => true,\n            'sanitize_callback' => 'absint',\n        ],\n    ],\n    'callback' => function (WP_REST_Request $req) {\n        $id = $req->get_param('id');\n        // \u2026\n        return rest_ensure_response(['ok' => true]);\n    },\n]);\n```\n", "architecture/data-flow.md": "# Data Flow\n\nHow does a URL become a rendered embed? Let's follow one.\n\n> The dispatch entry point you'll see referenced everywhere is **`Shortcode::parseContent`** (in `EmbedPress/Shortcode.php`, ~line 265). Despite the file name, it's not just for shortcodes \u2014 blocks and Elementor widgets call it too.\n\n## Example: a YouTube URL pasted into the EmbedPress block\n\n```\nUser pastes  https://www.youtube.com/watch?v=abc123  into the EmbedPress block.\n```\n\n### 1. Block captures intent (browser)\n\nThe user adds the generic `embedpress/embedpress` block (handles 250+ providers) and types/pastes the URL. Block attributes (autoplay, controls, custom player options, etc.) are stored in post content.\n\n### 2. Server-side render (PHP)\n\nWhen the post renders, WordPress invokes the block's `render_callback`, which is `EmbedPressBlockRenderer::render` for the generic block (per-block callbacks exist for the specialized blocks \u2014 see [Gutenberg](../gutenberg/README.md)).\n\nInside `render`:\n\n1. Read attributes (URL, client ID, options).\n2. Run content-protection gate (`extract_protection_data` + `should_display_content`).\n3. Either render the cached `embedHTML` attribute via `render_embed_html`, or fall through to dynamic rendering.\n4. Dynamic rendering ultimately calls `Shortcode::parseContent($url, true, $atts)`.\n\n### 3. The `parseContent` pipeline\n\n`EmbedPress\\Shortcode::parseContent` is the central URL\u2192HTML transformer.\n\n```\nparseContent($subject, $stripNewLine, $customAttributes)\n    \u2502\n    \u251c\u2500 extract URL from $subject (preg_replace)\n    \u251c\u2500 parseContentAttributes()  \u2014 normalize $atts\n    \u251c\u2500 set_embera_settings()      \u2014 configure the Embera oEmbed lib\n    \u2502\n    \u251c\u2500 apply_filters('embedpress:isEmbra', false, $url, $atts)\n    \u2502       \u2514\u2500 Feature_Enhancer::isEmbra returns true if YouTube/TikTok/Spreaker/GooglePhotos/Wrapper match\n    \u2502\n    \u251c\u2500 if isEmbra:\n    \u2502     route to Embera \u2192 an EmbedPress\\Providers\\* class builds the iframe\n    \u2502   else:\n    \u2502     route to WP_oEmbed::fetch \u2192 upstream oEmbed endpoint\n    \u2502\n    \u251c\u2500 apply_filters('embedpress:onBeforeEmbed', \u2026)   \u2014 pre-process\n    \u251c\u2500 get_url_data() / get_content_from_template()    \u2014 produce HTML, wrap in\n    \u2502       <div class=\"ose-{provider} ose-embedpress-responsive\" \u2026>{html}</div>\n    \u2502\n    \u251c\u2500 apply_filters('pp_embed_parsed_content', \u2026)     \u2014 AMP compat\n    \u251c\u2500 apply_filters('embedpress:onAfterEmbed', \u2026)     \u2014 Feature_Enhancer + Pro decorate\n    \u2502\n    \u2514\u2500 return wrapper + decorated HTML\n```\n\n### 4. Frontend runtime (browser)\n\n`Core/AssetManager.php` enqueues bundles only when an embed marker is present in the page. The `data-options` attribute on `.ep-embed-content-wraper` carries Custom Player JSON that the Plyr runtime parses on `DOMContentLoaded`.\n\n## The other entry points, condensed\n\n### Elementor widget\n\nThe main Elementor widget (`Embedpress_Elementor`, in `EmbedPress/Elementor/Widgets/Embedpress_Elementor.php`, ~4900 lines) collects controls into shortcode-style attributes via `convert_settings`, then in `render` (around line 4533) calls:\n\n```php\n$embed_content = Shortcode::parseContent($settings['embedpress_embeded_link'], true, $_settings);\n```\n\nSo Elementor and Gutenberg both funnel through the same `parseContent`.\n\n### Classic shortcode\n\n`[embedpress]` / `[embed]` are registered to `Shortcode::do_shortcode`, which calls `parseContent` directly.\n\n### Auto-embed\n\nFiltered through WP's oEmbed \u2014 EmbedPress registers itself as the oEmbed provider for every host in `providers.php` and routes the response back through `parseContent` via the REST endpoint `/embedpress/v1/oembed/{provider}` (handled by `RestAPI::oembed`).\n\n## Where Pro hooks in\n\nPro never reaches into Core. It registers filter callbacks during `Bootstrap::__construct()` and lets the free pipeline call them. The most important hook points:\n\n| Hook | Style | Pro use |\n|---|---|---|\n| `embedpress:onAfterEmbed` | colon | Per-provider extenders (`Providers\\Youtube::onAfterEmbed`, etc.) |\n| `embedpress/pro_class`, `embedpress/pro_text` | slash | Drop locked-state styling |\n| `embedpress/is_allow_rander` | slash | License / protection gating |\n| `embedpress/generate_ad_template` | slash | Showcase Ads injection |\n| `embedpress/display_password_form` | slash | Content Protection form |\n| `embedpress/elementor_enhancer_<provider>` | slash | Elementor widget extra controls |\n| `embedpress_enhance_<provider>` | underscore | Provider-specific Pro params |\n\nSee [Free + Pro Coupling](free-pro-coupling.md) and [Hooks Reference](../guides/hooks-and-filters.md) for the full list.\n\n## Mental model: layers, not files\n\nDon't think *\"where does this live?\"* \u2014 think *\"which layer is this?\"* Then the file location follows:\n\n- **User intent** \u2192 editor source (`src/Blocks/...`, `EmbedPress/Elementor/...`)\n- **URL \u2192 provider routing** \u2192 `providers.php` + `Core::getAdditionalServiceProviders` + `Feature_Enhancer::isEmbra`\n- **The actual URL\u2192HTML pipeline** \u2192 **`Shortcode::parseContent`** (regardless of caller)\n- **Provider-specific embed HTML** \u2192 `EmbedPress/Providers/<Name>.php`\n- **Cross-provider decoration** \u2192 `Feature_Enhancer` (free) and `Filters/Feature_Enhancer_Pro` + per-provider Pro extenders\n- **Browser-side behavior** \u2192 `src/Frontend/...` \u2192 `assets/js/...` (enqueued by `Core/AssetManager.php`)\n\nWhen you can't find something, identify the layer first.\n", "architecture/folders.md": "# Folder Reference\n\nWhat every top-level directory contains, why it exists, and where new code belongs.\n\n```\nembedpress/\n\u251c\u2500\u2500 embedpress.php             \u2190 plugin header + bootstrap\n\u251c\u2500\u2500 includes.php               \u2190 constants\n\u251c\u2500\u2500 autoloader.php             \u2190 PSR-style autoload glue\n\u251c\u2500\u2500 providers.php              \u2190 URL host \u2192 Provider class registry\n\u2502\n\u251c\u2500\u2500 EmbedPress/                \u2190 all plugin PHP (root namespace)\n\u2502   \u251c\u2500\u2500 Core.php               \u2190 modern dispatch\n\u2502   \u251c\u2500\u2500 CoreLegacy.php         \u2190 legacy dispatch (don't add here)\n\u2502   \u251c\u2500\u2500 Shortcode.php          \u2190 [embedpress] / [embed] handler\n\u2502   \u251c\u2500\u2500 RestAPI.php            \u2190 REST endpoints\n\u2502   \u251c\u2500\u2500 Compatibility.php      \u2190 misc compat layer\n\u2502   \u251c\u2500\u2500 Providers/             \u2190 one file per upstream source (YouTube, Vimeo\u2026)\n\u2502   \u251c\u2500\u2500 Gutenberg/             \u2190 block server-side render\n\u2502   \u251c\u2500\u2500 Elementor/             \u2190 Elementor integration + widgets\n\u2502   \u251c\u2500\u2500 Ends/                  \u2190 Front + Back loaders\n\u2502   \u251c\u2500\u2500 Analytics/             \u2190 analytics module\n\u2502   \u251c\u2500\u2500 AMP/                   \u2190 AMP plugin compat\n\u2502   \u251c\u2500\u2500 Plugins/               \u2190 compat with other plugins\n\u2502   \u251c\u2500\u2500 ThirdParty/            \u2190 compat shims for popular tools\n\u2502   \u2514\u2500\u2500 Includes/Classes/      \u2190 shared helpers + Feature_Enhancer\n\u2502\n\u251c\u2500\u2500 Core/                      \u2190 legacy \"core\" (pre-EmbedPress namespace era)\n\u2502   \u251c\u2500\u2500 AutoLoader.php         \u2190 used by autoloader.php\n\u2502   \u251c\u2500\u2500 AssetManager.php       \u2190 enqueue manager\n\u2502   \u251c\u2500\u2500 LocalizationManager.php\n\u2502   \u2514\u2500\u2500 init.php\n\u2502\n\u251c\u2500\u2500 src/                       \u2190 all JS/TS source (Vite)\n\u2502   \u251c\u2500\u2500 Blocks/                \u2190 Gutenberg block sources (one folder per block)\n\u2502   \u251c\u2500\u2500 AdminUI/               \u2190 React admin / settings UI\n\u2502   \u251c\u2500\u2500 Frontend/              \u2190 public frontend runtime\n\u2502   \u251c\u2500\u2500 Analytics/             \u2190 analytics tracking JS\n\u2502   \u251c\u2500\u2500 Shared/                \u2190 shared React components\n\u2502   \u2514\u2500\u2500 utils/                 \u2190 cross-cutting JS helpers\n\u2502\n\u251c\u2500\u2500 assets/                    \u2190 built bundles (Vite output, COMMITTED)\n\u251c\u2500\u2500 static/                    \u2190 static assets (CSS, vendored libs like PDF.js, Plyr)\n\u251c\u2500\u2500 languages/                 \u2190 .pot + translations\n\u251c\u2500\u2500 vendor/                    \u2190 Composer (COMMITTED for WP.org)\n\u251c\u2500\u2500 node_modules/              \u2190 (NOT committed)\n\u251c\u2500\u2500 tests/                     \u2190 Playwright E2E + PHPUnit\n\u2514\u2500\u2500 docs/                      \u2190 this documentation\n```\n\n## Major folders, expanded\n\n### `EmbedPress/Providers/`\nEach file is one upstream service. Files extend `\\EmbedPress\\Providers\\Wrapper` (the abstract base) or `Embera\\Adapters\\Service` directly. **Add a new provider here**, then register its host patterns in `providers.php`.\n\nSee [Provider System](../providers/README.md).\n\n### `EmbedPress/Gutenberg/`\n| File | Role |\n|---|---|\n| `BlockManager.php` | Registers blocks with WP |\n| `EmbedPressBlockRenderer.php` | Server-side render callbacks |\n| `FallbackHandler.php` | Renders unknown URLs via Wrapper |\n| `InitBlocks.php` | Boot entry point |\n\n### `EmbedPress/Elementor/`\n| File | Role |\n|---|---|\n| `Embedpress_Elementor_Integration.php` | Registers widgets with Elementor |\n| `Elementor_Upsale.php` | Pro upsell helpers for inactive Pro |\n| `Widgets/Embedpress_Elementor.php` | The main widget (handles every provider) |\n\n### `EmbedPress/Includes/Classes/`\nShared helpers used everywhere. Most important:\n- **`Feature_Enhancer.php`** \u2014 the filter pipeline that decorates provider output. New cross-provider features hook in here.\n- **`Helper.php`** \u2014 utility functions (URL parsing, format detection, escaping helpers).\n\n### `src/Blocks/`\nOne folder per block. Each block folder typically contains:\n```\n<block-name>/\n\u251c\u2500\u2500 index.js          \u2190 register block\n\u251c\u2500\u2500 edit.js           \u2190 editor UI\n\u251c\u2500\u2500 save.js           \u2190 save() \u2014 change with care, see Gutenberg deprecation\n\u251c\u2500\u2500 inspector.js      \u2190 <InspectorControls>\n\u251c\u2500\u2500 block.json        \u2190 block metadata\n\u2514\u2500\u2500 style.scss\n```\n\n### `src/Frontend/`\nThe bundle that runs on visitor pages: player initialization, analytics tracker, lightboxes, etc. Each entry point is built into a separate `assets/*.build.js`.\n\n### `Core/`\nOlder bootstrap helpers. Kept because they're loaded before `EmbedPress\\` autoloading is fully wired (chicken-and-egg: `AutoLoader` itself can't autoload). Don't add new code here unless it absolutely must run before the autoloader registers.\n\n### `static/`\nVendored third-party assets shipped as-is: PDF.js viewer, 3D flipbook, Plyr, polyfills. Updates to these come from upstream \u2014 don't hand-edit.\n\n### `tests/`\n- `tests/playwright/` \u2014 E2E suite split by surface (gutenberg, elementor, classic, dashboard, ui)\n- `tests/phpunit/` \u2014 PHP unit + integration\n\nThe standalone repo `embedpress-playwright-automation` mirrors customer-facing scenarios; the inline suite is for daily dev.\n\n## Where do I put a new feature?\n\n| Feature touches\u2026 | Add code in\u2026 |\n|---|---|\n| One specific provider's URL/embed logic | `EmbedPress/Providers/<Name>.php` |\n| All providers (player, share, lazy load) | `EmbedPress/Includes/Classes/Feature_Enhancer.php` + filter |\n| New Gutenberg block | `src/Blocks/<name>/` + `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php` |\n| New Elementor widget | `EmbedPress/Elementor/Widgets/<Name>.php` (most cases extend the main widget instead) |\n| New REST endpoint | `EmbedPress/RestAPI.php` (or per-feature module) |\n| Frontend behavior on visitor pages | `src/Frontend/` + enqueue in `Core/AssetManager.php` |\n| Admin settings UI | `src/AdminUI/` |\n| Analytics tracking | `src/Analytics/` (JS) + `EmbedPress/Analytics/` (PHP) |\n\n## Build outputs\n\n`npm run build` writes to `assets/`. The mapping from `src/` entry to `assets/` output is defined in `vite.config.js` at the repo root. **Both `src/` and `assets/` are committed** so end users (and WP.org) can install without running Node.\n\n## What's not committed\n\n- `node_modules/`\n- `.env`, `.env.local`\n- `.DS_Store`, IDE folders\n- Vite cache (`.vite/`)\n\nComposer's `vendor/` *is* committed \u2014 required by WP.org because the directory is published as-is.\n", "architecture/free-pro-coupling.md": "# Free + Pro Coupling\n\nPro is a *separate plugin* that requires the free plugin to be active. This document explains the contract that keeps them in sync.\n\n## The rule\n\n> Pro extends free behavior **through filters**. It can ship Provider classes with the same names as free (`Youtube`, `Vimeo`, `Wistia`, \u2026) \u2014 they're not forks; they're extenders that register on `embedpress:onAfterEmbed` and friends via a `featureExtend()` static.\n\n## How Pro discovers free\n\n`embedpress-pro.php` checks for free's classes / constants before booting. Without free, Pro's bootstrap shows an admin notice and bails.\n\n## Boot order\n\n```\nWordPress loads embedpress.php   (free; alphabetical activation order)\n  \u2514\u2500 Core, providers registered, blocks/widgets registered, Feature_Enhancer instantiated\nWordPress loads embedpress-pro.php\n  \u2514\u2500 Embedpress\\Pro\\Classes\\Bootstrap::instance()\n      \u251c\u2500 load_provider() \u2014 instantiates Pro provider extenders, each calling featureExtend()\n      \u2502     which add_filter('embedpress:onAfterEmbed', \u2026)\n      \u251c\u2500 instantiates Pro Filters (Feature_Enhancer_Pro, Utility, Calendar, Calendly,\n      \u2502     GooglePhotos, Elementor_Enhancer_Pro, Youtube)\n      \u251c\u2500 embedpress_plugin_licensing() \u2014 instantiates LicenseManager\n      \u251c\u2500 Pro Elementor extension classes register\n      \u2514\u2500 Pro Gutenberg dist bundles enqueue\n```\n\n## Standard hook slots free exposes\n\nFree defines these so Pro can extend without forking. **Do not remove them** \u2014 Pro silently breaks.\n\n| Hook | Style | Pro callback |\n|---|---|---|\n| `embedpress:isEmbra` | colon | Free's Feature_Enhancer hook returns true for custom-provider URLs |\n| `embedpress:onBeforeEmbed` | colon | Pro pre-processes payloads |\n| `embedpress:onAfterEmbed` | colon | Pro provider extenders + Feature_Enhancer_Pro decorate HTML |\n| `embedpress/pro_class` | slash | Free returns `'pro_class'`, Pro returns `''` |\n| `embedpress/pro_text` | slash | Free returns `'Pro'`, Pro returns `''` |\n| `embedpress/pro_label` | slash | Pro returns `''` |\n| `embedpress/is_allow_rander` | slash | Pro evaluates content-protection / license gates |\n| `embedpress/generate_ad_template` | slash | Pro emits Showcase Ads template |\n| `embedpress/display_password_form` | slash | Pro emits Content Protection form |\n| `embedpress/content_protection_content` | slash | Pro AES-decrypts protected payload |\n| `embedpress/instafeed_*` | slash | Pro Instagram feed fields |\n| `embedpress/calendly_*` | slash | Pro Calendly integration |\n| `embedpress_google_photos_attributes` | underscore | Pro Google Photos attribute mapping |\n| `embedpress_google_helper_shortcode` | underscore | Pro Google Calendar shortcode |\n| `embedpress/elementor_enhancer_<provider>` | slash | Pro Elementor controls per provider |\n| `embedpress_enhance_<provider>` | underscore | Pro provider-specific decoration |\n\nJS-side hooks (`@wordpress/hooks`) follow similar split styles. Free emits placeholder controls via `applyFilters('embedpress.selectPlaceholder', \u2026)` and Pro substitutes real options. Without Pro, the placeholder shows upsell copy.\n\n## Upsell pattern\n\nFree ships UI for many Pro features rendered with a `pro_class` wrapper:\n\n1. Free renders the control inside an element whose class comes from `apply_filters('embedpress/pro_class', 'pro_class')`.\n2. CSS tints the locked control and overlays a \"Pro\" badge.\n3. Free's filter callback returns `'pro_class'`. Pro's filter callback returns `''`.\n4. With Pro active, the wrapper class is empty; styling drops; the control becomes interactive.\n\nSame UI source code powers both the locked and unlocked states.\n\n## What Pro is allowed to do that may surprise you\n\n- **Ship Provider classes named like free's.** `embedpress-pro/includes/Providers/Youtube.php` exists; it doesn't conflict with free's `EmbedPress/Providers/Youtube.php` because the namespaces differ (`Embedpress\\Pro\\Providers\\Youtube` vs `EmbedPress\\Providers\\Youtube`) and the Pro one only registers filter callbacks \u2014 it never gets routed to by Embera.\n- **Hook the same filter from multiple Pro callbacks.** Pro's per-provider extenders + Feature_Enhancer_Pro can both hook `embedpress:onAfterEmbed`. Priorities determine order.\n\n## Anti-patterns\n\n- **Don't `require` a free file from Pro.** Use class lookups + filter hooks.\n- **Don't redefine free constants in Pro.** Free is loaded first and owns them.\n- **Don't write to free option keys from Pro.** All Pro state goes under `embedpress_pro_*`.\n- **Don't add a Pro REST namespace for features.** Pro currently only ships license routes via the bundled `WPDeveloper\\Licensing\\RESTApi`. New routes should be discussed before adding a separate namespace.\n\n## When you change a free hook signature\n\nAdding parameters is safe. Removing or reordering breaks Pro silently. If you must change a signature:\n\n1. Keep the old hook firing with the old signature.\n2. Add a new hook with the new signature.\n3. Open a tracking ticket to migrate Pro to the new hook.\n4. After Pro ships the migration, remove the old hook in a major version.\n", "architecture/overview.md": "# Architecture Overview\n\nThis document is the 30,000-ft view. Read it first.\n\n## What EmbedPress is, in one paragraph\n\nEmbedPress is a **provider-driven embed engine** for WordPress. Users paste a URL (or pick a block / widget / shortcode), and EmbedPress figures out which \"provider\" the URL belongs to, asks that provider for the embed HTML (via the bundled Embera oEmbed library or WP's native `WP_oEmbed::fetch`), decorates it with optional UI (custom player, social share, lazy-load, branding\u2026), and returns the result. The same `Shortcode::parseContent` pipeline answers all four surfaces (Gutenberg, Elementor, classic shortcode, auto-embed), so a YouTube embed renders identically regardless of how you placed it.\n\n## Core goals\n\n1. **One source of truth per provider.** The logic that turns a YouTube URL into an iframe lives in **one** place \u2014 `EmbedPress/Providers/Youtube.php`. Every editor surface delegates to it through `Shortcode::parseContent`.\n2. **Editor-agnostic rendering.** A block, widget, and shortcode all produce the same final HTML.\n3. **Safe extensibility for Pro.** Pro doesn't fork free providers \u2014 it ships matching extender classes (in `embedpress-pro/includes/Providers/*.php`) that hook the free filter pipeline (`embedpress:onAfterEmbed`, etc.).\n4. **WordPress.org-friendly distribution.** `vendor/`, `assets/`, and built `Gutenberg/dist/` are committed.\n\n## The four entry points\n\nA user can produce an embed in four ways. They all funnel into the same pipeline.\n\n```\n                \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n  Editor \u2192      \u2502  Gutenberg blocks                   \u2502\n                \u2502  (7 server-rendered + 7 client-only,\u2502 \u2500\u2500\u2510\n                \u2502   see Gutenberg docs)               \u2502   \u2502\n                \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502\n                \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502\n  Editor \u2192      \u2502  Elementor widgets (5)              \u2502   \u2502\n                \u2502  embedpres_elementor / pdf / doc /  \u2502 \u2500\u2500\u2524\n                \u2502  pdf_gallery / calendar             \u2502   \u2502\n                \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502\n                \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502\n  Content \u2192     \u2502  Shortcodes:                        \u2502   \u251c\u2500\u2500\u2192  EmbedPress\\Shortcode::parseContent\n                \u2502  [embed]  [embedpress]              \u2502 \u2500\u2500\u2524      \u251c\u2500 extract URL + atts\n                \u2502  [embedpress_pdf]  [embedpress_doc] \u2502   \u2502      \u251c\u2500 embedpress:isEmbra dispatch\n                \u2502  [embedpress_pdf_gallery]           \u2502   \u2502      \u251c\u2500 Embera or WP_oEmbed\n                \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502      \u251c\u2500 embedpress:onBeforeEmbed\n                \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502      \u251c\u2500 provider builds HTML\n  Content \u2192     \u2502  REST /embedpress/v1/oembed/{prov.} \u2502   \u2502      \u251c\u2500 embedpress:onAfterEmbed\n                \u2502  (called by WP auto-embed)          \u2502 \u2500\u2500\u2518      \u2514\u2500 wrapped HTML returned\n                \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518                    \u2193\n                                                              \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                                                              \u2502  EmbedPress\\Providers  \u2502\n                                                              \u2502  selected via Embera   \u2502\n                                                              \u2502  + isEmbra filter      \u2502\n                                                              \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                                                          \u2193\n                                                              Frontend JS (Plyr, PDF.js,\n                                                              flipbook, analytics, etc.)\n```\n\n## Layers\n\n| Layer | Lives in | Responsibility |\n|---|---|---|\n| **Editor surfaces** | `src/Blocks/`, `EmbedPress/Elementor/`, `EmbedPress/Shortcode.php` | Capture user intent, attributes, and URL |\n| **URL\u2192HTML pipeline** | `EmbedPress/Shortcode.php::parseContent` | Resolve URL \u2192 provider, run filters, return HTML |\n| **Provider classes** | `EmbedPress/Providers/*` | Provider-specific URL parsing + embed generation (called via Embera) |\n| **Decoration pipeline** | `EmbedPress/Includes/Classes/Feature_Enhancer.php` (+ Pro extenders) | Decorate provider output via `embedpress:onAfterEmbed` |\n| **Frontend runtime** | `assets/js/*` (built from `src/Frontend/` and `src/Blocks/`) | Player init, analytics ping, lightboxes, lazy load |\n\nEditor surfaces never call Provider classes directly \u2014 they call `Shortcode::parseContent`. Provider classes don't know which editor surface called them \u2014 they just take a URL and return HTML.\n\n## Why two `Core` classes?\n\n`EmbedPress/Core.php` is the **modern (WP 5+ block editor)** path. `EmbedPress/CoreLegacy.php` is the **WP < 5.0 (TinyMCE)** path. The bootstrap (`embedpress.php` ~line 115) detects the WP version and the active editor and instantiates one or the other. CoreLegacy adds a `configureTinyMCE` action and disables some default rewrite rules; it does not exist for \"old shortcodes\" \u2014 both Cores delegate the actual URL\u2192HTML work to `Shortcode::parseContent`.\n\n## Free vs. Pro\n\nPro is a separate plugin (`embedpress-pro`) that **requires the free plugin to be active**. Pro:\n\n- Boots via `Embedpress\\Pro\\Classes\\Bootstrap::instance()` (singleton).\n- Ships its own Provider classes in `includes/Providers/` (Youtube, Vimeo, Wistia, Twitch, Dailymotion, Soundcloud, Document, Meetup) that **extend free providers' behavior** by registering callbacks on `embedpress:onAfterEmbed` / `embedpress:onBeforeEmbed` via a `featureExtend()` static.\n- Registers cross-cutting filters in `includes/Filters/*` (`Feature_Enhancer_Pro`, `Utility`, `Calendar`, `Calendly`, `GooglePhotos`, `Elementor_Enhancer_Pro`, `Youtube`).\n- Does **not** add a custom REST namespace \u2014 only the bundled `WPDeveloper\\Licensing\\RESTApi` for license operations.\n- Does **not** create custom DB tables \u2014 Pro state lives in `wp_options` under the `embedpress_pro_*` prefix.\n\nSee [Free + Pro Coupling](free-pro-coupling.md) for the contract.\n\n## Frontend asset philosophy\n\nSource code lives in `src/`, built with **Vite** to `assets/`. Both source and build outputs are committed because WP.org users install the zip and never run `npm`. `Core/AssetManager.php` enqueues conditionally based on the embed types detected on the page.\n\n## What you should never do\n\n- **Never call a Provider class from a block or widget directly.** Go through `Shortcode::parseContent`.\n- **Never copy free Provider logic into Pro.** Use `featureExtend()` + the `embedpress:onAfterEmbed` filter (this is what Pro's existing extenders already do).\n- **Never change a Gutenberg block's `save()` output without a `deprecated[]` entry.** Old posts will refuse to render. See [Gutenberg](../gutenberg/README.md#deprecation-discipline).\n- **Never widen a provider URL regex without testing other providers.** Greedy regexes silently steal embeds from neighbors.\n\n## Continue reading\n\n- [Data Flow](data-flow.md) \u2014 trace one URL from paste to render\n- [Folder Reference](folders.md) \u2014 what each directory holds\n- [Provider System](../providers/README.md) \u2014 the layer most contributions touch\n", "architecture/shortcode.md": "# Classic Shortcodes\n\nShortcodes are the original entry point. Five are registered.\n\n## Registered shortcodes\n\nIn `EmbedPress\\Shortcode::register()` (around line 79):\n\n| Shortcode | Handler | Purpose |\n|---|---|---|\n| `[embed]` | `Shortcode::do_shortcode` | WP-core compatibility \u2014 overrides core's `[embed]` so EmbedPress's pipeline runs |\n| `[embed_oembed_html]` | `Shortcode::do_shortcode` | Internal alias used during oEmbed result processing |\n| `[embedpress]` | `Shortcode::do_shortcode` | Primary shortcode \u2014 generic for any provider |\n| `[embedpress_pdf]` | `Shortcode::do_shortcode_pdf` | Dedicated PDF viewer (PDF.js or 3D flipbook) |\n| `[embedpress_doc]` | `Shortcode::do_shortcode_doc` | DOC / DOCX / PPT / PPTX / XLS / XLSX viewer |\n| `[embedpress_pdf_gallery]` | `Shortcode::do_shortcode_pdf_gallery` | Multi-PDF gallery with carousel/grid layout |\n\n## Forms\n\n```\n[embedpress]https://www.youtube.com/watch?v=abc123[/embedpress]\n\n[embedpress width=\"640\" height=\"360\"]https://vimeo.com/123[/embedpress]\n\n[embed]https://youtu.be/abc123[/embed]\n\n[embedpress_pdf src=\"https://example.com/file.pdf\" width=\"600\" height=\"700\"]\n\n[embedpress_doc src=\"https://example.com/file.pptx\"]\n\n[embedpress_pdf_gallery ...]\n```\n\n## Generic dispatch flow\n\n`do_shortcode($atts, $subject)` (around line 172):\n\n1. Parse ACF dynamic fields if any (lines 193\u2013206).\n2. Call `parseContent($subject, $stripNewLine, $atts)`.\n3. If content protection is on, short-circuit early (lines 231\u2013242).\n4. Return wrapped HTML.\n\n`parseContent` is the central pipeline \u2014 see [Data Flow](data-flow.md).\n\n## Specialized shortcode flows\n\n`do_shortcode_pdf` (lines 1312\u20131494) and `do_shortcode_doc` (lines 1496\u20131606) bypass `parseContent` and emit dedicated viewer iframes directly (PDF.js viewer URL, Google Docs Viewer URL, Office Online when Pro is active). They handle their own attribute set (toolbar position, theme color, watermark, draw, copy, download toggles\u2026).\n\n`do_shortcode_pdf_gallery` (lines 1608\u20131812) renders a list of PDFs in a carousel/grid wrapper with a lightbox modal \u2014 same approach.\n\n## Why we still ship classic shortcodes\n\nCustomer posts written in 2017 still embed via shortcode. Removing the handler would silently break those posts. The maintenance cost is low because the generic path (`[embedpress]` / `[embed]`) reuses the same `parseContent` that blocks and Elementor use.\n", "architecture/wordpress-integration.md": "# WordPress Integration\n\nHow EmbedPress plugs into the WordPress lifecycle.\n\n## Plugin bootstrap order\n\n`embedpress.php` is the only file WordPress directly loads. From there:\n\n```\nembedpress.php\n  \u251c\u2500 defines EMBEDPRESS_PLUGIN_VERSION (4.5.1), EMBEDPRESS_FILE,\n  \u2502           EMBEDPRESS_PLUGIN_BASENAME, EMBEDPRESS_PLUGIN_DIR_PATH,\n  \u2502           EMBEDPRESS_PLUGIN_URL, EMBEDPRESS_GUTENBERG_DIR_URL,\n  \u2502           EMBEDPRESS_SETTINGS_ASSETS_URL\n  \u251c\u2500 require_once includes.php\n  \u2502     \u2514\u2500 defines EMBEDPRESS, EMBEDPRESS_PLG_NAME, EMBEDPRESS_VERSION,\n  \u2502       EMBEDPRESS_PATH_BASE, EMBEDPRESS_PATH_CORE, EMBEDPRESS_URL_ASSETS,\n  \u2502       EMBEDPRESS_URL_STATIC, EMBEDPRESS_SHORTCODE, EMBEDPRESS_LICENSES_API_HOST\n  \u2502     \u2514\u2500 Composer autoload, plus utility functions:\n  \u2502       embedpress_cache_cleanup, embedpress_schedule_cache_cleanup,\n  \u2502       is_embedpress_pro_active, get_embedpress_pro_version, stringToBoolean\n  \u251c\u2500 require_once autoloader.php\n  \u2502     \u2514\u2500 AutoLoader::register('EmbedPress', EMBEDPRESS_PATH_CORE)      \u2192 EmbedPress/\n  \u2502     \u2514\u2500 AutoLoader::register('EmbedPress\\\\Src', EMBEDPRESS_PATH_BASE.'src/')\n  \u251c\u2500 require_once providers.php\n  \u2502     \u2514\u2500 builds $additionalServiceProviders (26 providers)\n  \u2514\u2500 around line 115 \u2014 branch by WP version + active editor:\n       \u251c\u2500 WP 5+ with block editor \u2192 Core::initialize()\n       \u2514\u2500 WP < 5.0 (TinyMCE)      \u2192 CoreLegacy::initialize()\n       both then:\n         \u251c\u2500 Feature_Enhancer instantiated\n         \u251c\u2500 Helper instantiated\n         \u251c\u2500 Analytics_Manager instantiated (\u2248line 152)\n         \u251c\u2500 Shortcode::register() (\u2248line 160)\n         \u2514\u2500 Embedpress_Elementor_Integration if Elementor active (\u2248line 156)\n```\n\n## Hooks EmbedPress relies on\n\n| WP hook | What EmbedPress does |\n|---|---|\n| `plugins_loaded` | Boot Core / CoreLegacy + Feature_Enhancer |\n| `init` | Register Gutenberg blocks (via `BlockManager`) |\n| `rest_api_init` | Register REST routes (oembed proxy, analytics, send-feedback) |\n| `enqueue_block_editor_assets` | Editor JS for blocks |\n| `wp_enqueue_scripts` | Frontend runtime (player, analytics, viewer assets) |\n| `admin_enqueue_scripts` | Admin UI (settings, analytics dashboard) |\n| `oembed_providers` | Register EmbedPress-known hosts as oEmbed providers |\n| `pre_oembed_result` (effectively, via REST) | Route to EmbedPress's pipeline |\n| `embedpress_cache_cleanup_action` | Daily cron \u2014 clean `/wp-content/uploads/embedpress/` |\n| `pp_embed_parsed_content` | AMP plugin compatibility |\n| `fl_builder_before_render_shortcodes` | Beaver Builder support |\n\n## Constants you'll see everywhere\n\n| Constant | Defined in | Meaning |\n|---|---|---|\n| `EMBEDPRESS_PATH_BASE` | `includes.php` | Plugin root |\n| `EMBEDPRESS_PATH_CORE` | `includes.php` | `EMBEDPRESS_PATH_BASE . 'EmbedPress/'` |\n| `EMBEDPRESS_URL_ASSETS` | `includes.php` | URL to `assets/` |\n| `EMBEDPRESS_URL_STATIC` | `includes.php` | URL to `static/` |\n| `EMBEDPRESS_NAMESPACE` | (older code uses `'\\\\EmbedPress'`) | Used in providers.php |\n| `EMBEDPRESS_PLUGIN_VERSION` | `embedpress.php` | The real version (cache-bust source) |\n| `EMBEDPRESS_FILE` | `embedpress.php` | Bootstrap file path |\n| `EMBEDPRESS_LICENSES_API_HOST` | `includes.php` | `embedpress.com` |\n\n## Autoloading\n\n`Core/AutoLoader.php` is a small PSR-style loader. `autoloader.php` registers two namespace roots:\n\n- `EmbedPress\\` \u2192 `EmbedPress/`\n- `EmbedPress\\Src\\` \u2192 `src/`\n\nClass `EmbedPress\\Providers\\Youtube` resolves to `EmbedPress/Providers/Youtube.php`. **File names must match class names exactly** \u2014 autoloading is case-sensitive.\n\nComposer autoload also runs (via `includes.php`) for vendor libs (Embera, license SDK, etc.). Both autoloaders coexist.\n\n## Settings storage\n\nEmbedPress options live in `wp_options`:\n\n- `embedpress` \u2014 main settings (read by `Core::getSettings`)\n- `embedpress_settings` \u2014 secondary settings keys (used by some features)\n- per-feature keys (analytics email settings, tracking settings, etc.)\n\nDefaults from `Core::getSettings`:\n\n```\nenablePluginInAdmin, enablePluginInFront,\nenableGlobalEmbedResize, default sizes 600 \u00d7 550\n```\n\n## Database\n\nFree EmbedPress's **Analytics module** creates custom tables (in `EmbedPress/Includes/Classes/Analytics/`). Other features use options or post meta. Pro adds **no** custom tables.\n\n## Multisite\n\nPer-site options. Activation hook runs per blog. Tested on subsite, subdirectory, and subdomain.\n\n## Compatibility shims\n\n`EmbedPress/Plugins/`, `EmbedPress/ThirdParty/`, and `EmbedPress/AMP/` hold conditional compatibility code for popular plugins / frameworks (Elementor's loop builder, AMP, Beaver Builder, page builders). Loaded on-demand.\n", "contributing/pull-requests.md": "# Pull Request Guidelines\n\nWhat we expect in a PR before review.\n\n## Before opening\n\n- [ ] Branch named `fix/...` (bug), `feat/...` (feature), `chore/...` (maintenance), or `docs/...` (docs only).\n- [ ] Commit messages explain the *why*, not just the *what*. One change per commit when practical.\n- [ ] `npm run type-check && npm run lint && npm run test` passes locally.\n- [ ] If the PR touches a block's `save()`, a `deprecated[]` entry is included.\n- [ ] If the PR adds a feature, the relevant doc in `docs/` is updated **in the same PR**.\n- [ ] If the PR touches anything provider-related, the provider E2E suite passes.\n\n## PR description should include\n\n1. **What** changed (one-paragraph summary).\n2. **Why** \u2014 the user-visible problem or motivation.\n3. **How to test** \u2014 explicit reproduction steps.\n4. **Risk surface** \u2014 what could break, and what we tested to confirm it doesn't.\n\nIf a card exists in FluentBoards (or the Zoobbe board for legacy work), link it.\n\n## Code review checklist\n\nReviewers will check:\n\n- Does it follow the layer model? (Editor \u2192 Core \u2192 Provider \u2192 Feature_Enhancer \u2192 Frontend)\n- Does it avoid duplicating logic between free and Pro?\n- Is the security checklist met? (escape on output, sanitize on input, nonce on REST)\n- Are user-facing strings translatable?\n- Does it have tests proportional to the risk?\n- Does it touch all five `isSelfHostedVideo` copies if relevant?\n- Are deprecations honored on block save() changes?\n\n## Size guidance\n\n- **< 200 LOC** changes: usually fine to ship as a single PR.\n- **200\u2013600 LOC**: consider splitting into setup + behavior + UI.\n- **> 600 LOC**: split. Reviewers will ask anyway.\n\n## After merge\n\n- The release manager picks up the change. Don't bump version numbers in feature PRs unless instructed \u2014 release happens in batched bumps.\n- If your change requires a doc-update in `docs/`, ensure it's in this PR; don't leave it for later.\n\n## What gets a PR rejected outright\n\n- Forking free code into Pro (instead of using a filter).\n- Block `save()` change without a deprecation entry.\n- Hand-modified bundles in `assets/` (always rebuild from source).\n- New `vendor/` libs without provenance.\n- Translatable strings that aren't translatable.\n- Bypassed nonce checks \"because it's admin only.\"\n", "contributing/release.md": "# Release Process\n\nHow a free EmbedPress release ships to WP.org.\n\n## When\n\nWe cut **patch releases (4.x.y)** as needed for bug fixes, **minor (4.x.0)** for new features. Pro versions independently.\n\n## Release plan source\n\nThere's an `embedpress-release-plan.txt` at the docker repo root capturing the current scope. Read it before doing anything.\n\n## Steps (free)\n\nThere's a guided skill for this \u2014 invoke `/embedpress-release` and it'll walk through:\n\n1. Bump version in:\n   - `embedpress.php` (the `Version:` header)\n   - `includes.php` (the `EMBEDPRESS_PLUGIN_VERSION` constant)\n   - `package.json`\n   - `readme.txt` (`Stable tag:`)\n2. Generate the changelog from git history (commits + merges + FluentBoards card titles).\n3. Regenerate `languages/embedpress.pot` (`npm run pot`).\n4. Run the full test suite.\n\nThe skill **stops before** any shared / destructive action (commit, tag, push, SVN). Those are humans-only.\n\n## Manual checklist after the skill stops\n\n- [ ] Eyeball the changelog \u2014 does it read right for customers?\n- [ ] Smoke-test on a fresh WP install: `make destroy && make setup`.\n- [ ] Verify `vendor/` is production (`composer install --no-dev`).\n- [ ] Verify `assets/` is freshly built (`npm run build`).\n- [ ] Tag the release: `git tag v4.x.y && git push origin v4.x.y`.\n- [ ] Push to SVN (WP.org) \u2014 manual, by the release manager.\n\n## Pro release\n\n`/embedpress-pro-release` is the equivalent skill. Pro versions independently and ships via EDD, not WP.org.\n\n## Why we have so many version locations\n\nWP.org reads:\n- `Stable tag` from `readme.txt` to decide which folder to publish.\n- `Version:` from `embedpress.php` for the plugin header.\n- The internal `EMBEDPRESS_PLUGIN_VERSION` constant is what we use for asset cache-busting and version checks.\n- `package.json` is the JS world's source of truth.\n\nIf any one of these drifts, customers see weird behavior \u2014 old bundles, mismatched displayed version, or WP.org refusing to publish. Always bump them together.\n\n## Asset cache gotcha\n\nIf `EMBEDPRESS_PLUGIN_VERSION` doesn't bump, browsers cache the previous bundle and Pro features may silently break for users who already loaded the prior version. Bump diligently.\n", "contributing/setup.md": "# Local Development Setup\n\nUse the docker stack \u2014 it gives you WP + WP-CLI + Elementor + the plugin bind-mounted.\n\n## Requirements\n\n- Docker Desktop (or compatible)\n- Node \u2265 20, npm \u2265 10\n- Composer 2\n\n## First-time setup\n\n```bash\ngit clone git@github.com:wpdevteam/embedpress.git\ngit clone git@github.com:wpdevteam/embedpress-pro.git\ngit clone git@github.com:wpdevteam/embedpress-docker.git\n\ncd embedpress-docker\ncp .env.example .env\n# Edit .env: set PLUGIN_PATH=/Applications/Workspace/GitHub/embedpress (or wherever you cloned)\n\nmake setup       # builds containers, installs WP, activates plugin + Elementor\n```\n\nWordPress will be running at `http://localhost:8080` with admin / admin.\n\n## Day-to-day\n\n```bash\nmake up                  # start\nmake down                # stop\nmake restart\nmake logs                # tail\nmake shell               # bash inside wordpress container\nmake wp ARG=\"plugin list\"\n\n# JS dev\nmake npm-install\nmake npm-start           # vite watch in container\n# or run directly on host if you prefer:\ncd /path/to/embedpress\nnpm install\nnpm run start\n\n# Tests\nmake test\nmake test-js / test-js-ui / test-php / test-php-unit / test-php-integration\nmake lint / lint-fix\n\n# DB\nmake db-export\nmake db-import\nmake db-reset\nmake seed                # reload seed data\n```\n\n## Activating Pro\n\nThe docker stack symlinks both plugins (free + pro) into the WP plugins folder. `make setup` activates free. Activate Pro from `wp-admin \u2192 Plugins` or:\n\n```bash\nmake wp ARG=\"plugin activate embedpress-pro\"\n```\n\n## Working on JS\n\n`npm run start` (Vite watch) rebuilds on save. The wordpress container bind-mounts the plugin source, so the built files in `assets/` are immediately picked up.\n\nFor unminified output during dev, set `define('SCRIPT_DEBUG', true)` in `wp-config.php`.\n\n## Working on PHP\n\nJust edit. PHP is loaded fresh on every request \u2014 no restart needed.\n\n## Sample data\n\n`make seed` loads a set of fixtures: posts with each provider, a sample analytics dataset, etc. Use this to smoke-test changes against realistic content.\n", "elementor/README.md": "# Elementor Architecture\n\nHow EmbedPress integrates with the Elementor page builder.\n\n## What ships\n\nFive Elementor widgets, all registered via `Embedpress_Elementor_Integration::register_widget()` (in `EmbedPress/Elementor/Embedpress_Elementor_Integration.php`). All extend `\\Elementor\\Widget_Base` directly \u2014 there is **no inheritance** between them.\n\n| Widget file | `get_name()` | Role |\n|---|---|---|\n| `Widgets/Embedpress_Elementor.php` (~4900 lines) | `embedpres_elementor` | Multi-provider main widget (16+ providers) |\n| `Widgets/Embedpress_Document.php` | `embedpres_document` | DOC / PPT / XLS via Google Docs Viewer |\n| `Widgets/Embedpress_Pdf.php` | `embedpress_pdf` | Dedicated PDF (PDF.js / flipbook) |\n| `Widgets/Embedpress_Pdf_Gallery.php` | `embedpress_pdf_gallery` | PDF gallery with thumbnail generation |\n| `Widgets/Embedpress_Calendar.php` | `embedpress_calendar` | Google Calendar via FullCalendar |\n\n> Note the `embedpres_elementor` and `embedpres_document` typos (missing 's'). Preserved for back-compat \u2014 do not \"fix.\"\n\nRegistration is gated per-widget by the `embedpress:elements[elementor]` option, so users can disable individual widgets from settings.\n\n## Anatomy of the main widget\n\n`Embedpress_Elementor.php` is the largest file in the plugin (~4900 lines) because **every supported provider's controls live in it**. It does not delegate per-provider widgets; it has one big `register_controls()` with **provider-centric sections** organized roughly:\n\n```\nregister_controls()\n    embedpress_elementor_content_settings        (general \u2014 source dropdown, URL)\n    embedpress_yt_channel_section                (YouTube)\n    embedpress_yt_subscription_section           (YouTube subscriber button)\n    embedpress_yt_livechat_section               (YouTube live chat \u2014 Pro)\n    embedpress_opensea_control_section           (OpenSea)\n    (Vimeo / SoundCloud / Instagram / Twitch / Dailymotion / Wistia / Meetup\n     / Calendly / Spreaker / Google Photos / self-hosted / Spotify / Apple Podcasts)\n    embedpress_protect_content_section           (Content Protection)\n    embedpress_share_content_section             (Social Share)\n    embedpress_custom_player_settings            (Plyr Custom Player)\n    embedpress_gallery_setting_section           (Gallery / grid)\n    embedpress_responsive_design_section         (Mobile / tablet sizing)\n    embedpress_advanced_setting_section\n    (style sections \u2014 borders, shadows, etc.)\n```\n\nMost provider sections show only when the user-pasted URL matches that provider. Elementor renders this with `condition` arrays per control.\n\n### Render\n\n`Embedpress_Elementor::render()` (around line 4414) is a thin presentation layer over `Shortcode::parseContent`:\n\n```php\n$_settings    = $this->convert_settings($settings);\n$source_data  = Helper::get_source_data(/* \u2026 */);\n$embed_content = Shortcode::parseContent($settings['embedpress_embeded_link'], true, $_settings);\n$embed_content = $this->onAfterEmbedSpotify($embed_content, $settings);\n$embed         = apply_filters('embedpress_elementor_embed', $embed_content, $settings);\n```\n\nThe widget converts Elementor controls to shortcode-style attributes via `convert_settings`, then hands off to the same `parseContent` pipeline that powers blocks and shortcodes.\n\n### Pro upsell wrapping\n\nPro-only controls are rendered with a CSS class derived from `apply_filters('embedpress/pro_class', 'pro_class')`. Free's filter returns `'pro_class'`; Pro's returns `''`. Same control source, different visual state based on whether Pro is active.\n\n## Specialized widgets\n\nThe four specialized widgets are independent \u2014 they don't share code with the main widget:\n\n- **`Embedpress_Document`** \u2014 multi-format docs via iframe (Google Docs Viewer or Office Online when Pro is active).\n- **`Embedpress_Pdf`** \u2014 PDF.js + 3D flipbook mode; supports media library upload + external URL.\n- **`Embedpress_Pdf_Gallery`** \u2014 multi-PDF gallery with thumbnail generation (Imagick / WP preview) and grid/carousel layout.\n- **`Embedpress_Calendar`** \u2014 FullCalendar4 + Google Calendar ICS parsing.\n\nEach defines its own `register_controls()` and `render()` \u2014 they don't go through `Shortcode::parseContent` because they don't need provider routing.\n\n## Pro extension\n\nPro's Elementor extension lives in `embedpress-pro/includes/Elementor/` and `embedpress-pro/includes/Filters/Elementor_Enhancer_Pro.php`. Pro hooks per-widget Elementor extension points (`elementor/element/embedpres_elementor/section_*/before_section_end`) plus `embedpress/elementor_enhancer_<provider>` to inject Pro controls \u2014 it never edits the free widget files.\n\n## Elementor_Upsale\n\n`EmbedPress/Elementor/Elementor_Upsale.php` injects an upsell sidebar in the Elementor editor: 5-star rating, mini analytics pie-chart, \"Upgrade to Pro\" CTA, \"Let's Chat\" support button. Loaded on `elementor/editor/after_enqueue_scripts`.\n\n## Adding a new control\n\n1. Decide which `register_*_section` it belongs to in `Embedpress_Elementor.php`.\n2. Add `$this->add_control(...)` with conditions for when it should show.\n3. Map it in `convert_settings()` so it ends up in the shortcode-style attribute array.\n4. Implement the actual behavior in `Feature_Enhancer` (free) or as a Pro filter callback.\n5. If it's Pro-only, set `'classes' => apply_filters('embedpress/pro_class', 'pro_class')` and ship the live implementation in Pro.\n\n## Common gotchas\n\n- **Widget names use the typo'd `embedpres_*` form.** Don't silently rename \u2014 existing customer pages reference the typo'd names.\n- **Elementor control key `custom_payer_preset`** is also misspelled (in the YouTube preset section, ~line 378). Same back-compat reason.\n- **OpenSea `ep-preset-1` / `-2` classes** at ~line 1915 are unrelated to the Custom Player presets. Don't conflate.\n- **Specialized widgets don't extend the main one.** If you're tempted to share code, factor into a trait under `EmbedPress/Elementor/Traits/`.\n", "features/analytics.md": "# Analytics\n\nA first-party analytics system that records every embed interaction (impression, click, view, play, pause, complete) and rolls it up into a React dashboard with overview cards, time-series chart, world map, browser/device pies, top-referrers list, milestone notifications, and CSV/PDF/Excel export.\n\nBuilt entirely on `wpdb` (no third-party services). Tracker fingerprints clients via canvas + WebGL hashes (no PII). Cookies: `ep_user_id` (30-day) + `ep_session_id` (session).\n\n## Free vs Pro\n\n| Capability | Free | Pro |\n|---|---|---|\n| Total views / clicks / impressions | \u2713 | \u2713 |\n| Total unique viewers (aggregate) | \u2713 | \u2713 |\n| Per-embed breakdown | \u2013 | \u2713 |\n| Unique viewers per embed | \u2013 | \u2713 |\n| Geo (country / region) | \u2013 | \u2713 |\n| Device + browser breakdown | \u2013 | \u2713 |\n| Referrer + UTM | \u2013 | \u2713 |\n| Milestones (100, 500, 1K, 5K, 10K+) | \u2713 | \u2713 |\n| Email reports (weekly / monthly) | \u2013 | \u2713 |\n| Advanced charts | \u2013 | \u2713 |\n| CSV export | \u2713 | \u2713 |\n| Excel export | \u2013 | \u2713 |\n| PDF export | \u2013 | \u2713 |\n| Tracking limit | 100 content items | unlimited |\n| Retention | 90 days | 365 days |\n\nLicense gating happens at REST registration time **and** inside `Pro_Data_Collector` instantiation. If `License_Manager::has_pro_license()` returns false, Pro endpoints are simply not registered, and the React dashboard renders a `ProOverlay` upsell over the gated panels. This means a license bug silently strips Pro features without errors.\n\n## Architecture\n\n```\n        Frontend visitor                        wp-admin (analytics page)\n              \u2502                                            \u2502\n              \u25bc                                            \u25bc\n   assets/js/analytics-tracker.js                React AnalyticsDashboard\n   (IntersectionObserver + click                 (src/Analytics/)\n    delegates + fingerprint)                              \u2502\n              \u2502                                           \u2502\n              \u25bc                                           \u25bc\n   POST /embedpress/v1/analytics/track \u25c4\u2500\u2500 REST_API.php router \u2500\u2500\u25ba GET /data, /content, /views,\n                                                                    /spline-chart, /overview,\n                                                                    /embed-details, /milestones,\n                                                                    /features, /geo, /device,\n                                                                    /browser, /export, \u2026\n                                                  \u2502\n                                                  \u25bc\n                              Data_Collector \u2500\u2500 extends \u2500\u2500\u25ba Pro_Data_Collector\n                                                              (only if licensed)\n                                                  \u2502\n                                                  \u25bc\n                                       wpdb \u2192 5 analytics tables\n                                       + 3 wp_options keys\n                                       + cron (weekly/monthly reports + milestones)\n```\n\n## Database schema (`Analytics_Schema.php` \u2014 version `1.0.8`)\n\n| Table | Purpose | Key columns |\n|---|---|---|\n| `{prefix}embedpress_analytics_content` | Per-embed metadata + rollup counters | `content_id`, `embed_type`, `post_id`, `total_views`, `total_clicks`, `total_impressions` |\n| `{prefix}embedpress_analytics_views` | Each interaction row | `content_id`, `user_id`, `session_id`, `interaction_type`, `user_ip`, `referrer_url`, `view_duration` |\n| `{prefix}embedpress_analytics_browser_info` | Per-session client metadata | `user_id`, `session_id`, `browser_fingerprint`, `browser_name`, `device_type`, `country`, `city` |\n| `{prefix}embedpress_analytics_milestones` | Achievement records | `milestone_type`, `milestone_value`, `achieved_value`, `is_notified` |\n| `{prefix}embedpress_analytics_referrers` | Referrer + UTM aggregation | `referrer_url`, `referrer_domain`, `utm_source`, `utm_medium`, `utm_campaign`, `total_views`, `unique_visitors` |\n\nBump `Analytics_Schema::DB_VERSION` (~L23) when adding columns; `dbDelta` runs on activation/upgrade and reads this option.\n\n## Tracker payload (frontend \u2192 server)\n\n```js\n{\n  content_id,                  // stable per-embed hash\n  interaction_type,            // 'impression' | 'click' | 'view' | 'play' | 'pause' | 'complete'\n  user_id,                     // 'ep-user-{ts}-{rand}', 30-day cookie\n  session_id,                  // 'ep-sess-{ts}-{rand}', session cookie\n  page_url,\n  interaction_data: {\n    embed_type,                // 'YouTube' | 'Vimeo' | 'PDF' | \u2026\n    embed_url,\n    viewport_percentage,\n    location_data,             // client-sourced geo (IP-based fallback server-side)\n    browser_fingerprint        // canvas + WebGL hash\n  }\n}\n```\n\n## Tracking semantics\n\n| Interaction | Trigger | Cooldown / threshold |\n|---|---|---|\n| `impression` | Element enters viewport \u226549% | 5 s cooldown per content_id |\n| `click` | Click event delegated on embed | 2 s cooldown |\n| `view` | \u226549% visible for \u22653 s | One-shot per session per content |\n| `play` | Custom Player play event | \u2013 |\n| `pause` | Custom Player pause | \u2013 |\n| `complete` | Custom Player \u226585% watched | Pro only |\n\nDefaults from `analytics-tracker.js` (~L57-69): `viewThreshold: 49`, `viewDuration: 3000`, `impressionCooldown: 5000`, `clickCooldown: 2000`.\n\n## Code paths\n\n### Free PHP\n\n| File | Role |\n|---|---|\n| `EmbedPress/Analytics.php` | Admin menu registration, page render, enqueues `analytics.build.js`. Sets `embedpress_analytics_tracking_enabled` (default true). |\n| `EmbedPress/Includes/Classes/Analytics/REST_API.php` | All 20+ REST routes. Pro_Data_Collector instantiated at constructor (~L31). License gate at ~L201. |\n| `EmbedPress/Includes/Classes/Analytics/Data_Collector.php` | Free-tier collector. `track_interaction`, `get_views_analytics`, `get_content_analytics`, `get_browser_analytics`, `track_referrer_from_interaction_data`. |\n| `EmbedPress/Includes/Classes/Analytics/Pro_Data_Collector.php` | Extends Data_Collector. Adds `get_unique_viewers_per_embed`, `get_geo_analytics`, `get_device_analytics`, `get_referral_analytics`. |\n| `EmbedPress/Includes/Classes/Analytics/License_Manager.php` | `has_pro_license()` (~L23). Free vs Pro feature arrays (~L78-97). Limits (~L167-186). |\n| `EmbedPress/Includes/Classes/Analytics/Export_Manager.php` | CSV / XLSX / PDF generation. Outputs to `/wp-content/uploads/embedpress-analytics/`. |\n| `EmbedPress/Includes/Classes/Analytics/Milestone_Manager.php` | Tracks 100, 500, 1K, 5K, 10K+ thresholds. Fires `embedpress_milestone_achieved` (~L240). |\n| `EmbedPress/Includes/Classes/Analytics/Email_Reports.php` | Cron handlers `embedpress_weekly_analytics_report`, `embedpress_monthly_analytics_report` (~L45-46). |\n| `EmbedPress/Includes/Classes/Analytics/Browser_Detector.php` | Parses User-Agent \u2192 browser/OS/device-type. |\n| `EmbedPress/Includes/Classes/Analytics/Content_Cache_Manager.php` | Cache invalidation. Filter `embedpress_cache_clear_post_types` (~L58). |\n| `EmbedPress/Includes/Database/Analytics_Schema.php` | `dbDelta` schema for 5 tables. Schema version `1.0.8`. |\n\n### Free JS\n\n| File | Role |\n|---|---|\n| `assets/js/analytics-tracker.js` | 1200+ LOC tracker. IntersectionObserver, fingerprint, payload builder. |\n| `src/Analytics/index.js` | Mounts React `AnalyticsDashboard`. |\n| `src/Analytics/components/AnalyticsDashboard.js` | Container \u2014 date range, custom date range, active tabs. |\n| `src/Analytics/components/Header.js` | Date-range picker. |\n| `src/Analytics/components/Overview.js` | Totals cards. |\n| `src/Analytics/components/SplineChart.js` | amCharts5 time-series. |\n| `src/Analytics/components/WorldMap.js` | amCharts5 geo heatmap (Pro). |\n| `src/Analytics/components/PieChart.js` | Browser/device. |\n| `src/Analytics/components/EmbedDetailsModal.js` | Per-embed modal. |\n| `src/Analytics/components/ExportDropdown.js` | CSV / Excel / PDF export. |\n| `src/Analytics/services/AnalyticsDataProvider.js` | REST client wrapper. |\n\n### Pro\n\n| File | Role |\n|---|---|\n| `embedpress-pro/includes/Classes/CustomPlayer/Completion_Tracker.php` | `POST /completion`, `GET /completions`. Fires `embedpress_video_completed` (~L33). 85% watch-time guard (~L23). |\n| `embedpress-pro/includes/Classes/CustomPlayer/Heatmap_Tracker.php` | `POST /heatmap/sample`, `GET /heatmap/data`, `GET /heatmap/list`. 100-bucket anonymous drop-off via `wp_options` keyed `embedpress_heatmap_<md5(url)>` (~L12). |\n\nPro doesn't add its own analytics tables \u2014 it writes into the free schema via `Pro_Data_Collector`, plus heatmap/completion sidecars in `wp_options`.\n\n## REST endpoints\n\nSee [api/rest.md](../api/rest.md) for the full route list.\n\n## Hooks\n\n| Hook | Type | Where | Use |\n|---|---|---|---|\n| `embedpress_milestone_achieved` | action | `Milestone_Manager.php:240` | Args: `(type, value, achieved)`. Hook for custom notifications. |\n| `embedpress_weekly_analytics_report` | action | `Email_Reports.php:45` | Cron-fired. |\n| `embedpress_monthly_analytics_report` | action | `Email_Reports.php:46` | Cron-fired. |\n| `embedpress_video_completed` | action | `Completion_Tracker.php:33` | Pro. Fires when \u226585% completion arrives \u2014 LMS integrations hook here
