. |\n| `embedpress_cache_clear_post_types` | filter | `Content_Cache_Manager.php:58` | Allow extra post types. |\n| `embedpress_content_count_post_types` | filter | `Data_Collector.php:1295` | Post types counted as \"content\". |\n\n## License gating\n\n`License_Manager` defines feature arrays:\n\n**Free**: `total_views`, `total_clicks`, `total_impressions`, `total_unique_viewers`, `views_over_time_basic`, `basic_charts`.\n\n**Pro**: `per_embed_analytics`, `unique_viewers_per_embed`, `views_over_time_advanced`, `geo_tracking`, `device_analytics`, `email_reports`, `referral_tracking`, `advanced_charts`, `export_pdf`.\n\nDetection: `is_plugin_active('embedpress-pro/embedpress-pro.php')` AND license active for `EMBEDPRESS_SL_ITEM_SLUG`.\n\n## Common pitfalls\n\n- **Schema bumps require both** the `Analytics_Schema::DB_VERSION` constant change AND a `dbDelta` re-run path. Adding columns without bumping the version means existing installs never get the column.\n- **License-gated REST routes are silent**. If `has_pro_license()` returns false, the route doesn't exist \u2014 the React dashboard sees a 404, not a \"Pro required\" payload. When debugging \"feature missing\" reports, check license first.\n- **Tracking can be globally disabled** via `embedpress_analytics_tracking_enabled` option. Front-end JS is still enqueued; the server just rejects writes. Useful for GDPR consent tooling.\n- **Fingerprint is best-effort only** \u2014 Safari ITP / Brave / Firefox-strict block canvas + WebGL fingerprinting. Treat `user_id`/`session_id` cookies as the primary identity, fingerprint as a tiebreaker.\n- **`embedpress_heatmap_<md5(url)>` options can grow unbounded** if many videos are embedded. The Pro Heatmap_Tracker doesn't currently prune; long-running sites should manually clear.\n- **Free retention is 90 days** but pruning is a cron, not a query-time filter. Sites with disabled cron will accumulate beyond the limit.\n- **`embed_type` strings are case-sensitive** in queries. The tracker emits `'YouTube'`, `'Vimeo'`, etc. Don't compare lowercase server-side.\n- **Pro Heatmap & Completion are separate from analytics tables**. They live in `wp_options` to avoid yet-another-table on activation; keep them out of the `Analytics_Schema` migrations.\n\n## Testing\n\n- **Smoke**: `make wp ARG=\"user create test test@x.test --role=author\"`, visit any embed-bearing post in incognito. Confirm an `impression` row appears in `{prefix}embedpress_analytics_views`.\n- **Forcing a milestone**: insert rows directly into the views table to push `total_views` above 100, then run cron via `make wp ARG=\"cron event run embedpress_daily_milestone_check\"`.\n- **License toggle**: deactivate Pro plugin, refresh dashboard \u2014 Pro panels should render the upsell, not 500.\n- **Export**: trigger `/analytics/export?format=csv&date_range=30` and verify file in `/wp-content/uploads/embedpress-analytics/`.\n- **E2E**: `npm run test:e2e:dashboard`.\n", "features/custom-player.md": "# Custom Video Player\n\nPlyr-based branded player layered over YouTube, Vimeo, Wistia, Twitch, Dailymotion, and self-hosted MP4/MP3 sources. Free + Pro split: control toggles, presets, theming, autoplay, volume, playback speed, loop, restart/rewind/fast-forward live in **free**. Pro layers on advanced theming and 12 engagement / delivery sub-features.\n\n## Independent of Cinematic Preview\n\nThe Custom Player and the [Cinematic Preview](../../../embedpress-pro/docs/features/cinematic-preview.md) overlay share the same `.ep-embed-content-wraper` element and the same `data-options` JSON envelope, but they are independent. A wrapper can have:\n\n- only Cinematic Preview (overlay \u2192 bare iframe)\n- only Custom Player (Plyr controls, no overlay)\n- both (overlay \u2192 Plyr)\n- neither (raw embed)\n\n## Supported sources\n\n| Source | Player |\n|---|---|\n| YouTube | Plyr (YouTube provider) |\n| Vimeo | Plyr (Vimeo provider) |\n| Wistia | Plyr (HTML5 + Wistia API) |\n| Twitch | Plyr |\n| Dailymotion | Plyr |\n| Self-hosted MP4 / WebM | Plyr (HTML5) |\n| Self-hosted MP3 / OGG | Plyr (HTML5 audio) |\n| HLS (`.m3u8`) | Plyr + hls.js |\n| DASH (`.mpd`) | Plyr + dash.js |\n\nThe \"is this self-hosted video?\" decision is made by **five regex copies** in PHP and JS \u2014 when extending self-hosted format support (e.g., adding `.av1`), all five must be updated. Plyr is vendored at `assets/js/vendor/plyr.js`.\n\n## Architecture\n\n```\n            Editor settings surfaces\n            \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n            \u2502  Gutenberg InspectorControls         \u2502\n            \u2502  Elementor panel                     \u2502\n            \u2502  Shortcode attributes                \u2502\n            \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                             \u2502 block attributes / widget settings\n                             \u25bc\n              \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n              \u2502  Renderer emits                  \u2502\n              \u2502  .ep-embed-content-wraper        \u2502\n              \u2502  carrying data-options=\"{JSON}\"  \u2502\n              \u2502  + data-playerid                 \u2502\n              \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                 \u25bc\n              \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n              \u2502  Frontend initplyr.js            \u2502\n              \u2502  - DOMContentLoaded scan         \u2502\n              \u2502  - MutationObserver pickup       \u2502\n              \u2502  - Builds controls[] array       \u2502\n              \u2502  - new Plyr(selector, opts)      \u2502\n              \u2502  - epSafeInit() per Pro feature  \u2502\n              \u2502  - PiP icon injection            \u2502\n              \u2502  - iOS YT fullscreen fallback    \u2502\n              \u2502  - Poster fade-in                \u2502\n              \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                 \u25bc\n                     Pro REST endpoints +\n                     per-feature classes (Pro)\n```\n\nThe single contract: every renderer must produce a `.ep-embed-content-wraper` carrying a unique `data-playerid` and a JSON `data-options`. `initplyr.js` is the only consumer \u2014 it does not care which renderer produced the markup.\n\n## Data contract \u2014 `data-options` JSON\n\nBuilt by `EmbedPressBlockRenderer::build_player_options` (~line 919) and by the Elementor / shortcode equivalents. The free fields:\n\n```js\n{\n    customPlayer: bool,           // master enable\n    autoplay: bool,\n    volume: number,               // 0\u20131\n    playbackSpeed: number,        // 0.5\u20132\n    posterThumbnail: string,      // URL\n    playerColor: string,          // \u2192 --plyr-color-main\n    playerPreset: string,         // 'default' | 'preset-1' | 'preset-3'\n    playerTooltip: bool,\n    playerHideControls: bool,\n    playerLoop: bool,\n    playerRestart: bool,\n    playerRewind: bool,\n    playerFastForward: bool,\n    playerPip: bool,              // non-YouTube\n    playerDownload: bool,\n    fullscreen: bool|value,\n    start: timestamp,\n    end: timestamp,\n    rel: bool,                    // YouTube related-videos\n    mute: bool,\n    t: timestamp,                 // Vimeo\n    vautoplay: bool,\n    autopause: bool,\n    dnt: bool,                    // Vimeo do-not-track\n    self_hosted: bool,\n    hosted_format: string,        // mp4 | webm | audio | hls | dash\n    show: {                       // per-control visibility\n        progress, current_time, duration, mute, volume, captions,\n        fullscreen, pip, settings, playback_speed, restart, seek, loop\n    }\n}\n```\n\nPro extends the contract with top-level keys per sub-feature (only emitted when enabled):\n\n| Key | Sub-feature |\n|---|---|\n| `email_capture` | Pause at time \u2192 modal email form \u2192 submit/skip \u2192 resume |\n| `action_lock` | Full-cover overlay (share / form / link / login required) |\n| `timed_cta` | `[{time, headline, button_text, button_url, dismissible}]` |\n| `chapters` | `{items: [{start_time, title}], source: 'manual' \\| 'youtube'}` |\n| `auto_resume` | localStorage seek persistence + Resume prompt |\n| `end_screen` | Replay / next / countdown-redirect overlay on `ended` |\n| `heatmap` | 5s sample \u2192 REST \u2192 per-video bucket array |\n| `adaptive_streaming` | Lazy-loads hls.js / dash.js |\n| `country_restriction` | Server-side GeoIP gate (replaces markup, not JSON) |\n| `privacy_mode` | Static thumb + click-to-load; `youtube-nocookie.com` |\n| `lms_tracking` | Threshold-cross fires `embedpress:video-completed` (LearnDash / TutorLMS / LifterLMS) |\n| `cdn_offloading` | BunnyCDN / Cloudflare Stream URL rewrite at save |\n\n## Presets\n\nVisual styles applied via CSS class:\n\n| UI label | CSS class | Status |\n|---|---|---|\n| Default | (no class) | Free + Pro |\n| Preset 1 | `custom-player-preset-1` | Pro |\n| Preset 2 | `custom-player-preset-3` \u26a0 | Pro |\n\n> The \"Preset 2\" UI label maps to CSS class `custom-player-preset-3`, **not** `-2`. Classes `-2` and `-4` exist in `static/css/embedpress.css` but no UI exposes them. Don't introduce them without product direction.\n\nCSS lives in `static/css/embedpress.css` lines ~1859\u20132019.\n\n## Code paths \u2014 exhaustive map\n\n### Free plugin\n\n**Block attribute schema (must keep both in sync):**\n\n| Where | Why |\n|---|---|\n| `src/Blocks/EmbedPress/src/components/attributes.js` | JS-side definitions used by `registerBlockType` |\n| `EmbedPress/Gutenberg/BlockManager.php::get_embedpress_block_attributes()` | **Server-side mirror** \u2014 any attribute missing here is stripped before `render_callback` runs. Both Free and Pro Custom Player attrs must be registered. |\n\n**Inspector UI:**\n- `src/Blocks/EmbedPress/src/components/InspectorControl/customplayer.js` \u2014 base toggles (free)\n- Pro panels filter in via `applyFilters('embedpress.customPlayerControls', ...)`\n\n**Render path:**\n- Editor: `src/Blocks/EmbedPress/src/components/edit.js` \u2014 wrapper renders `data-options={getPlayerOptions({attributes})}` whenever `customPlayer || cinematicPreview`\n- Save: `src/Blocks/EmbedPress/src/components/save.js` \u2014 same condition\n- Helper: `src/Blocks/EmbedPress/src/components/helper.js::getPlayerOptions` \u2014 single source of truth for the JSON shape\n\n**Elementor:**\n- `EmbedPress/Elementor/Widgets/Embedpress_Elementor.php` \u2014 fires `extend_customplayer_controls` action (Pro hooks here)\n- `Embedpress_Elementor::render()` builds the wrapper, injects `data-options` JSON\n\n**Shortcode:**\n- `EmbedPress/Includes/Classes/Extend_CustomPlayer_Controls.php` \u2014 registers Custom Player on the shortcode pipeline (`emberpress_custom_player => 'yes'` is the legacy enable key \u2014 note the typo `emberpress`, kept for back-compat)\n\n**Frontend init \u2014 `static/js/initplyr.js` (~1466 lines):**\n\n| Section | Role |\n|---|---|\n| L1\u2013L139 | `init()`: scan `[data-playerid]`, parse `data-options`, apply poster |\n| L147\u2013L166 | controls array builder |\n| L181\u2013L219 | `new Plyr(selector, {...})` \u2014 `seekTime: 10` hardcoded |\n| L226\u2013L235 | Privacy Mode auto-resume after consent |\n| L240\u2013L247 | `epSafeInit(name, fn)` \u2014 failure isolation per Pro feature |\n| L249\u2013L272 | Per-feature dispatch: auto_resume \u2192 end_screen \u2192 timed_cta \u2192 chapters \u2192 email_capture \u2192 action_lock \u2192 lms_tracking \u2192 heatmap |\n| L276\u2013L307 | iOS YouTube fullscreen workaround |\n| L314\u2013L333 | Poster fade-in (5s safety timeout) |\n| L338+ | PiP icon injection (MutationObserver \u2014 Plyr renders PiP late) |\n| L410+ | Auto-Resume |\n| L525+ | Heatmap |\n| L565+ | LMS tracking |\n| L645+ | Adaptive streaming (lazy-loads hls.js / dash.js) |\n| L705+ | Action Lock |\n| L836+ | Email Capture (localStorage dedupe per video URL) |\n| L984+ | Chapters |\n| L1198+ | Timed CTA |\n| L1287+ | Privacy Mode |\n| L1346+ | End Screen |\n\n### Self-hosted video detection \u2014 five regex copies\n\nThe five places that decide \"this URL is a self-hosted `<video>`\":\n\n1. `EmbedPress/Providers/SelfHosted.php::validateSelfHostedVideo` \u2014 classic shortcode\n2. `EmbedPress/Includes/Classes/Helper.php::check_media_format` \u2014 server-side, sets `self_hosted` / `hosted_format`\n3. `src/Blocks/EmbedPress/src/components/helper.js` \u2014 TWO copies: `isSelfHostedVideo()` and `checkMediaFormat()`\n4. `src/utils/functions.js::isSelfHostedVideo` \u2014 **gates whether the Custom Player panel appears** in the inspector. Missing this is the easiest way to \"add HLS support\" but still see no player UI.\n5. `src/utils/helper.js::isSelfHostedVideo`\n\nAll five strip `?\u2026` and `#\u2026` before extension match so signed-URL streaming sources (Mux, CloudFront tokens) work.\n\n## Pro sub-feature playbook\n\nFor each new Pro sub-feature:\n\n1. Add attribute(s) to `attributes.js` AND `BlockManager.php::get_embedpress_block_attributes()` (server-side mirror is mandatory).\n2. Surface in inspector via `applyFilters('embedpress.customPlayerControls', ...)` (Pro panel).\n3. Mirror in Elementor \u2014 Pro section in the Elementor widget hook.\n4. Mirror in shortcode \u2014 extend `Extend_CustomPlayer_Controls.php` defaults.\n5. Emit JSON \u2014 extend `helper.js::getPlayerOptions` with the new top-level key. Only emit when feature is enabled.\n6. Server-side render \u2014 if feature gates rendering (e.g. Country Restriction), short-circuit the markup; otherwise the wrapper is unchanged.\n7. Frontend init \u2014 add `epInitXxxx` function to `initplyr.js` and dispatch via `epSafeInit('xxxx', ...)` so a failure in one sub-feature doesn't break the next.\n8. Pro back-end class (if needed) \u2014 REST endpoint + DB writes.\n\n## Editor live-preview architecture (must preserve)\n\nThese invariants are easy to break and the symptoms (stale preview, double oEmbed, Pro features dropped) only appear when toggles happen in a specific order.\n\n- **`Core/AssetManager.php::is_custom_player_enabled()`** must return true unconditionally inside the Gutenberg iframed canvas (`is_admin() && get_current_screen()->is_block_editor()`). Without this short-circuit, `plyr.js` never enqueues and `Plyr` is undefined.\n- **`opacity: 0` belongs inline in `save.js`, NEVER as a global CSS rule.** `save.js` emits `style=\"opacity:0\"` only when `customPlayer` is on; init code flips `.plyr-initialized` after init, and the only CSS rule is `[data-playerid].plyr-initialized { opacity: 1 }`.\n- **`<EmbedWrap key={\u2026}>` is the live-preview backbone.** Its key composes three independent triggers:\n  1. `customPlayer ? 'cp' : 'raw'` \u2014 flips on the master toggle\n  2. `(embedHTML || '').length` \u2014 flips when iframe URL changes\n  3. `JSON.stringify(customPlayerParams || {})` \u2014 flips on any Custom Player option change\n\n  Any change unmounts and remounts the wrapper; `dangerouslySetInnerHTML` re-emits the embed; `initplyr.js`'s MutationObserver in the canvas iframe fires `initPlayer` on the fresh node. **Never** drop one of these from the key.\n\n- **`customPlayerParams` must NOT live in the `embed` useEffect's dependency list.** Custom Player options never change the iframe URL. Including it there causes a single toggle to bump *both* `youtubeParams` AND `customPlayerParams` ref-equality across separate render passes, scheduling the embed-fetch debounce twice; the second response runs `getCustomPlayerParams` against stale attributes and drops the freshly enabled Pro flag.\n- **`helper.js::initCustomPlayer` bails when the wrapper has `.plyr-initialized` already.** In the editor's iframed canvas, `initplyr.js`'s MutationObserver beats the 300ms `setTimeout` from `edit.js`'s `useEffect` to the punch. Without the bail, `helper.js` runs `new Plyr(element, ...)` *again*, creating a second instance that orphans the first one's Pro-feature listeners.\n- **Color-migration `setAttributes(...)` calls must live inside a `useEffect`, never in the render body** \u2014 otherwise React's \"Cannot update a component while rendering\" warning fires whenever the user pastes a URL.\n\n## Files cheatsheet\n\n| Concern | File |\n|---|---|\n| Frontend init (single source of runtime truth) | `static/js/initplyr.js` |\n| Block JS attributes | `src/Blocks/EmbedPress/src/components/attributes.js` |\n| Block PHP attribute mirror | `EmbedPress/Gutenberg/BlockManager.php` |\n| Inspector (free toggles) | `src/Blocks/EmbedPress/src/components/InspectorControl/customplayer.js` |\n| Render helpers (JSON shape) | `src/Blocks/EmbedPress/src/components/helper.js` (`getPlayerOptions`) |\n| Block edit / save | `src/Blocks/EmbedPress/src/components/{edit.js,save.js}` |\n| Shortcode + base controls | `EmbedPress/Includes/Classes/Extend_CustomPlayer_Controls.php` |\n| Elementor widget | `EmbedPress/Elementor/Widgets/Embedpress_Elementor.php` |\n| Presets CSS | `static/css/embedpress.css` (~L1859\u20132019) |\n| Plyr vendor | `assets/js/vendor/plyr.js` |\n\n## Common pitfalls\n\n- **`data-options` JSON malformed** \u2014 frontend logs a parse error and falls back to a plain iframe. Use `htmlspecialchars($json, ENT_QUOTES, 'UTF-8')` server-side.\n- **Player UI doesn't appear for a new self-hosted format** \u2014 usually means one of the five `isSelfHostedVideo` copies wasn't updated.\n- **YouTube `videoId` extraction** \u2014 supports `youtube.com/watch?v=ID`, `youtu.be/ID`, `/embed/ID`, `/shorts/ID`, channel/playlist URLs (Pro). Test all forms when changing the regex.\n- **Misspelled `custom_payer_preset` Elementor key** \u2014 preserve the typo for back-compat.\n- **`emberpress_custom_player`** (sic) \u2014 legacy shortcode key has a typo. Don't fix \u2014 load-bearing for old posts.\n- **iOS YouTube fullscreen** modifies `<meta name=\"viewport\">` directly. Make sure both `enter` and `exit` handlers fire.\n- **PiP icon via MutationObserver** because Plyr renders PiP late on some sources. Don't replace with a one-shot \u2014 it'll race.\n- **Privacy Mode + autoplay**: autoplay is force-disabled (the click IS the autoplay). After consent, the wrapper carries `data-ep-autoplay-after-init=\"1\"` and `initplyr.js` calls `player.play()` once on `ready` / `canplay`.\n- **Email Capture localStorage key**: per video URL. Strip query for the key \u2014 otherwise adding `?t=10` re-prompts.\n- **Heatmap batching**: \u22641 request per 30s per viewer (acceptance criterion). Buffer; don't sample-and-send on every interval.\n- **Anti-skip on LMS completion**: requires `watched_seconds \u2265 min(0.85, threshold \u00d7 0.9) \u00d7 total_seconds`. Without the 0.9 multiplier, a 50% threshold was unsatisfiable because `watched/dur` lagged `currentTime/dur`.\n- **Completion is server-idempotent**, NOT sessionStorage-gated. Per-(user, video_url) state lives in user meta `embedpress_video_progress` keyed by `md5(video_url)`.\n- **Two distinct POSTs hit `/completion`**: (1) threshold-cross (full payload, fires `embedpress_video_completed` once), (2) progress beacons with `progress_only=1` (sent on `pause` / `ended` / `beforeunload` / `pagehide` via `navigator.sendBeacon`, throttled to \u22651s of new watched time). Beacons let the dashboard surface real watch depth for non-completers. `sendBeacon` survives unload but can't set `X-WP-Nonce` \u2014 `_wpnonce` is appended to the FormData body instead.\n- **Cinematic Preview coexistence**: when both skins are on, Cinematic Preview's overlay handles the first click and starts Plyr. Email Capture's pause-at-time fires AFTER overlay dismissal \u2014 confirm timer starts from `play`, not page load.\n\n## Testing\n\nMaster test plan: `embedpress-docker/test-plan-custom-player-4.5.2.txt`.\n\nPre-flight:\n- Hard-refresh editor (asset cache key needs a version bump).\n- DevTools Console open \u2014 any red error = Fail.\n- Test BOTH (a) YouTube `https://www.youtube.com/watch?v=dQw4w9WgXcQ` and (b) self-hosted `.mp4`. Pass only if BOTH work (unless feature is provider-specific).\n- Re-test in BOTH Gutenberg AND Elementor \u2014 historical JSON-quoting bugs only manifested in one of them.\n- Incognito for any feature involving `localStorage` (auto-resume, email capture dedupe, action-lock unlock state).\n\nPlaywright automation: `/Applications/Workspace/GitHub/embedpress-playwright-automation`.\n", "features/document.md": "# Document Block\n\nBlock name `embedpress/document`. Embeds DOC / DOCX / PPT / PPTX / XLS / XLSX / PDF using one of three viewers depending on format and license.\n\n## Viewer routing\n\n`docViewer` modes:\n\n| Mode | Renderer | When |\n|---|---|---|\n| `'custom'` | EmbedPress PDF.js | PDFs only |\n| `'office'` | **Office Online** (Pro) | Office formats (DOC, DOCX, PPT, PPTX, XLS, XLSX) |\n| `'google'` | Google Viewer | Fallback for non-PDF without Pro |\n\nThe routing logic lives in `Shortcode.php::do_shortcode_doc` (~L1496+):\n\n1. Detect MIME type / extension from `href`.\n2. If PDF \u2192 defer to PDF block render path.\n3. Else if `docViewer='office'` and Pro active \u2192 Office Online URL: `https://view.officeapps.live.com/op/embed.aspx?src=<url>`.\n4. Else \u2192 Google Viewer URL: `https://docs.google.com/gview?url=<url>&embedded=true`.\n\n> **Google Viewer is officially deprecated** by Google for new sources. Treat it as best-effort fallback only \u2014 don't rely on it for SLA-critical embeds.\n\n## Free vs Pro\n\n| Capability | Free | Pro |\n|---|---|---|\n| PDF via PDF.js or flipbook | \u2713 | \u2713 |\n| Office Online viewer (clean Office rendering) | \u2013 | \u2713 |\n| Google Viewer fallback | \u2713 | \u2713 |\n| Custom logo overlay | \u2013 | \u2713 |\n| Content protection | \u2013 | \u2713 |\n\n## Code paths\n\n| File | Role |\n|---|---|\n| `src/Blocks/document/block.json` | Block manifest \u2014 \"Embed documents like PDF, DOC, PPT, XLS\" |\n| `src/Blocks/document/src/components/attributes.js` | Unified attributes |\n| `src/Blocks/document/src/components/PDFViewer.js` | Editor preview |\n| `EmbedPress/Elementor/Widgets/Embedpress_Pdf.php` | Elementor widget for PDFs (free) |\n| `EmbedPress/Elementor/Widgets/Embedpress_Document.php` | Elementor widget for non-PDF docs (Pro) |\n| `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php::render_document` (~L443) | Server render |\n| `EmbedPress/Shortcode.php::do_shortcode_doc` (~L1496+) | MIME detection + viewer routing |\n\n## Block attributes\n\n| Attribute | Type | Purpose |\n|---|---|---|\n| `href` | string | File URL |\n| `docViewer` | `'custom' \\| 'google' \\| 'office'` | Viewer selector |\n| `presentation` | bool | Enables 3D flipbook for PDFs |\n| `themeMode`, `customColor`, `toolbar`, `position`, `download`, `copy_text`, `draw`, `doc_rotation` | mixed | Shared with PDF block |\n| **Pro:** `customlogo`, `logoX`, `logoY`, `customlogoUrl`, `logoOpacity` | mixed | Custom logo overlay |\n\n## Common pitfalls\n\n- **Google Viewer is officially deprecated.** Customer-facing SLA-critical embeds should use Pro + Office Online.\n- **Office Online URL must be public.** Office Online fetches the file server-side, so behind-auth URLs return blank. For private docs, use Pro + a public asset URL.\n- **PPTX in Office Online doesn't always honour `allowfullscreen`** \u2014 common cases work after the 4.4.10 fix, but not all. If a customer reports fullscreen failing, check the host's CSP / Permissions-Policy first.\n- **`docViewer='custom'` + non-PDF** is invalid but not validated. The block lets you save it, then renders blank. Validate at attribute set time.\n- **Office Online has a 10 MB limit** for direct embed. Larger files won't render; fall back to download link.\n- **PDF path is shared** with the [PDF feature](pdf.md) \u2014 don't duplicate fixes.\n- **Cross-origin restrictions**. If the document URL is on a host with `X-Frame-Options: DENY`, none of the three viewers will work \u2014 that's outside EmbedPress's control.\n\n## Testing\n\n- **PDF**: embed a PDF URL \u2192 routes to PDF.js viewer.\n- **PPTX (Pro)**: embed a public `.pptx` URL with `docViewer='office'` \u2192 Office Online iframe.\n- **PPTX (free)**: same URL with `docViewer='google'` \u2192 Google Viewer iframe (may flake).\n- **Fullscreen**: PPTX in Office Online \u2192 click fullscreen, verify it works.\n- **Custom logo**: with Pro, set logo \u2192 overlay appears bottom-right of the iframe.\n", "features/feature-enhancer.md": "# Feature_Enhancer \u2014 the cross-provider decoration pipeline\n\n`EmbedPress/Includes/Classes/Feature_Enhancer.php` is the layer that decorates **all** provider output. It's where most cross-cutting logic (custom player, social share, provider routing, AJAX handlers for PDF / video popup) is wired up.\n\n## Why a pipeline\n\nProviders do one job: turn a URL into base HTML. But customers want all sorts of decoration on top \u2014 autoplay flags, share buttons, branding, lazy loading. Putting that into each provider would mean N copies. Instead, providers stay simple and `Feature_Enhancer` runs over their output via the `embedpress:onAfterEmbed` filter.\n\n## How it runs\n\n`Feature_Enhancer` is instantiated in `embedpress.php` (around line 133). Its constructor adds these hooks:\n\n| Hook | Type | Callback |\n|---|---|---|\n| `embedpress:isEmbra` | filter | `isEmbra()` \u2014 decides whether YouTube/TikTok/Spreaker/GooglePhotos/Wrapper should handle the URL |\n| `embedpress:onAfterEmbed` | filter (priority 90) | `enhance_youtube`, `enhance_vimeo`, `enhance_twitch`, `enhance_dailymotion`, `enhance_soundcloud`, `enhance_missing_title` |\n| `embedpress_gutenberg_youtube_params` | filter | YouTube param injection for blocks |\n| `init` | action | Registers the Vimeo Gutenberg block |\n| `embedpress_gutenberg_wistia_block_after_embed` | action | Wistia block post-render |\n| `elementor/widget/embedpres_elementor/skins_init` | action | `elementor_setting_init` |\n| `wp_ajax_youtube_rest_api`, `wp_ajax_nopriv_youtube_rest_api` | action | AJAX handler for YouTube data |\n| `embedpress_gutenberg_embed` | action | `gutenberg_embed` |\n| `wp_ajax_save_source_data` | action | Caches per-embed metadata to post meta |\n| `save_post`, `load-post.php` | action | Source data lifecycle |\n| `elementor/editor/after_save` | action | Source data caching for Elementor |\n| `wp_head` | action | `embedpress_generate_social_share_meta` |\n| (additional `wp_ajax_*` for PDF / flipbook viewers) | action | various |\n\n## isEmbra \u2014 the routing decision\n\n`Feature_Enhancer::isEmbra($isEmbra, $url, $atts)` (around line 132) instantiates `Youtube`, `TikTok`, `Spreaker`, `Wrapper`, and `GooglePhotos` provider classes and calls `validateUrl()` on each. If any returns truthy, `isEmbra` returns true and `Shortcode::parseContent` routes through Embera + a custom Provider class. Otherwise, the URL goes through `WP_oEmbed::fetch`.\n\nThis means **Feature_Enhancer is the gatekeeper** between \"use our Provider\" and \"use WP's native oEmbed.\"\n\n## Adding a new cross-provider feature\n\n1. Decide which stage it touches: pre-embed (`embedpress:onBeforeEmbed`), post-embed (`embedpress:onAfterEmbed`), or block-attribute (`embedpress_gutenberg_*`).\n2. Add a callback in `Feature_Enhancer` (or as a separate class registered from the same place).\n3. Inside the callback, read the relevant attributes; mutate appropriately.\n4. Add the corresponding control in the block / widget so users can opt in.\n5. If Pro-only: ship the actual mutation in `embedpress-pro/includes/Filters/*` (typically `Feature_Enhancer_Pro` or one of the per-provider extenders); in free, ship a no-op + the upsell UI.\n\n## Pattern: provider-aware vs provider-agnostic\n\n- **Provider-aware** (e.g., YouTube subscriber button): the per-provider `enhance_youtube` method, conditional on URL host or the Embera-resolved provider name.\n- **Provider-agnostic** (e.g., share buttons, lazy load): hook `embedpress:onAfterEmbed` and run unconditionally; mutate the wrapper, not the provider HTML.\n\n## Pro counterpart\n\nPro ships `Embedpress\\Pro\\Filters\\Feature_Enhancer_Pro` (in `embedpress-pro/includes/Filters/Feature_Enhancer_Pro.php`) which hooks complementary actions:\n\n- `embedpress_enhance_soundcloud`\n- `embedpress_enhance_dailymotion`\n- `embedpress_wistia_block_attributes`\n\nPro's per-provider extenders (`includes/Providers/Youtube.php`, `Vimeo.php`, etc.) each implement `featureExtend()` that hooks `embedpress:onAfterEmbed` / `:onBeforeEmbed` for their respective providers.\n", "features/onboarding.md": "# Onboarding Setup Wizard\n\n3-step React wizard at `?page=embedpress-onboarding` that walks new users through enabling features and editor surfaces. Free, added in 4.5.1.\n\n## Trigger\n\nAuto-redirect fires when:\n\n- Plugin freshly activated, AND\n- `!get_option('embedpress_onboarding_complete')`, AND\n- not already on the wizard page.\n\nAfter completion, `embedpress_onboarding_complete=1` and the wizard never auto-redirects again. Manually accessible any time via wp-admin submenu **\"Setup Wizard\"**.\n\n## Steps\n\n1. **Get Started** \u2014 welcome with 250+ source icons, consent modal, \"Personalize\" / \"Skip\" buttons.\n2. **Customize Setup** \u2014 9 toggle cards: Gutenberg Block, Elementor Widget, Powered By, Analytics, Social Share (free) + Lazy Load, Custom Branding, Custom Ads, Content Protection (Pro, crown-badged).\n3. **Ready to Embed** \u2014 feature summary + upsell checklist + Pro feature links.\n\nPro features show a crown icon + ProPopup upsell modal on click \u2192 upgrade link from `embedpressOnboardingData.upgradeUrl`.\n\n## Architecture\n\n```\n   Plugin activation\n            \u2502\n            \u25bc\n   EmbedpressSettings.php (~L215) checks:\n     !$pro_active && !get_option('embedpress_onboarding_complete')\n            \u2502\n            \u25bc\n   Auto-redirect to wp-admin?page=embedpress-onboarding\n            \u2502\n            \u25bc\n   Wizard page renders <div id=\"embedpress-onboarding-root\"></div>\n            \u2502\n            \u25bc\n   src/AdminUI/onboarding-entry.js mounts <Onboarding/>\n   (compiled to assets/js/onboarding.build.js + .css)\n            \u2502\n            \u25bc\n   3-step React UI; toggles bound to step-2 state\n            \u2502\n            \u25bc\n   On finish \u2192 AJAX `embedpress_save_onboarding`\n   \u2192 update_option(EMBEDPRESS_PLG_NAME) with toggle values\n   \u2192 update_option(EMBEDPRESS_PLG_NAME . ':elements') for editor enablements\n   \u2192 update_option('embedpress_onboarding_complete', 1)\n            \u2502\n            \u25bc\n   Redirect to dashboard\n```\n\n## Code paths\n\n| File | Role |\n|---|---|\n| `src/AdminUI/Onboarding.js` (~652 LOC, single component) | The whole wizard |\n| Inside Onboarding.js (~L362-408) | Step 1 (Get Started + consent) |\n| Inside Onboarding.js (~L412-479) | Step 2 (toggle cards) |\n| Inside Onboarding.js (~L482-576) | Step 3 (summary + upsell) |\n| Inside Onboarding.js (~L256-260) | `PRO_KEYS = ['g_lazyload', 'custom_branding', 'custom_ads', 'content_protection']` |\n| Inside Onboarding.js (~L100-126) | `ProPopup` modal \u2014 shown when locked toggle clicked |\n| Inside Onboarding.js (~L313) | Reads `data?.proActive` |\n| `src/AdminUI/onboarding-entry.js` | React mount point \u2014 `#embedpress-onboarding-root` |\n| `assets/js/onboarding.build.js` | Compiled bundle |\n| `assets/css/onboarding.build.css` | Styles |\n| `EmbedPress/Ends/Back/Settings/EmbedpressSettings.php` (~L215) | Auto-redirect trigger |\n| Same file (~L338-351) | `wp_localize_script('embedpress-onboarding', 'embedpressOnboardingData', {...})` |\n| Same file (~L500-600) | AJAX handler `embedpress_save_onboarding` \u2014 writes options |\n\n## Persisted options\n\n| Option key | Shape | Set by |\n|---|---|---|\n| `EMBEDPRESS_PLG_NAME` (the global settings array) | `{gutenberg_block, elementor_widget, embedpress_document_powered_by, analytics_tracking, social_share, g_lazyload, custom_branding, custom_ads, content_protection}` | Step 2 toggles |\n| `EMBEDPRESS_PLG_NAME . ':elements'` | per-element enablement (Gutenberg block keys, Elementor widget keys) | Step 2 editor toggles |\n| `embedpress_onboarding_complete` | `1` | Set on finish; suppresses re-run |\n\n## Localization (`embedpressOnboardingData`)\n\nPassed via `wp_localize_script`:\n\n- `ajaxUrl`, `nonce` \u2014 for the save AJAX\n- `dashboardUrl` \u2014 where to redirect after finish\n- `proActive` \u2014 license check result\n- `upgradeUrl` \u2014 `wpdeveloper.com/in/upgrade-embedpress`\n- `assetsUrl` \u2014 for icon assets\n- `analyticsTracking` \u2014 current state of the analytics toggle (so re-running preserves the user's earlier choice)\n\n## Common pitfalls\n\n- **`PRO_KEYS` is hardcoded.** Adding a 5th Pro feature toggle requires editing this array AND adding the toggle card AND the option write.\n- **Auto-redirect only fires once per install.** To re-trigger for testing: `wp option delete embedpress_onboarding_complete`.\n- **Pro detection happens server-side** (`proActive` localized once). If the user activates Pro mid-wizard, they need to refresh \u2014 the React state won't update.\n- **Step 2 writes a unified array** to `EMBEDPRESS_PLG_NAME` \u2014 be careful if other code paths also write that option, you can race-overwrite. The wizard merges, but if you skip the merge code path you lose other settings.\n- **Element enablement (`:elements`)** is a separate option key. Don't put block/widget enablement in the main settings array.\n- **Skipping the wizard** still sets `embedpress_onboarding_complete=1` \u2014 by design (so it doesn't keep nagging). But it means skipped users never wrote default option values \u2014 relying code should fall back gracefully.\n- **Localization data is only passed when the user is on the onboarding page.** Don't reference `embedpressOnboardingData` from other admin pages.\n- **`embedpress-onboarding-root` div is the only mount point** \u2014 if the page template doesn't render it, the React app silently fails.\n\n## Testing\n\n- **Fresh install**: `make destroy && make setup` \u2192 activate plugin \u2192 should auto-redirect to wizard.\n- **Skip path**: click Skip \u2192 `embedpress_onboarding_complete=1`, redirect to dashboard.\n- **Toggle path**: enable some toggles \u2192 finish \u2192 verify options written via `wp option get embedpress`.\n- **Pro toggle without license**: click Custom Branding (no Pro) \u2192 ProPopup opens with upgrade link.\n- **Re-trigger**: `wp option delete embedpress_onboarding_complete` \u2192 reload admin \u2192 wizard re-shows.\n- **With Pro active**: all 9 toggles unlocked, no crown badges.\n", "features/pdf-gallery.md": "# PDF Gallery\n\nMulti-PDF gallery with four layouts (grid, masonry, carousel, bookshelf) and per-item custom thumbnails. Free, shipped 4.5.0. Block name `embedpress/pdf-gallery`.\n\nThe gallery is essentially a **chooser around the existing PDF viewer** \u2014 clicking a card opens the PDF in a lightbox modal that uses the same PDF.js / 3D flipbook pipeline as the standalone [PDF block](pdf.md).\n\n## Architecture\n\n```\n   Block: embedpress/pdf-gallery\n   pdfItems: [ { id, url, fileName, customThumbnailId, customThumbnailUrl } ]\n                    \u2502\n                    \u25bc\n   Server render: render_pdf_gallery()\n                  EmbedPressBlockRenderer.php:74\n                    \u2502\n                    \u25bc\n   For each item:\n     - Generate or reuse thumbnail (Pdf_Thumbnail_Handler.php)\n        \u251c\u2500\u2500 WP-managed preview (if attachment exists)\n        \u2514\u2500\u2500 Imagick fallback (server-side render of page 1)\n                    \u2502\n                    \u25bc\n   Layout shell (grid / masonry / carousel / bookshelf) wraps cards\n                    \u2502\n                    \u25bc\n   Frontend: static/js/pdf-gallery.js\n   Click \u2192 static/js/ep-pdf-lightbox.js\n                    \u2502\n                    \u25bc\n   Lightbox modal opens chosen PDF using PDF.js or 3D flipbook\n   (viewer settings inherited from gallery block attrs)\n```\n\n## Code paths\n\n| File | Role |\n|---|---|\n| `src/Blocks/pdf-gallery/block.json` | Block manifest |\n| `src/Blocks/pdf-gallery/src/index.js` | Block registration |\n| `src/Blocks/pdf-gallery/src/components/attributes.js` | Full schema |\n| `src/Blocks/pdf-gallery/src/components/edit.js` | Gallery builder UI |\n| `src/Blocks/pdf-gallery/src/components/save.js` | Save HTML |\n| `src/Blocks/pdf-gallery/src/inspector.js` | Inspector |\n| `EmbedPress/Elementor/Widgets/Embedpress_Pdf_Gallery.php` | Elementor widget |\n| `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php::render_pdf_gallery` (~L74) | Server render |\n| `EmbedPress/Includes/Classes/Pdf_Thumbnail_Handler.php` | AJAX thumbnail generator + Imagick fallback |\n| `EmbedPress/Gutenberg/BlockManager.php` (~L115-116) | Registers AJAX actions: `ep_generate_pdf_thumbnail`, `ep_upload_pdf_thumbnail` |\n| `static/js/pdf-gallery.js` | Frontend gallery init |\n| `static/js/pdf-gallery-elementor-editor.js` | Elementor editor multiselect handler |\n| `static/js/ep-pdf-lightbox.js` | Lightbox modal \u2014 opens picked PDF |\n\n## Block attributes\n\n| Attribute | Type | Purpose |\n|---|---|---|\n| `pdfItems` | `[{id, url, fileName, customThumbnailId, customThumbnailUrl}]` | The PDFs |\n| `layout` | `'grid' \\| 'masonry' \\| 'carousel' \\| 'bookshelf'` | Layout |\n| `columns`, `columnsTablet`, `columnsMobile` | number | Responsive grid |\n| `gap` | number | Spacing |\n| `thumbnailAspectRatio` | string | E.g. `'4:3'` |\n| `playButtonIcon` | `'play' \\| 'eye' \\| 'document' \\| 'none'` | Hover icon |\n| `playButtonColor`, `playButtonSize`, `playButtonBg`, `playButtonShape` | mixed | Play button styling |\n| `hoverOverlayColor` | hex | Hover overlay |\n| `playButtonAlwaysShow` | bool | Don't require hover |\n| `carouselAutoplay`, `carouselAutoplaySpeed`, `carouselLoop`, `carouselArrows`, `carouselDots`, `slidesPerView` | mixed | Carousel options (Glider) |\n| Viewer settings (`viewerStyle`, `themeMode`, `customColor`, `toolbar`, `position`, `presentation`, `download`, `copy_text`, \u2026) | mixed | Same as PDF block \u2014 applied to lightbox |\n| **Pro:** `watermarkText`, `watermarkFontSize`, `watermarkColor`, `watermarkOpacity` | mixed | Watermark in lightbox |\n| `powered_by` | bool | Show \"Powered by EmbedPress\" credit |\n\n## Thumbnail pipeline\n\n`Pdf_Thumbnail_Handler.php` exposes two AJAX actions registered in `BlockManager.php`:\n\n- `ep_generate_pdf_thumbnail` \u2014 server-side PDF page 1 \u2192 image:\n  1. Look up WP-managed attachment preview if attachment exists.\n  2. Imagick fallback (`Imagick->setImageFormat('jpeg')`).\n- `ep_upload_pdf_thumbnail` \u2014 accept user-uploaded custom thumbnail \u2192 store as attachment, return URL/id.\n\nIf both fail, the card falls back to the play button icon over the layout's default background.\n\n## Lightbox modal\n\n`static/js/ep-pdf-lightbox.js` listens for clicks on `.ep-pdf-gallery-item`, reads the gallery block's viewer attrs from `data-` attributes, and renders the same iframe the standalone PDF block would. All viewer-side features (watermark, branding, content protection \u2014 Pro) work the same way.\n\n## Free vs Pro\n\n| Capability | Free | Pro |\n|---|---|---|\n| All four layouts | \u2713 | \u2713 |\n| Custom thumbnails | \u2713 | \u2713 |\n| Carousel autoplay/arrows/dots | \u2713 | \u2713 |\n| Watermark (text only) | \u2713 | \u2013 |\n| Watermark (full options) | \u2013 | \u2713 |\n| Custom logo overlay | \u2013 | \u2713 |\n| Content protection | \u2013 | \u2713 |\n\n## Common pitfalls\n\n- **Imagick may not be installed.** Without Imagick, server-side thumbnail fallback fails \u2014 cards show icon-only fallback. Don't add a hard error; degrade silently.\n- **`pdfItems` is an array of objects, not just URLs.** When migrating attributes, preserve `customThumbnailId`/`customThumbnailUrl` to avoid regenerating thumbnails.\n- **Carousel uses Glider.** Glider has known limitations on touch \u2014 test on real mobile, not just dev tools.\n- **Lightbox inherits viewer attrs from the gallery block, not from the picked PDF.** Setting toolbar position on the gallery affects every PDF opened via lightbox uniformly. There's no per-item viewer override.\n- **Open-at-page in the lightbox is fixed at 1** \u2014 `pageNumber` from the gallery block is not passed through.\n- **Bookshelf layout is purely CSS-based** \u2014 no special JS. If books look squished, check `thumbnailAspectRatio`.\n- **Per-item `playButtonIcon='none'`** doesn't exist \u2014 that toggle is gallery-wide. Hide via custom CSS scoped by item id.\n\n## Testing\n\n- **Smoke**: insert PDF Gallery block, add 3 PDFs, layout=grid \u2192 3 cards with thumbnails.\n- **Custom thumbnail**: upload custom image to one item \u2192 that card uses the custom image.\n- **Lightbox**: click any card \u2192 modal opens with PDF.js viewer.\n- **Carousel**: switch layout to carousel \u2192 arrows + dots work; autoplay rotates.\n- **Imagick missing**: simulate by removing imagick extension \u2192 server thumbnails fall back to icon view, no JS error.\n- **Pro lightbox watermark**: with Pro, set watermark \u2192 appears in opened PDF.\n", "features/pdf.md": "# PDF Embedder + 3D Flipbook\n\nRenders PDFs via the bundled Mozilla PDF.js viewer or, optionally, a 3D flipbook (Three.js + html2canvas). Both modes share the same Gutenberg block (`embedpress/embedpress-pdf`) and Elementor widget.\n\n## Two render modes inside one block\n\n- **PDF.js modern viewer** \u2014 `viewerStyle='modern'`. EmbedPress's themed wrapper around Mozilla's PDF.js. Color picker, toolbar config (download / copy / draw / etc.), open-at-page support.\n- **3D flipbook** \u2014 `viewerStyle='flip-book'` + `presentation=true`. Uses `3dflipbook.min.js` + Three.js + html2canvas + a separate PDF.js for page rasterization. Iframe-rendered through an admin-ajax endpoint.\n\n## Free vs Pro\n\n| Capability | Free | Pro |\n|---|---|---|\n| PDF.js viewer + theme + color picker | \u2713 | \u2713 |\n| 3D flipbook presentation mode (basic) | \u2713 | \u2713 |\n| Toolbar config + open-at-page | \u2713 | \u2713 |\n| Basic watermark text | \u2713 | \u2713 |\n| Watermark with full options (font size, opacity, color) | \u2013 | \u2713 |\n| Custom branding logo overlay | \u2013 | \u2713 |\n| Content protection (password + role) | \u2013 | \u2713 |\n| Advanced flipbook sound effects | \u2013 | \u2713 |\n\n## Architecture\n\n```\n   Block save/Editor \u2192 block.json + components/edit.js + save.js\n                           \u2502\n                           \u25bc\n   Frontend render \u2014 render_embedpress_pdf()\n                     EmbedPressBlockRenderer.php:410\n                           \u2502\n        \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n        \u25bc                  \u25bc                      \u25bc\n   viewerStyle='modern' viewerStyle='flip-book'   Pro filters:\n   <iframe src=         + presentation=true:      - watermark\n   static/pdf/web/      admin-ajax.php?action=    - custom logo overlay\n   viewer.html?file=\u2026&  get_flipbook_viewer&     - content protection gate\n   pageNumber=\u2026>        key=<base64-params>\n                           \u2502\n                           \u25bc\n                   static/pdf-flip-book/\n                   js/3dflipbook.min.js\n                   + js/three.min.js\n                   + js/html2canvas.min.js\n                   + js/pdf.min.js\n```\n\n## Code paths\n\n### Block + widget\n\n| File | Role |\n|---|---|\n| `src/Blocks/embedpress-pdf/block.json` | Block manifest |\n| `src/Blocks/embedpress-pdf/src/index.js` | Block registration |\n| `src/Blocks/embedpress-pdf/src/components/attributes.js` | Full attribute schema |\n| `src/Blocks/embedpress-pdf/src/components/edit.js` | Live editor |\n| `src/Blocks/embedpress-pdf/src/components/save.js` | Block save HTML |\n| `src/Blocks/embedpress-pdf/src/inspector.js` | Inspector panel |\n| `EmbedPress/Elementor/Widgets/Embedpress_Pdf.php` | Elementor widget |\n| `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php::render_embedpress_pdf` (~L410) | Server render |\n| `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php` (~L541-548) | Iframe `title` derived from filename (a11y) |\n| `EmbedPress/Shortcode.php` (~L1462-1466) | Flipbook URL assembly |\n| `EmbedPress/Shortcode.php::getParamData` (~L1257) | Base64-encoded `&key=` for flipbook params |\n| `EmbedPress/Includes/Classes/Helper.php::get_flipbook_renderer` | Returns `admin-ajax.php?action=get_flipbook_viewer` |\n\n### Frontend assets\n\n| Path | Role |\n|---|---|\n| `static/pdf/web/` | Bundled Mozilla PDF.js viewer (minified) |\n| `static/pdf/web/ep-scripts.js` (~L22, L48) | Reads `hashParams.get('key')` (flipbook params) and `pageNumber`; sets theme + watermark color |\n| `static/pdf/build/pdf.worker.js` | PDF.js worker |\n| `assets/js/vendor/pdfobject.js` | PDFObject fallback for browsers without iframe PDF support |\n| `static/pdf-flip-book/js/3dflipbook.min.js` | 3D flipbook renderer (minified \u2014 no source) |\n| `static/pdf-flip-book/js/three.min.js` | Three.js |\n| `static/pdf-flip-book/js/html2canvas.min.js` | Page \u2192 canvas |\n| `static/pdf-flip-book/js/pdf.min.js + pdf.worker.js` | Separate PDF.js for flipbook |\n| `static/pdf-flip-book/js/default-book-view.js` | jQuery init for flipbook UI controls |\n\n## Block attributes\n\n| Attribute | Type | Purpose |\n|---|---|---|\n| `href` | string | PDF URL |\n| `mime` | string | File MIME type |\n| `viewerStyle` | `'modern' \\| 'flip-book'` | Render branch |\n| `presentation` | bool (default true) | When `viewerStyle='flip-book'`, enables 3D presentation |\n| `pageNumber` | number (default 1) | **Open-at-page** (added 4.5.0). Passed via URL param to PDF.js viewer |\n| `themeMode` | `'default' \\| 'custom'` | Toolbar theme |\n| `customColor` | hex | Toolbar color |\n| `toolbar` | bool | Toolbar visibility |\n| `position` | `'top' \\| 'bottom'` | PDF.js toolbar position |\n| `flipbook_toolbar_position` | `'top' \\| 'bottom'` | Flipbook-specific toolbar position |\n| `download`, `copy_text`, `add_text`, `draw`, `add_image` | bool | Toolbar action toggles |\n| `zoomIn`, `zoomOut`, `fitView`, `bookmark`, `doc_rotation` | bool | Nav/zoom toggles |\n| `sound` | string | Flipbook page-flip sound |\n| **Pro:** `watermarkText`, `watermarkFontSize`, `watermarkColor`, `watermarkOpacity` | mixed | Watermark |\n| **Pro:** `customlogo`, `customlogoUrl`, `logoX`, `logoY`, `logoOpacity` | mixed | Custom branding overlay |\n| **Pro:** `lockContent`, `protectionType`, `contentPassword`, \u2026 | mixed | Content protection |\n\n## Open-at-page\n\n`pageNumber` block attribute \u2192 URL hash on the viewer iframe \u2192 `static/pdf/web/ep-scripts.js`:\n\n```js\npageNumber: hashParams.get('pageNumber')\n```\n\nPDF.js reads this and jumps the document on initial render. In flipbook mode, the value is included in the base64-encoded `key` payload and decoded by the flipbook renderer.\n\n## Common pitfalls\n\n- **Flipbook minified library is opaque.** `3dflipbook.min.js` ships without a source map. Bug-hunting requires reading the minified source or reproducing on `3dflipbook.net` demo.\n- **Two separate PDF.js bundles.** PDF.js modern viewer at `static/pdf/web/` and a separate PDF.js for flipbook at `static/pdf-flip-book/js/`. Don't unify without testing both modes \u2014 different versions / configs.\n- **Flipbook params are base64-encoded.** Don't dump the `key=` URL param to logs raw.\n- **Flipbook routed through `admin-ajax.php`** with action `get_flipbook_viewer`. If admin-ajax is blocked / aggressively cached, the flipbook iframe won't load.\n- **`viewerStyle='flip-book'` + `presentation=false`** is valid but odd \u2014 falls back to PDF.js with flipbook-toolbar styles. Prefer `presentation=true` for actual 3D mode.\n- **PDFObject fallback** is used by some legacy edge cases. Don't remove `assets/js/vendor/pdfobject.js` even if it looks unused.\n- **Iframe sandbox** for the PDF iframe inherits Shortcode.php's wrapper sandbox \u2014 tightening that sandbox can break PDF.js's drawing/text-selection (`allow-scripts` is required).\n- **Watermark + flipbook together** \u2014 watermark text is decoded from `key` in `ep-scripts.js` and overlaid via CSS. If your custom watermark isn't appearing, check `key` was generated with watermark fields populated.\n- **Block save() changes break old posts** \u2014 see [Gutenberg deprecation discipline](../gutenberg/README.md#deprecation-discipline). Add a `deprecated[]` entry before changing PDF block save().\n\n## Testing\n\n- **Smoke (modern)**: embed PDF, set `viewerStyle='modern'` \u2192 PDF.js viewer renders, toolbar shows configured items.\n- **Open-at-page**: set `pageNumber=5` \u2192 PDF opens at page 5.\n- **Smoke (flipbook)**: set `viewerStyle='flip-book'` + `presentation=true` \u2192 3D book renders.\n- **A11y**: inspect iframe \u2192 `title` attribute present.\n- **Pro watermark**: with Pro active, set watermark text + color \u2192 renders over both modes.\n- **Toolbar position**: switch `position` between top/bottom.\n", "features/social-share.md": "# Social Share\n\nPer-block toggleable share buttons (Facebook, X/Twitter, Pinterest, LinkedIn) rendered around any embed. **Fully free**, no Pro gating.\n\nImplemented as inline SVG icons in `target=\"_blank\"` anchors pointing at each platform's intent URL. No JS dependencies, no popup window code, no third-party SDKs.\n\n## Configuration\n\nPer embed: toggle on/off, position (top / right / bottom / left), per-platform toggles, custom title and description fields that override the post's defaults for richer share metadata.\n\n## Architecture\n\n```\n   Block save()\n     contentShare: bool\n     sharePosition: 'top' | 'right' | 'bottom' | 'left'\n     customTitle, customDescription\n     shareFacebook | shareTwitter | sharePinterest | shareLinkedin: bool\n            \u2502\n            \u25bc\n   src/Blocks/GlobalCoponents/social-share-html.js\n     Builds <div class=\"ep-social-share share-position-{pos}\">\n     For each enabled platform:\n       <a href=\"<intent-url>\" target=\"_blank\">\n         <svg .platform-{name}/>\n       </a>\n            \u2502\n            \u25bc\n   Frontend renders directly \u2014 no JS event handler beyond default link behavior\n            \u2502\n            \u25bc\n   CSS: assets/css/embedpress.css ~L1390-1470\n```\n\n## Code paths\n\n| File | Role |\n|---|---|\n| `src/Blocks/GlobalCoponents/social-share-control.js` | Inspector controls \u2014 toggle, position, customTitle, customDescription, per-platform toggles |\n| `src/Blocks/GlobalCoponents/social-share-html.js` | HTML builder \u2014 renders the share div with inline SVG icons |\n| `src/Blocks/<provider>/src/components/attributes.js` | Each provider block re-declares the share attributes (defaults vary, e.g. `shareFacebook:true`, `sharePosition:'right'`) |\n| `assets/css/embedpress.css` (~L1390-1470) | Layout + per-platform fill colors |\n\n## Block attributes (per host block)\n\n| Attribute | Type | Default | Purpose |\n|---|---|---|---|\n| `contentShare` | bool | false | Master toggle |\n| `sharePosition` | `'top' \\| 'right' \\| 'bottom' \\| 'left'` | `'right'` | Where buttons appear |\n| `customTitle` | string | \u2014 | Override post title in share |\n| `customDescription` | string | \u2014 | Override description |\n| `shareFacebook` | bool | true | Show FB button |\n| `shareTwitter` | bool | true | Show X button |\n| `sharePinterest` | bool | true | Show Pinterest button |\n| `shareLinkedin` | bool | true | Show LinkedIn button |\n\n## Share URLs\n\n- **Facebook**: `https://www.facebook.com/sharer/sharer.php?u=<post-url>&t=<title>`\n- **X/Twitter**: `https://twitter.com/intent/tweet?url=<post-url>&text=<title>`\n- **Pinterest**: `https://www.pinterest.com/pin/create/button/?url=<post-url>&description=<description>&media=<image>`\n- **LinkedIn**: `https://www.linkedin.com/shareArticle?mini=true&url=<post-url>&title=<title>&summary=<description>`\n\nAll components are URL-encoded inside `social-share-html.js`.\n\n## CSS palette\n\n| Class | Color |\n|---|---|\n| `.facebook { fill: #475a96 }` | FB blue |\n| `.twitter { fill: #1DA1F2 }` | Legacy bird blue (pre-X rebrand) |\n| `.pinterest` | Pinterest red |\n| `.linkedin` | LinkedIn blue |\n\n`.ep-social-share` is a flex row/column depending on `share-position-*`.\n\n## Common pitfalls\n\n- **Twitter color is the legacy bird blue.** Update if/when re-branding to X (black).\n- **No popup window code.** Buttons are plain `target=\"_blank\"` links. Opening a `window.open(...)` style popup is a feature add \u2014 current code does nothing JS-side.\n- **Pinterest needs an image URL.** The `media` param requires the embed thumbnail; without it, Pinterest's modal asks the user to pick. The host block must expose a thumbnail.\n- **Custom title/description fall back to the post's title** if not set. The fallback is in `social-share-html.js`, not server-side \u2014 view source if customers report wrong text being shared.\n- **Position class is rendered into HTML** (`.share-position-right` etc.). Don't change class names without updating the CSS file.\n- **Each provider block redeclares share attributes** in its own `attributes.js`. Adding a 5th platform (e.g., WhatsApp) requires touching every provider block + the global JS module.\n- **No analytics integration.** Clicks are not tracked.\n- **No preview in the editor.** The Inspector shows toggles, but the editor canvas may not render the buttons depending on the host block's render path. Test in the frontend, not just the editor.\n\n## Testing\n\n- **Smoke**: enable share on a YouTube embed, position right \u2192 4 buttons appear right of the iframe.\n- **Click**: each button opens the correct intent URL in a new tab with the post URL pre-filled.\n- **Custom title**: set `customTitle='X'` \u2192 share dialog uses 'X' instead of post title.\n- **Per-platform**: disable Pinterest only \u2192 3 buttons render.\n- **Position**: switch positions, verify CSS rearranges.\n", "features/wrapper.md": "# Universal Wrapper\n\nThe fallback provider. Lets users embed any URL when no specific provider matches. Implemented as `EmbedPress\\Providers\\Wrapper` with a permissive URL regex; rendered as a sandboxed iframe.\n\n## Why we ship it\n\nCustomers paste arbitrary URLs constantly. Without a fallback, EmbedPress would say \"we don't support that source\" and the user would leave. Wrapper catches everything and tries to render *something* useful \u2014 usually a sandboxed iframe pointing at the URL.\n\n## Architecture\n\n```\n   User pastes URL \u2192 oEmbed pipeline\n                         \u2502\n                         \u25bc\n   add_filter('oembed_providers', addOEmbedProviders)\n   (Core.php:137 \u2014 registers Wrapper LAST)\n                         \u2502\n                         \u25bc\n   ProviderAdapter::match(url) iterates registered providers\n                         \u2502\n                         \u25bc\n   No specific provider matches\n                         \u2502\n                         \u25bc\n   Wrapper.php:43-46 regex matches:\n   /^(https?:\\/\\/)?(www\\.)?[a-z0-9]+([\\-\\.]{1}[a-z0-9]+)*\\.[a-z]{2,5}(:[0-9]{1,5})?(\\/.*)?$/i\n                         \u2502\n                         \u25bc\n   modifyResponse() returns fake oEmbed payload (Wrapper.php:68-71)\n   with empty html \u2014 Shortcode.php replaces with sandboxed iframe\n                         \u2502\n                         \u25bc\n   <div class=\"embedpress-wrapper ose-embedpress-responsive\">\n     <iframe src=\"<url>\" sandbox=\"\u2026\" allowFullScreen></iframe>\n   </div>\n```\n\n## Code paths\n\n| File | Role |\n|---|---|\n| `EmbedPress/Providers/Wrapper.php` | Provider class. Match regex (~L43-46). Fake oEmbed response (~L68-71). |\n| `EmbedPress/Core.php` (~L137) | `add_filter('oembed_providers', [$this, 'addOEmbedProviders'])` \u2014 registers Wrapper at the end |\n| `EmbedPress/Shortcode.php` (~L300-400) | Renders the iframe with sandbox attributes |\n| `assets/css/embedpress.css` (~L1360+) | `.embedpress-wrapper` + `.ose-embedpress-responsive` responsive container |\n\n## Output\n\nDefault sandbox: `allow-modals allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox`. Plus `allowFullScreen=\"true\"` and a configurable width/height wrapper.\n\n```html\n<div class=\"embedpress-wrapper ose-embedpress-responsive\">\n    <iframe src=\"<URL>\"\n            width=\"600\" height=\"400\"\n            sandbox=\"allow-modals allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox\"\n            allowfullscreen></iframe>\n</div>\n```\n\nThe wrapper **does not** strip `X-Frame-Options` headers (it can't \u2014 that's a browser-enforced rule). If the target host responds `DENY` or `SAMEORIGIN`, the iframe renders blank with no useful error.\n\n## Common pitfalls\n\n- **`X-Frame-Options: DENY` / `SAMEORIGIN` headers** are common on news sites, banking, social media. Wrapper can't bypass them. When customers report \"the embed is blank\", check the target's response headers before diagnosing further.\n- **CSP `frame-ancestors`** is the modern equivalent and is just as binding.\n- **The match regex is permissive** (any `http(s)://host/.../...`). Deliberate \u2014 it's the fallback. But malformed URLs sometimes match and produce broken iframes. Don't tighten without checking the test suite.\n- **Wrapper is registered LAST.** If you accidentally register a new specific provider AFTER Wrapper in `Core.php:137`, that provider will never match. Always insert above the Wrapper line.\n- **`modifyResponse()` returns empty HTML** \u2014 the actual iframe is built by `Shortcode.php`. Don't try to inject markup into the oEmbed payload.\n- **No proxy / no SSR.** EmbedPress doesn't fetch and re-serve the URL \u2014 it's pure client-side iframing. Don't recommend Wrapper for sites that require auth.\n- **Sandbox is wrapper-wide.** The same sandbox is used for every Wrapper embed. Tightening it (removing `allow-scripts`) breaks most pages; loosening it (`allow-top-navigation`) is risky. Leave it alone unless responding to a specific report.\n\n## When to graduate to a real provider\n\nIf you find yourself supporting many URLs from one host through Wrapper, that host deserves a real provider. The signs:\n\n- Customers report the iframe doesn't load \u2192 upstream blocks framing \u2192 you need a real provider that uses their official embed endpoint.\n- Customers want platform-specific controls (autoplay, color, \u2026).\n\n## Testing\n\n- **Frame-friendly site**: paste e.g. `https://example.com/` \u2192 renders inside wrapper.\n- **Frame-blocked site**: paste `https://www.google.com/` \u2192 iframe blank (Google sets `X-Frame-Options`). Expected, not a bug.\n- **Custom dimensions**: set wrapper width/height \u2192 iframe respects them.\n- **Sandbox**: inspect rendered iframe \u2192 expected sandbox tokens present.\n", "guides/build-pipeline.md": "# Build & Asset Pipeline\n\nHow `src/` becomes `assets/`.\n\n## Tools\n\n- **Vite** for JS/TS/SCSS bundling.\n- **Composer** for PHP autoload + vendor libs.\n- **WordPress build hooks** are NOT used \u2014 we use Vite, not `@wordpress/scripts`, because we have non-block bundles (admin UI, frontend tracker).\n\n## Commands\n\n```bash\nnpm install               # install deps (Node \u2265 20, npm \u2265 10)\nnpm run start             # vite build --watch\nnpm run build             # production build \u2192 assets/\nnpm run type-check        # tsc --noEmit\nnpm run lint              # eslint src/\nnpm run pot               # regenerate languages/embedpress.pot\n```\n\n## What's committed\n\n| Path | Committed? | Why |\n|---|---|---|\n| `src/` | \u2713 | Source of truth |\n| `assets/` | \u2713 | WP.org users don't run `npm` |\n| `static/` | \u2713 | Vendored libs (PDF.js, flipbook, Plyr) |\n| `vendor/` | \u2713 | Composer for WP.org |\n| `node_modules/` | \u2717 | Reproducible from `package-lock.json` |\n\n## Vite entry points\n\n`vite.config.js` defines multiple entry points:\n\n```\nsrc/Blocks/index.js          \u2192 assets/blocks.build.js\nsrc/Frontend/index.js        \u2192 assets/embedpress.build.js\nsrc/Analytics/tracker.js     \u2192 assets/analytics.build.js\nsrc/Analytics/dashboard.js   \u2192 assets/analytics-dashboard.build.js\nsrc/AdminUI/index.js         \u2192 assets/admin.build.js\n\u2026\n```\n\nEach block's individual editor JS is built into a per-block bundle (`assets/<block-name>.build.js`).\n\n## Asset enqueuing\n\n`Core/AssetManager.php` is the central enqueue point. Most bundles are enqueued **conditionally**:\n\n- Block editor JS \u2014 only on the post edit screen\n- Frontend player runtime \u2014 only when an embed marker class is in the page\n- Analytics tracker \u2014 only when analytics is enabled and embeds exist\n- Admin UI \u2014 only on EmbedPress admin pages\n\nThis keeps page weight low for sites that don't use a particular feature.\n\n## Versioning\n\nBundle URLs include `?ver=EMBEDPRESS_PLUGIN_VERSION` for cache busting. **The version constant must be bumped on release** or browsers will serve cached old bundles.\n\nFor development, `define('EMBEDPRESS_DEV_MODE', true)` in `wp-config.php` swaps the version for `time()`, defeating the cache.\n\n## i18n\n\n`npm run pot` runs `wp i18n make-pot` (or equivalent) to extract translatable strings from PHP and JS. Output: `languages/embedpress.pot`. Translation files (`embedpress-<locale>.po`/`mo`) come from WP.org's translation platform.\n\n## Bundle size\n\nWatch the build output. Bundles over ~200KB raw should be reviewed \u2014 PDF.js and 3D flipbook are bigger because we vendor them. New runtime code should aim small. If a bundle grows substantially, profile imports for tree-shaking opportunities.\n", "guides/coding-standards.md": "# Coding Standards\n\nThe conventions we hold ourselves to.\n\n## PHP\n\n- **PSR-style autoload** (`AutoLoader.php`). One class per file, file name matches class name.\n- **Namespace**: `EmbedPress\\\u2026` for the plugin, `Embedpress\\Pro\\\u2026` for Pro.\n- **WPCS** (WordPress Coding Standards) checked via `phpcs.xml`. Run `composer run-script phpcs` (or via `make lint-php`).\n- **No raw `print_r` / `var_dump`** in committed code. Use `error_log` for one-off debugging and remove before merging.\n- **Always escape on output**: `esc_html`, `esc_attr`, `esc_url`, `wp_kses`. Even data you \"trust.\"\n- **Always sanitize on input**: `sanitize_text_field`, `absint`, `esc_url_raw` (for storage).\n- **Translate all user-facing strings**: `__('Text', 'embedpress')`. Don't concatenate translated strings \u2014 use placeholders.\n\n## JavaScript / TypeScript\n\n- **ESLint** config at repo root. Run `npm run lint`.\n- **TypeScript** for new code in `src/`. JS-only files exist for legacy reasons.\n- **React functional components** with hooks. No class components.\n- **No `any`** without an explanatory comment.\n- **Prefer pure functions** over class state for utilities.\n\n## File naming\n\n| What | Convention | Example |\n|---|---|---|\n| PHP class file | PascalCase, matches class | `Feature_Enhancer.php`, `Youtube.php` |\n| JS source | kebab-case | `custom-player-controls.js` |\n| Block folder | kebab-case | `embedpress-pdf/`, `pdf-gallery/` |\n| CSS | kebab-case | `embedpress.css` |\n| Test files | `*.spec.ts` (Playwright) / `*Test.php` (PHPUnit) | `youtube.spec.ts` |\n\n## Class naming\n\n- **Providers**: `EmbedPress\\Providers\\<ProperName>` \u2014 `Youtube`, `GoogleMaps`, `SelfHosted`.\n- **Services**: `EmbedPress\\<Domain>\\<Service>` \u2014 `Analytics\\Analytics`, `Gutenberg\\BlockManager`.\n- **Helpers**: kept under `EmbedPress\\Includes\\Classes\\` with a descriptive suffix \u2014 `Feature_Enhancer`, `Helper`.\n\n## Security checklist (every PR)\n\n- [ ] All user input sanitized at the boundary.\n- [ ] All output escaped at the print site.\n- [ ] All AJAX / REST calls have a nonce check via `permission_callback`.\n- [ ] No raw SQL \u2014 use `$wpdb->prepare` for everything.\n- [ ] No `eval`, no dynamic `include`/`require` of user-controlled paths.\n- [ ] No bundled libs without verified provenance.\n\n## Performance\n\n- **Don't enqueue scripts globally.** Use marker class detection in `AssetManager` so each runtime only loads when needed.\n- **Cache external HTTP calls.** Transients with 12-hour TTL by default.\n- **No N+1 in admin lists.** When iterating embeds for analytics dashboards, use a single aggregated query.\n- **No synchronous network in the request path.** Provider fetches that can be slow should be cached or queued.\n", "guides/debugging.md": "# Debugging & Troubleshooting\n\nPractical tactics for hunting EmbedPress bugs.\n\n## Turn on the right knobs\n\n```php\n// wp-config.php\ndefine('WP_DEBUG', true);\ndefine('WP_DEBUG_LOG', true);\ndefine('WP_DEBUG_DISPLAY', false);\ndefine('SCRIPT_DEBUG', true);            // load unminified JS\n\n// Force fresh asset URLs every page load (skip browser cache)\ndefine('EMBEDPRESS_DEV_MODE', true);\n```\n\n`SCRIPT_DEBUG` makes WP load unminified bundles \u2014 much easier to set breakpoints. `EMBEDPRESS_DEV_MODE` swaps `EMBEDPRESS_PLUGIN_VERSION` for `time()` so the version query string changes on every request.\n\n## Tail the debug log\n\n```bash\nmake wp-debug-log\n# or\ntail -f wp-content/debug.log\n```\n\n## Common symptoms \u2192 first place to look\n\n### \"Embed shows up as a plain link, not the expected widget\"\n\n1. Did the URL match a provider? Look at `Core::parseContent` flow \u2014 did it fall through to `Wrapper`?\n2. Is the provider's `validateUrl` regex too strict? Test it with `preg_match` in `wp shell`.\n3. Is the URL on its own line (auto-embed requirement) or wrapped in something else?\n\n### \"Block renders fine in editor but blank on frontend\"\n\n1. Check `render_callback` \u2014 is it returning a string? An empty return = blank output.\n2. Open browser console \u2014 JS error in the player runtime?\n3. Does the marker class exist in DOM? If yes but no JS runs, AssetManager didn't enqueue.\n4. Look in the network tab \u2014 is `embedpress.build.js` 200ing?\n\n### \"Block contains unexpected or invalid content\"\n\nYou changed `save()` output without a `deprecated[]` entry. See [Gutenberg deprecation](../gutenberg/README.md#deprecation-discipline).\n\n### \"Pro feature doesn't activate\"\n\n1. Is Pro plugin active? `wp plugin list`.\n2. Did Pro hook the filter slot? Add a `error_log` to confirm Pro's callback fires.\n3. Is the free filter slot still present? `grep apply_filters EmbedPress/...`.\n\n### \"Custom Player UI doesn't appear for self-hosted format X\"\n\nYou forgot one of the **five `isSelfHostedVideo` regex copies**. See [Custom Player](../features/custom-player.md). Update all five.\n\n### \"Analytics counts wrong\"\n\n1. Is the marker class on the embed wrapper?\n2. Is the tracker bundle enqueued? Check network tab.\n3. Is the REST endpoint returning 200? Look in `wp-content/debug.log` for write failures.\n4. Is there an ad-blocker hitting `/wp-json/embedpress/`? Surprisingly common \u2014 some blocklists target `analytics` paths.\n\n### \"Broken Embeds Detector flags working URLs\"\n\n1. Is the URL same-origin? It shouldn't reach the network probe \u2014 verify `home_url()` / `site_url()` host match logic.\n2. Does the host return non-404 codes (403/429/5xx)? Those should map to `STATUS_UNKNOWN`, not `STATUS_BROKEN`.\n3. Is the User-Agent reaching the host? Some CDNs strip non-Mozilla UAs.\n\nSee the skill notes for the detector's full false-positive history.\n\n## Tracing a render\n\nAdd a temporary `error_log` chain:\n\n```php\n// EmbedPress/Core.php, in parseContent\nerror_log('[EP] parseContent url=' . $url);\nerror_log('[EP] matched provider=' . $providerClass);\nerror_log('[EP] final HTML length=' . strlen($html));\n```\n\nRemove before committing.\n\n## Debugging from `wp shell`\n\n```bash\nmake wp ARG=\"shell\"\n```\n\n```php\n$core = \\EmbedPress\\Core::getInstance();\n$html = $core->parseContent('https://www.youtube.com/watch?v=abc123');\necho $html;\n```\n\nThis is the fastest way to confirm a URL routes correctly without the editor or frontend in the loop.\n\n## Provider regex testing\n\n```bash\nmake wp ARG=\"shell\"\n```\n\n```php\n$url = 'https://acme.example.com/watch/abc';\n$provider = new \\EmbedPress\\Providers\\AcmeVideo($url);\nvar_dump($provider->validateUrl(new \\Embera\\Url($url)));\n```\n\n## Frontend JS debugging\n\n- Use the browser's source map navigation \u2014 built bundles include source maps.\n- `window.embedpressDebug = true` enables a verbose log in the player runtime (recent versions).\n\n## When to escalate\n\nIf a bug reproduces on a clean WP install with only EmbedPress free + Pro active, it's an EmbedPress bug. If it only reproduces with a specific theme or plugin combo, suspect a CSS / JS conflict and start with `Twenty Twenty-Four` + minimal plugin set to isolate.\n", "guides/extending.md": "# Extending EmbedPress\n\nCommon extension scenarios with concrete recipes.\n\n## \"I want to add a new embed source\"\n\n\u2192 See [Adding a Provider](../providers/adding-a-provider.md).\n\n## \"I want to add an option to the YouTube block\"\n\nThe shortest path:\n\n1. Add the attribute to `src/Blocks/youtube/block.json`.\n2. Add a control in `src/Blocks/youtube/inspector.js`.\n3. Read it in the YouTube block's render callback in `EmbedPressBlockRenderer.php`.\n4. Forward to `Core::parseContent` as part of `$attrs`.\n5. In `Feature_Enhancer`, hook `embedpress_youtube_params` to translate the attribute into a URL param.\n\n## \"I want a feature to apply to all providers\"\n\nHook `embedpress_render` in `Feature_Enhancer::init()`:\n\n```php\nadd_filter('embedpress_render', function ($html, $url, $atts) {\n    if (!empty($atts['my_feature_enabled'])) {\n        $html = '<div class=\"my-feature\">' . $html . '</div>';\n    }\n    return $html;\n}, 10, 3);\n```\n\nThen add the `my_feature_enabled` toggle to whichever surfaces you want it on (block + Elementor + shortcode att).\n\n## \"I want a Pro-only feature\"\n\n1. Add the UI to free wrapped in `pro_class` so it shows as a locked upsell.\n2. Add the **filter slot** in free where the feature would attach.\n3. In Pro, hook the filter and implement the feature.\n4. Pro returns `''` for `embedpress_pro_class` so the lock styling drops on its UI when Pro is active.\n\nThis way, the UI source is single-sourced in free, and the implementation is single-sourced in Pro.\n\n## \"I want to register an additional provider from a custom plugin\"\n\n```php\nadd_action('embedpress_after_register_providers', function ($embera) {\n    $embera->addProvider('myservice.com', \\My\\Plugin\\Providers\\MyService::class);\n});\n```\n\nYour provider class must follow the same shape as built-in providers (extend `Embera\\Adapters\\Service`, implement `validateUrl` + `modifyResponse`).\n\n## \"I want to track custom analytics events\"\n\nUse the analytics REST endpoint:\n\n```js\nfetch('/wp-json/embedpress/v1/analytics/track', {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json', 'X-WP-Nonce': window.wpApiSettings.nonce },\n    body: JSON.stringify({ event: 'my_event', embed_id: 123, meta: { \u2026 } }),\n});\n```\n\nFor deeper integration, hook the PHP-side Analytics service.\n\n## \"I want to override how a specific block renders\"\n\nDon't fork the block. Instead:\n\n- Hook `embedpress_render` and short-circuit if `$atts['provider'] === 'youtube'` (or whatever).\n- Return your custom HTML.\n\nThis survives plugin updates.\n\n## What you should not do\n\n- Don't `require` files from the EmbedPress folder structure directly. Paths can change.\n- Don't extend EmbedPress's classes from your plugin. Use filters/actions instead \u2014 extension breaks on internal refactors.\n- Don't write to EmbedPress's option keys. Use a prefix of your own.\n", "guides/hooks-and-filters.md": "# Hooks & Filters Reference\n\nThe actions and filters EmbedPress fires that you (or Pro) can hook.\n\n> The hook names below were verified against `EmbedPress/Includes/Classes/Feature_Enhancer.php`, `EmbedPress/Shortcode.php`, `EmbedPress/Core.php`, and `embedpress-pro/includes/Filters/*.php`. Note the inconsistent naming style \u2014 historical reasons; do not \"normalize\" without coordinating with Pro.\n\n## Naming style\n\nThree styles coexist:\n\n- **Colon-separated** (oldest): `embedpress:onAfterEmbed`, `embedpress:onBeforeEmbed`, `embedpress:isEmbra`\n- **Slash-separated** (Pro extension hooks): `embedpress/pro_class`, `embedpress/pro_text`, `embedpress/is_allow_rander`, `embedpress/generate_ad_template`, `embedpress/display_password_form`, `embedpress/content_protection_content`, `embedpress/instafeed_reaction_count`, `embedpress/calendly_event_data`, `embedpress/elementor_enhancer_<provider>`\n- **Underscore-separated** (newer feature hooks): `embedpress_excluded_height_sources`, `embedpress_should_modify_spotify`, `embedpress_additional_service_providers`, `embedpress_gutenberg_youtube_params`, `embedpress_elementor_embed`\n\nUse the existing style of the area you're hooking \u2014 don't introduce a fourth.\n\n## Filters \u2014 embed pipeline\n\n### `embedpress:isEmbra`\n**Where:** `Shortcode::parseContent`, line 304.\n**Signature:** `apply_filters('embedpress:isEmbra', $isEmbra, $url, $atts)`\n**Purpose:** Decide whether the URL should be routed to a custom Provider class (returns true) or to WordPress's native `WP_oEmbed::fetch` (returns false).\n**Hooked by:** `Feature_Enhancer::isEmbra()` returns true for YouTube, TikTok, Spreaker, GooglePhotos, and the Wrapper fallback.\n\n### `embedpress:onBeforeEmbed`\n**Where:** `Shortcode::parseContent`, line 336.\n**Purpose:** Pre-embed processing \u2014 mutate the request before the provider builds its HTML.\n\n### `embedpress:onAfterEmbed`\n**Where:** `Shortcode::parseContent`, line 540.\n**Priority:** Feature_Enhancer hooks at priority 90.\n**Purpose:** Decorate the rendered HTML \u2014 the central extension point.\n**Hooked by:** `Feature_Enhancer::enhance_youtube`, `enhance_vimeo`, `enhance_twitch`, `enhance_dailymotion`, `enhance_soundcloud`, `enhance_missing_title`. Pro also hooks here via `Feature_Enhancer_Pro` and per-provider extenders.\n\n```php\nadd_filter('embedpress:onAfterEmbed', function ($html, $url, $atts) {\n    return '<div class=\"my-wrap\">' . $html . '</div>';\n}, 100, 3);\n```\n\n## Filters \u2014 provider registry\n\n### `embedpress_additional_service_providers`\n**Where:** `Core::getAdditionalServiceProviders`, line 763.\n**Purpose:** Add or modify the URL\u2192Provider class registry.\n\n```php\nadd_filter('embedpress_additional_service_providers', function ($providers) {\n    $providers[\\EmbedPress\\Providers\\My_Provider::class] = ['myhost.com', '*.myhost.com'];\n    return $providers;\n});\n```\n\n## Filters \u2014 Pro UI gating\n\nThese return strings that Pro flips to empty when active.\n\n### `embedpress/pro_class`\n**Default (free):** returns `'pro_class'` so the wrapping element gets locked styling.\n**Pro callback:** `Embedpress\\Pro\\Filters\\Utility` returns `''`.\n\n### `embedpress/pro_text`\n**Default:** returns `'Pro'` (the badge text).\n**Pro callback:** returns `''`.\n\n### `embedpress/pro_label`\nSimilar \u2014 Pro replaces with empty.\n\n### `embedpress/is_allow_rander`\n**Purpose:** Should this embed render at all? Used by content protection / license gating to suppress rendering.\n\n## Filters \u2014 Pro feature slots\n\nThese are real hooks Pro implements. Free defines the slot via `apply_filters` so Pro can fill it; without Pro, the default is a no-op or upsell stub.\n\n| Filter | Where applied (free) | Pro callback |\n|---|---|---|\n| `embedpress/generate_ad_template` | Showcase Ads template emission | `Filters\\Utility::generate_ad_template` |\n| `embedpress/display_password_form` | Content Protection password gate | `Filters\\Utility::display_password_form` |\n| `embedpress/content_protection_content` | Content Protection content swap | `Filters\\Utility::content_protection_content` |\n| `embedpress/instafeed_reaction_count` | Instagram feed reactions | `Filters\\Utility` |\n| `embedpress/instafeed_tab_option` | Instagram feed tab option | `Filters\\Utility` |\n| `embedpress/calendly_event_data` | Calendly event sync | `Filters\\Calendly` |\n| `embedpress/calendly_sync_button` | Calendly sync UI | `Filters\\Calendly` |\n| `embedpress/calendly_connect_text_label` | Calendly connect label | `Filters\\Calendly` |\n| `embedpress/connected_text_label` | Calendly connected state | `Filters\\Calendly` |\n| `embedpress_google_photos_attributes` | Google Photos attribute map | `Filters\\GooglePhotos` |\n| `embedpress_google_helper_shortcode` | Google Calendar shortcode | `Filters\\Calendar` |\n| `embedpress/elementor_enhancer_youtube` | Elementor YT enhancements | `Filters\\Elementor_Enhancer_Pro` |\n| `embedpress/elementor_enhancer_vimeo` | Elementor Vimeo | same |\n| `embedpress/elementor_enhancer_wistia` | Elementor Wistia | same |\n| `embedpress/elementor_enhancer_soundcloud` | Elementor SoundCloud | same |\n| `embedpress/elementor_enhancer_dailymotion` | Elementor Dailymotion | same |\n| `embedpress/elementor_enhancer_twitch` | Elementor Twitch | same |\n| `embedpress_enhance_soundcloud` | SoundCloud enhancement | `Filters\\Feature_Enhancer_Pro` |\n| `embedpress_enhance_dailymotion` | Dailymotion enhancement | `Filters\\Feature_Enhancer_Pro` |\n| `embedpress_wistia_block_attributes` | Wistia block attribute extension | `Filters\\Feature_Enhancer_Pro` |\n\n## Filters \u2014 block / shortcode tweaks\n\n### `embedpress_gutenberg_youtube_params`\n**Purpose:** Mutate YouTube URL params for Gutenberg renders.\n\n### `embedpress_elementor_embed`\n**Where:** `Embedpress_Elementor::render`, around line 4535.\n**Purpose:** Decorate the rendered embed object during Elementor render.\n\n### `embedpress_excluded_height_sources`\n**Where:** `embedpress.php`.\n**Purpose:** List of provider aliases for which we should *not* force a height \u2014 defaults include `opensea` and `google-photos`.\n\n### `embedpress_should_modify_spotify`\n**Where:** `Shortcode::parseContent`.\n**Purpose:** Conditionally wrap Spotify embeds with our own theming.\n\n### `embed_apple_podcast`\n**Where:** Shortcode pipeline.\n**Hooked by:** `Embedpress\\Pro\\F
