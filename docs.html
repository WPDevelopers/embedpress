ilters\\Utility`.\n\n## Actions\n\n### `embedpress_before_init`\n**Where:** Plugin bootstrap.\n**Purpose:** Fires early, before Core/CoreLegacy initialize. Use for very-early registrations.\n\n### `embedpress_cache_cleanup_action`\n**Where:** Scheduled cron event (daily).\n**Purpose:** Trigger cache cleanup of `/wp-content/uploads/embedpress/`.\n\n### `embedpress_gutenberg_embed`\n**Hooked by:** Feature_Enhancer for Gutenberg-specific embed tweaks.\n\n### `embedpress_gutenberg_wistia_block_after_embed`\n**Hooked by:** Feature_Enhancer for Wistia block post-processing.\n\n## REST endpoint (free)\n\nOnly one routes-level hook surface here:\n\n`POST/GET /embedpress/v1/oembed/{provider}` \u2014 `RestAPI::oembed` callback. Internally re-dispatches to `Shortcode::parseContent`.\n\n## How to discover internal hooks\n\n```bash\ngrep -rn \"do_action\\|apply_filters\" EmbedPress/ | grep -v \"^vendor\\|node_modules\"\n```\n\nMany hooks beyond this list exist for narrow purposes; they're not part of the public contract. If you find one you'd like to depend on, file an issue to formalize it.\n\n## Versioning policy\n\n- **Adding a new hook**: never breaks anything.\n- **Adding parameters to an existing hook**: backwards-compatible.\n- **Removing a hook or removing parameters**: breaking change \u2014 only across major versions, and only after Pro and known integrations have migrated.\n", "guides/testing.md": "# Testing\n\nThree layers: PHP unit / integration, JS unit, browser E2E.\n\n## PHP\n\n- **Unit**: `make test-php-unit` (PHPUnit, isolated)\n- **Integration**: `make test-php-integration` (boots WP, hits DB)\n\nConfig: `phpunit.xml` at the repo root.\n\n## JS\n\n- **Unit**: `npm run test` (Vitest)\n- **Type-check**: `npm run type-check`\n- **Lint**: `npm run lint`\n\n## Browser E2E (Playwright)\n\nThe big one.\n\n```bash\nnpm run test:e2e               # everything\nnpm run test:e2e:gutenberg     # block tests\nnpm run test:e2e:elementor     # widget tests\nnpm run test:e2e:classic       # shortcode + auto-embed tests\nnpm run test:e2e:dashboard     # admin / analytics\nnpm run test:e2e:ui            # general UI smoke\nnpm run test:e2e:headed        # show the browser\n```\n\nSuites are organized under `tests/playwright/<surface>/`. Each provider typically has a `<provider>.spec.ts` per surface.\n\nThere's also a separate repo, `embedpress-playwright-automation`, that mirrors customer-facing scenarios. The inline suite is for daily dev; the standalone repo is for QA / regression sweeps.\n\n## What to test before merging\n\n| Change | Required tests |\n|---|---|\n| New provider | E2E paste in editor + frontend render in **all four** surfaces (block, widget, shortcode, auto-embed) |\n| Block save() change | Gutenberg E2E, including loading a post written before the change to confirm the deprecation entry works |\n| Elementor control | Elementor E2E for that widget |\n| Custom Player change | All Custom Player formats (YT, Vimeo, Wistia, MP4, HLS) |\n| Analytics tweak | Dashboard E2E + at least one tracker write test |\n| Pro feature | Both Pro-active and Pro-inactive states |\n\n## Writing a Playwright test\n\n```ts\nimport { test, expect } from '@playwright/test';\nimport { loginAsAdmin, openNewPost } from '../helpers';\n\ntest('YouTube block renders iframe on frontend', async ({ page }) => {\n    await loginAsAdmin(page);\n    await openNewPost(page);\n\n    // Insert block, set URL\n    await page.click('button[aria-label=\"Add block\"]');\n    await page.fill('input[placeholder=\"Search blocks\"]', 'YouTube');\n    await page.click('button:has-text(\"YouTube\")');\n    await page.fill('.ep-url-input', 'https://www.youtube.com/watch?v=abc123');\n\n    // Publish + view\n    await page.click('button:has-text(\"Publish\")');\n    await page.click('button:has-text(\"View Post\")');\n\n    // Assert iframe exists\n    await expect(page.locator('iframe[src*=\"youtube.com/embed/abc123\"]')).toBeVisible();\n});\n```\n\n## Local-only tests\n\nFor things that need a live external endpoint (Wistia, real YouTube), prefer to skip in CI and mock the HTTP layer. Tests that hit live external services are flaky and slow.\n\n## Regression sweep before release\n\n```bash\nnpm run type-check\nnpm run lint\nnpm run test\nnpm run test:e2e\nmake test-php\n```\n\nIf any of these fail, the release is not ready.\n", "gutenberg/README.md": "# Gutenberg Architecture\n\nHow EmbedPress integrates with the WordPress block editor.\n\n## What ships\n\nEmbedPress contributes a family of blocks under the `embedpress/` namespace, registered via `EmbedPress\\Gutenberg\\BlockManager` (in `EmbedPress/Gutenberg/BlockManager.php`).\n\n### Server-rendered blocks (have a PHP `render_callback`)\n\n| Block name | Render callback (in `EmbedPressBlockRenderer`) | Role |\n|---|---|---|\n| `embedpress/embedpress` | `render` | **Generic / catch-all** for 250+ providers. The main block. |\n| `embedpress/embedpress-pdf` | `render_embedpress_pdf` | PDF.js or 3D flipbook viewer for PDFs |\n| `embedpress/document` | `render_document` | DOC / DOCX / PPT / PPTX / XLS / XLSX viewer |\n| `embedpress/embedpress-calendar` | `render_embedpress_calendar` | Google Calendar |\n| `embedpress/youtube-block` | `render_youtube_block` | Minimal legacy YouTube block |\n| `embedpress/wistia-block` | `render_wistia_block` | Minimal legacy Wistia block |\n| `embedpress/pdf-gallery` | `render_pdf_gallery` | Multi-PDF grid / carousel / bookshelf |\n\n### Client-rendered blocks (no server `render_callback`)\n\nThese have a `block.json` and an `edit.js` but rely on save() output / client iframes:\n\n- `embedpress/google-docs-block`\n- `embedpress/google-sheets-block`\n- `embedpress/google-slides-block`\n- `embedpress/google-forms-block`\n- `embedpress/google-drawings-block`\n- `embedpress/google-maps-block`\n- `embedpress/twitch-block`\n\nThe 250+ providers are not \"one block per provider.\" Most providers are reached through the **generic `embedpress/embedpress` block**. Specialized blocks exist only when the UX needs more than a URL field \u2014 PDFs need viewer toggles + lightbox, documents need format-specific routing, gallery needs multi-item management, calendar needs event display, etc.\n\n## Lifecycle\n\n```\nWordPress init\n    \u2514\u2500 EmbedPress\\Gutenberg\\InitBlocks (boot)\n        \u2514\u2500 BlockManager\n            \u251c\u2500 register every block from src/Blocks/<name>/block.json\n            \u251c\u2500 wire each block.json's render_callback to EmbedPressBlockRenderer::<method>\n            \u2514\u2500 enqueue editor JS bundles\n```\n\nEditor-side, `edit.js` provides the React UI. On render, WordPress invokes the matching `render_*` callback.\n\n## Block folder layout\n\n```\nsrc/Blocks/<block-name>/\n\u251c\u2500\u2500 block.json           \u2190 name, attributes schema, supports\n\u251c\u2500\u2500 index.js             \u2190 registerBlockType()\n\u251c\u2500\u2500 edit.js              \u2190 editor component\n\u251c\u2500\u2500 save.js              \u2190 static save (or null for fully dynamic)\n\u251c\u2500\u2500 inspector.js         \u2190 <InspectorControls>\n\u251c\u2500\u2500 style.scss           \u2190 frontend styles\n\u2514\u2500\u2500 editor.scss          \u2190 editor-only styles\n```\n\n`src/Blocks/EmbedPress/` is the source folder for the generic `embedpress/embedpress` block (note: capital \"EmbedPress\" \u2014 it's not a provider, just the folder name for the catch-all). `src/Blocks/GlobalCoponents/` (misspelled, kept for compat) holds the shared React components reused across blocks: `custom-player-controls.js`, `social-share-control.js`, `lock-control.js`, `custombranding.js`, `ads-template.js`, `ads-control.js`, `embed-wrap.js`, `embed-placeholder.js`, etc.\n\n## Server-side rendering\n\n`EmbedPressBlockRenderer.php` (~28k lines) defines one static method per server-rendered block.\n\nFor the generic block (`render`):\n\n1. Read attributes (URL, client ID, options).\n2. Run protection: `extract_protection_data` + `should_display_content`.\n3. Either render cached `embedHTML` via `render_embed_html`, or:\n4. Fall through to dynamic rendering, which calls **`Shortcode::parseContent($url, true, $atts)`** \u2014 the same pipeline shortcodes and Elementor use.\n\nFor specialized blocks (`render_embedpress_pdf`, `render_document`, etc.), the method builds the iframe directly (PDF.js viewer URL, Google Docs Viewer URL, etc.) without going through `parseContent`, since these don't need provider routing.\n\nAll blocks ultimately converge on `generate_final_html()`, which emits the universal wrapper:\n\n```html\n<div class=\"ep-embed-content-wraper \u2026\" data-options='{\u2026JSON\u2026}'>\n    {provider HTML / iframe}\n</div>\n```\n\n## The `data-options` data contract\n\n`build_player_options()` (around line 919 of `EmbedPressBlockRenderer.php`) constructs the JSON consumed by the frontend Custom Player runtime. Real fields include:\n\n```\nrewind, restart, pip, poster_thumbnail, player_color, player_preset,\nfast_forward, player_tooltip, hide_controls, download, fullscreen,\nstart, end, rel, mute, t, vautoplay, autopause, dnt,\nself_hosted, hosted_format\n```\n\nPro extends this contract with engagement / delivery sub-feature fields (chapters, CTA, end screen, country restriction, etc.).\n\n## Frontend rendering\n\nFrontend JS scans for marker classes:\n\n- `.ep-embed-content-wraper[data-options]` \u2014 Custom Player container\n- `.embedpress-pdf` \u2014 PDF viewer\n- `.ep-pdf-gallery` \u2014 Gallery\n- (analytics tracker selectors)\n\nBundles are enqueued conditionally via `Core/AssetManager.php`.\n\n## Inspector hooks (JS)\n\nFree emits placeholder controls via `wp.hooks` so Pro can fill them:\n\n```js\napplyFilters('embedpress.selectPlaceholder', defaultControl, controlName, attributes)\napplyFilters('embedpress.youtubeControls', controls, attributes)\napplyFilters('embedpress.wistiaControls', controls, attributes)\n// ... per provider\n```\n\nWithout Pro, the placeholder is a disabled / upsell control. With Pro, the real control is injected.\n\n## Deprecation discipline\n\n> The single most important rule.\n\nChanging a block's `save()` output requires a `deprecated[]` entry that matches the old output. Otherwise WordPress shows old posts as \"Block contains unexpected or invalid content.\"\n\nPrefer **conditional attribute emission** when possible \u2014 emit a new attribute only when the user explicitly toggles it, so old posts still match the original signature without needing a deprecation.\n\n## Adding a new block\n\n1. `scripts/new-block.sh <block-name>` (from docker repo) scaffolds the folder.\n2. Edit `block.json`.\n3. Implement `edit.js`, `inspector.js`.\n4. Decide: server-rendered (add a `render_*` method to `EmbedPressBlockRenderer` and register in `BlockManager`) or client-rendered (no PHP method needed).\n5. `npm run build`.\n6. E2E test in `tests/playwright/gutenberg/<block>.spec.ts`.\n\n## Common debugging tactics\n\n- **Block won't register**: check `block.json` syntax; check `npm run build` ran. Browser console shows `Invalid block` errors.\n- **Editor preview blank**: render callback returns an empty string. `error_log` inside the callback.\n- **Frontend missing player JS**: marker class not present, or `AssetManager` decided not to enqueue.\n- **\"Block contains unexpected content\"**: missing `deprecated[]` entry.\n", "legacy/BLOCK_KEY_FIXES.md": "# EmbedPress Block Key Fixes\n\n## Overview\nThis document summarizes the fixes applied to correct incorrect block key references in EmbedPress blocks.\n\n## Problem\nThe EmbedPress blocks were using incorrect keys when checking `embedpressGutenbergData.activeBlocks`. The correct keys should include the `-block` suffix for most blocks.\n\n## Correct Block Keys\n```javascript\n{\n    \"google-docs-block\": \"google-docs-block\",\n    \"document\": \"document\",\n    \"embedpress\": \"embedpress\",\n    \"embedpress-pdf\": \"embedpress-pdf\",\n    \"google-sheets-block\": \"google-sheets-block\",\n    \"google-slides-block\": \"google-slides-block\",\n    \"youtube-block\": \"youtube-block\",\n    \"google-forms-block\": \"google-forms-block\",\n    \"google-drawings-block\": \"google-drawings-block\",\n    \"google-maps-block\": \"google-maps-block\",\n    \"twitch-block\": \"twitch-block\",\n    \"wistia-block\": \"wistia-block\",\n    \"vimeo-block\": \"vimeo-block\",\n    \"embedpress-calendar\": \"embedpress-calendar\"\n}\n```\n\n## Files Updated\n\n### Block Registration Files\n1. **`src/Blocks/youtube/src/index.js`**\n   - Fixed: `['youtube']` \u2192 `['youtube-block']`\n\n2. **`src/Blocks/google-docs/src/index.js`**\n   - Fixed: `['google-docs']` \u2192 `['google-docs-block']`\n\n3. **`src/Blocks/google-sheets/src/index.js`**\n   - Fixed: `['google-sheets']` \u2192 `['google-sheets-block']`\n\n4. **`src/Blocks/google-slides/src/index.js`**\n   - Fixed: `['google-slides']` \u2192 `['google-slides-block']`\n\n5. **`src/Blocks/google-forms/src/index.js`**\n   - Fixed: `['google-forms']` \u2192 `['google-forms-block']`\n\n6. **`src/Blocks/google-drawings/src/index.js`**\n   - Fixed: `['google-drawings']` \u2192 `['google-drawings-block']`\n\n7. **`src/Blocks/google-maps/src/index.js`**\n   - Fixed: `['google-maps']` \u2192 `['google-maps-block']`\n\n8. **`src/Blocks/twitch/src/index.js`**\n   - Fixed: `['twitch']` \u2192 `['twitch-block']`\n\n9. **`src/Blocks/wistia/src/index.js`**\n   - Fixed: `['wistia']` \u2192 `['wistia-block']`\n\n10. **`src/Blocks/embedpress-calendar/src/index.js`**\n    - Fixed: `active_blocks` \u2192 `activeBlocks` (property name standardization)\n\n### Pro Plugin Files\n11. **`embedpress-pro/Gutenberg/src/vimeo/index.js`**\n    - Fixed: `active_blocks` \u2192 `activeBlocks`\n\n### Property Name Standardization Files\n12. **`Gutenberg/src/embedpress/InspectorControl/vimeo.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n13. **`Gutenberg/src/placeholders/placeholders.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n14. **`Gutenberg/src/embedpress/InspectorControl/opensea.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n15. **`Gutenberg/src/embedpress/InspectorControl/google-photos.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n16. **`src/Blocks/GlobalCoponents/custombranding.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n17. **`Gutenberg/src/embedpress/InspectorControl/calendly.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n18. **`src/Blocks/GlobalCoponents/upgrade.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n    - Fixed: `current_user` \u2192 `currentUser`\n\n19. **`Gutenberg/src/embedpress/Upgrade.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n    - Fixed: `current_user` \u2192 `currentUser`\n\n20. **`src/Blocks/EmbedPress/src/components/InspectorControl/google-photos.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n21. **`Gutenberg/src/embedpress/InspectorControl/selfhosted.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n22. **`src/Blocks/EmbedPress/src/components/upgrade.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n    - Fixed: `current_user` \u2192 `currentUser`\n\n23. **`Gutenberg/src/embedpress/InspectorControl/spreaker.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n24. **`Gutenberg/src/embedpress/InspectorControl/custombranding.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n25. **`src/Blocks/EmbedPress/src/components/InspectorControl/calendly.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n26. **`Gutenberg/src/embedpress-pdf/edit.js`**\n    - Fixed: `is_pro_plugin_active` \u2192 `isProPluginActive`\n\n## Impact\nThese fixes ensure that:\n1. Block registration checks use the correct keys from `embedpressGutenbergData.activeBlocks`\n2. Property names follow the standardized camelCase convention\n3. All blocks will properly register/unregister based on admin settings\n4. Pro plugin feature checks work correctly\n\n## New Structure Updates\n\n### Block UI Pattern Consistency\nUpdated the following blocks to use the consistent EmbedPlaceholder pattern from the old structure:\n\n1. **Google Docs Block** - Updated to use EmbedPlaceholder instead of MediaPlaceholder for URL input\n2. **Google Drawings Block** - Updated to use EmbedPlaceholder instead of MediaPlaceholder for URL input\n\n### Blocks Already Following Correct Pattern\nThe following blocks were already properly implemented with EmbedPlaceholder:\n- Google Sheets Block\n- Google Slides Block\n- Google Forms Block\n- Google Maps Block\n- Twitch Block\n- Wistia Block\n- YouTube Block\n\n### Document Block Pattern\nThe Document block correctly uses MediaPlaceholder for file upload functionality, which is appropriate for its use case.\n\n### Save Function Verification\nAll blocks have proper save functions:\n- **Static Content Blocks**: Google Docs, Document - render complete HTML structure\n- **Simple Iframe Blocks**: YouTube, Google Sheets, Twitch, Wistia - return null for render callback\n- **Comprehensive Blocks**: Document - full featured save with PDF viewer, file viewer, etc.\n\n### Attributes Structure\nAll blocks have appropriate attributes:\n- **Simple Blocks**: Basic attributes (url, iframeSrc, mediaId)\n- **Document Block**: Comprehensive attributes for all document features\n- **EmbedPress Main Block**: Full feature set with all provider-specific attributes\n\n## Testing\nAfter applying these fixes, verify that:\n1. All blocks appear/disappear correctly in the block editor based on admin settings\n2. Pro features are properly enabled/disabled based on plugin status\n3. No JavaScript console errors related to undefined properties\n4. URL input functionality works consistently across all URL-based blocks\n5. Upload functionality works properly for document blocks\n6. Save functions render appropriate content on frontend\n", "legacy/LOCALIZATION_KEYS.md": "# EmbedPress Localization Keys Documentation\n\nThis document outlines the standardized localization keys used throughout EmbedPress for JavaScript localization.\n\n## Overview\n\nEmbedPress uses WordPress's `wp_localize_script()` function to pass PHP data to JavaScript. Previously, the plugin used inconsistent variable names that were unclear and potentially conflicting. This has been standardized to use descriptive, consistent naming conventions.\n\n## Standardized Localization Variables\n\n### 1. `embedpressPreviewData` (Preview Script)\n**Script Handle:** `embedpress`  \n**File:** `static/js/preview.js`  \n**Previous Name:** `$data`\n\n```javascript\n// Usage in JavaScript\nembedpressPreviewData.previewSettings.baseUrl\nembedpressPreviewData.shortcode\nembedpressPreviewData.assetsUrl\nembedpressPreviewData.urlSchemes\n```\n\n**Data Structure:**\n```php\n[\n    'previewSettings' => [\n        'baseUrl'    => get_site_url() . '/',\n        'versionUID' => $version,\n        'debug'      => defined('WP_DEBUG') && WP_DEBUG,\n    ],\n    'shortcode'  => $shortcode,\n    'assetsUrl' => $assets_url,\n    'urlSchemes' => $url_schemes,\n]\n```\n\n### 2. `embedpressAdminParams` (Admin Parameters)\n**Script Handle:** `embedpress`  \n**File:** `static/js/preview.js`  \n**Previous Name:** `EMBEDPRESS_ADMIN_PARAMS`\n\n```javascript\n// Usage in JavaScript\nembedpressAdminParams.ajaxUrl\nembedpressAdminParams.nonce\n```\n\n**Data Structure:**\n```php\n[\n    'ajaxUrl' => admin_url('admin-ajax.php'),\n    'nonce'   => wp_create_nonce('embedpress')\n]\n```\n\n### 3. `embedpressLicenseData` (License Management)\n**Script Handle:** `embedpress-lisence`  \n**File:** `static/js/license.js`  \n**Previous Name:** `wpdeveloperLicenseManagerNonce`\n\n```javascript\n// Usage in JavaScript\nembedpressLicenseData.nonce\n```\n\n**Data Structure:**\n```php\n[\n    'nonce' => wp_create_nonce('wpdeveloper_sl_' . $item_id . '_nonce')\n]\n```\n\n### 4. `embedpressGutenbergData` (Gutenberg Blocks)\n**Script Handle:** `embedpress_blocks-cgb-block-js`  \n**File:** `Gutenberg/src/embedpress/` and `src/Blocks/EmbedPress/src/`  \n**Previous Name:** `embedpressObj`\n\n```javascript\n// Usage in JavaScript\nembedpressGutenbergData.isProPluginActive\nembedpressGutenbergData.siteUrl\nembedpressGutenbergData.activeBlocks\nembedpressGutenbergData.sourceNonce\nembedpressGutenbergData.brandingLogos.youtube\n```\n\n**Data Structure:**\n```php\n[\n    'wistiaLabels'  => json_encode($wistia_labels),\n    'wistiaOptions' => $wistia_options,\n    'poweredBy' => apply_filters('embedpress_document_block_powered_by', true),\n    'isProVersion' => defined('EMBEDPRESS_PRO_PLUGIN_FILE'),\n    'twitchHost' => !empty($pars_url['host']) ? $pars_url['host'] : '',\n    'siteUrl' => site_url(),\n    'activeBlocks' => $active_blocks,\n    'documentCta' => $documents_cta_options,\n    'pdfRenderer' => self::get_pdf_renderer(),\n    'isProPluginActive' => defined('EMBEDPRESS_SL_ITEM_SLUG'),\n    'ajaxUrl' => admin_url('admin-ajax.php'),\n    'sourceNonce' => wp_create_nonce('source_nonce_embedpress'),\n    'canUploadMedia' => current_user_can('upload_files'),\n    'assetsUrl' => $assets_url,\n    'iframeWidth' => Helper::get_options_value('enableEmbedResizeWidth', '600'),\n    'iframeHeight' => Helper::get_options_value('enableEmbedResizeHeight', '400'),\n    'pdfCustomColor' => Helper::get_options_value('custom_color', '#403A81'),\n    'brandingLogos' => [\n        'youtube' => Helper::get_branding_value('logo_url', 'youtube'),\n        'vimeo' => Helper::get_branding_value('logo_url', 'vimeo'),\n        'wistia' => Helper::get_branding_value('logo_url', 'wistia'),\n        'twitch' => Helper::get_branding_value('logo_url', 'twitch'),\n        'dailymotion' => Helper::get_branding_value('logo_url', 'dailymotion'),\n    ],\n    'userRoles' => Helper::get_user_roles(),\n    'currentUser' => $current_user->data,\n    'feedbackSubmitted' => get_option('embedpress_feedback_submited'),\n    'ratingHelpDisabled' => Helper::get_options_value('turn_off_rating_help', false),\n]\n```\n\n### 5. `embedpressFrontendData` (Frontend Scripts)\n**Script Handle:** `embedpress-front-legacy`  \n**File:** `static/js/front.js`, `static/js/sponsored.js`  \n**Previous Name:** `eplocalize`\n\n```javascript\n// Usage in JavaScript\nembedpressFrontendData.ajaxUrl\nembedpressFrontendData.isProPluginActive\nembedpressFrontendData.nonce\n```\n\n**Data Structure:**\n```php\n[\n    'ajaxUrl' => admin_url('admin-ajax.php'),\n    'isProPluginActive' => defined('EMBEDPRESS_SL_ITEM_SLUG'),\n    'nonce' => wp_create_nonce('ep_nonce'),\n]\n```\n\n### 6. `embedpressSettingsData` (Settings Page)\n**Script Handle:** `ep-settings-script`  \n**File:** Settings page scripts  \n**Previous Name:** `embedpressObj`\n\n```javascript\n// Usage in JavaScript\nembedpressSettingsData.nonce\n```\n\n**Data Structure:**\n```php\n[\n    'nonce' => wp_create_nonce('embedpress_elements_action'),\n]\n```\n\n### 7. `embedpressNewBlocksData` (New Block System)\n**Script Handle:** `embedpress_blocks-cgb-block-js`  \n**File:** New block system files  \n**Previous Name:** `embedpressBlockData`\n\n```javascript\n// Usage in JavaScript\nembedpressNewBlocksData.pluginDirPath\nembedpressNewBlocksData.activeBlocks\nembedpressNewBlocksData.ajaxUrl\nembedpressNewBlocksData.restUrl\n```\n\n**Data Structure:**\n```php\n[\n    'pluginDirPath' => defined('EMBEDPRESS_PATH_BASE') ? EMBEDPRESS_PATH_BASE : '',\n    'pluginDirUrl' => defined('EMBEDPRESS_URL_STATIC') ? EMBEDPRESS_URL_STATIC . '../' : '',\n    'activeBlocks' => $active_blocks,\n    'canUploadMedia' => current_user_can('upload_files'),\n    'ajaxUrl' => admin_url('admin-ajax.php'),\n    'nonce' => wp_create_nonce('embedpress_nonce'),\n    'restUrl' => rest_url('embedpress/v1/'),\n    'siteUrl' => site_url(),\n]\n```\n\n### 8. `embedpressCalendarData` (Google Calendar Widget)\n**Script Handle:** `epgc`  \n**File:** Calendar widget scripts  \n**Previous Name:** `epgc_object`\n\n```javascript\n// Usage in JavaScript\nembedpressCalendarData.ajaxUrl\nembedpressCalendarData.nonce\nembedpressCalendarData.translations.allDay\n```\n\n**Data Structure:**\n```php\n[\n    'ajaxUrl' => admin_url('admin-ajax.php'),\n    'nonce' => $nonce,\n    'translations' => [\n        'allDay' => __('All day', 'embedpress'),\n        'createdBy' => __('Created by', 'embedpress'),\n        'goToEvent' => __('Go to event', 'embedpress'),\n        'unknownError' => __('Unknown error', 'embedpress'),\n        'requestError' => __('Request error', 'embedpress'),\n        'loading' => __('Loading', 'embedpress')\n    ]\n]\n```\n\n## Migration Guide\n\n### For Developers\n\nWhen updating existing code, replace the old variable names with the new standardized names:\n\n```javascript\n// OLD\n$data.EMBEDPRESS_SHORTCODE\nembedpressGutenbergData.is_pro_plugin_active\neplocalize.ajaxurl\nepgc_object.ajax_url\n\n// NEW\nembedpressPreviewData.shortcode\nembedpressGutenbergData.isProPluginActive\nembedpressFrontendData.ajaxUrl\nembedpressCalendarData.ajaxUrl\n```\n\n### Property Name Changes\n\nKey property names have also been standardized to use camelCase:\n\n```javascript\n// OLD\nembedpressGutenbergData.ajax_url\nembedpressGutenbergData.is_pro_plugin_active\nembedpressGutenbergData.site_url\nembedpressGutenbergData.active_blocks\n\n// NEW\nembedpressGutenbergData.ajaxUrl\nembedpressGutenbergData.isProPluginActive\nembedpressGutenbergData.siteUrl\nembedpressGutenbergData.activeBlocks\n```\n\n## Benefits of Standardization\n\n1. **Clarity**: Variable names clearly indicate their purpose and scope\n2. **Consistency**: All variables follow the same naming convention\n3. **No Conflicts**: Avoids potential conflicts with other plugins using generic names like `$data`\n4. **Maintainability**: Easier to understand and maintain the codebase\n5. **Documentation**: Self-documenting variable names reduce the need for extensive comments\n\n## Debugging\n\nUse the debug endpoint to check localization status:\n\n```javascript\n// AJAX call to debug localization\njQuery.post(ajaxurl, {\n    action: 'embedpress_debug_localization'\n}, function(response) {\n    console.log('Localization Status:', response.data);\n});\n```\n\nThis will show which scripts are registered, enqueued, and have localization data attached.\n", "legacy/broken-embeds-detection.md": "# PRD \u2014 Broken Embed Source URL Detection\n\n**Card:** [r0gbn6r2c3](https://zoobbe.com/c/r0gbn6r2c3) \u2014 *Detect and Report Broken Embed Source URLs in Analytics*\n**Owner:** Akash \u00b7 **Status:** In Development \u00b7 **Target:** EmbedPress 4.3.0\n\n## 1. Problem\nWhen an embedded source becomes unavailable (video removed, link revoked, file deleted), the embed silently fails on the frontend. Site owners have no way to discover which posts contain dead embeds without manually visiting every page.\n\n## 2. Goal\nSurface broken embed source URLs inside the existing **Analytics** dashboard so admins can audit and fix them in one place.\n\n## 3. Scope\n- **In:** Detect dead/inaccessible URLs for embeds tracked in `wp_embedpress_analytics_content`. Display results in a new tab in the Analytics dashboard. Manual + scheduled re-checks. Open-in-editor link to the affected post.\n- **Out:** Auto-replacement of broken URLs. Frontend fallback rendering (separate ticket). Bulk delete/edit operations.\n\n## 4. UX\nA new tab **\u201cBroken Embeds\u201d** is added to the Content section of the Analytics dashboard, immediately after **\u201cTop Performing Content.\u201d** The panel renders a table:\n\n| Page Title | Source URL | Type | Status | Last Checked | Action |\n|---|---|---|---|---|---|\n| About Us | `youtube.com/watch?v=xyz` | YouTube | 404 Not Found | 2 hrs ago | Edit \u00b7 Re-check |\n\nHeader shows a **\u201cRe-check All\u201d** button and a count badge of currently broken embeds. Empty state: *\u201cAll your embeds are healthy. Last scan: \u2026\u201d*\n\n## 5. Detection Logic\nFor each distinct `embed_url` in `wp_embedpress_analytics_content`:\n\n1. Issue an HTTP `HEAD` request (5s timeout) via `wp_remote_head`.\n2. If the response is `405 Method Not Allowed` or empty body, fall back to `GET` (3s timeout).\n3. **Mark BROKEN** if:\n   - HTTP status is `4xx` or `5xx`, OR\n   - Connection error / timeout, OR\n   - Provider-specific failure pattern (e.g. YouTube returns `200` on `/watch?v=` but body contains `\"Video unavailable\"`; Vimeo returns `403`/`404` JSON from oEmbed).\n4. **Mark OK** if `2xx` and provider check passes.\n5. Cache per-URL result in DB column for 24h to avoid re-hitting the network on every dashboard load.\n\n## 6. Backend\n- **New class:** `EmbedPress\\Includes\\Classes\\Analytics\\Broken_Embeds_Detector`\n  - `scan_all($args)` \u2014 iterate distinct URLs, return [{url, status, http_code, last_checked, content_ids[]}]\n  - `check_url($url, $embed_type)` \u2014 single-URL check with provider-aware fallback\n  - `recheck_url($url)` \u2014 bypasses cache\n- **Schema additions** to `wp_embedpress_analytics_content` (DB version 1.0.9):\n  - `last_check_status` ENUM('unknown','ok','broken') DEFAULT 'unknown'\n  - `last_check_code` INT(4) DEFAULT NULL\n  - `last_check_at` DATETIME DEFAULT NULL\n  - INDEX `idx_last_check_status`\n- **REST endpoints** in `REST_API::register_routes()`:\n  - `GET /embedpress/v1/analytics/broken-embeds` \u2192 list broken (and optionally all-with-status)\n  - `POST /embedpress/v1/analytics/broken-embeds/recheck` \u2192 trigger fresh scan, returns updated list\n- **WP-Cron:** `embedpress_daily_broken_embed_scan` runs once daily, batches 50 URLs per tick.\n\n## 7. Frontend\n- `src/Analytics/components/AnalyticsDashboard.js` \u2014 add third tab in `tabThree` group; render `<BrokenEmbedsTable>` panel when `activeTabThree === 'broken'`.\n- `src/Analytics/components/BrokenEmbedsTable.js` \u2014 new component handling load + re-check action.\n- `src/Analytics/services/AnalyticsDataProvider.js` \u2014 add `getBrokenEmbeds()` and `recheckBrokenEmbeds()`.\n- Available to both Free and Pro users (reliability \u2260 depth-of-analytics).\n\n## 8. Performance & Safety\n- Network calls only run inside the cron tick or explicit user action \u2014 never inside the dashboard render path.\n- Per-host throttle: max 5 requests/sec to any single domain.\n- `User-Agent: EmbedPress/<ver> Broken-Link-Checker (+site-url)` so providers can identify and rate-limit cleanly.\n- Respect `WP_HTTP_BLOCK_EXTERNAL`; no-op silently when external requests are blocked.\n\n## 9. Telemetry\nNone. (Status counters live in the DB and are visible in the dashboard.)\n\n## 10. Acceptance\n- [ ] New \u201cBroken Embeds\u201d tab appears after \u201cTop Performing Content\u201d in the Analytics dashboard.\n- [ ] First load shows cached statuses; never blocks on network.\n- [ ] \u201cRe-check All\u201d triggers a real scan and updates the table without a page reload.\n- [ ] A 404\u2019d YouTube URL inserted into a test post shows up as `BROKEN` after one cron tick.\n- [ ] Cron is registered on plugin activation and unscheduled on deactivation.\n", "legacy/exclude-height-sources.md": "# EmbedPress Height Exclusion Feature\n\nThis feature allows you to exclude specific embed sources from having height attributes applied to them. This is useful when certain providers need to maintain their original height or use responsive height behavior.\n\n## How to Use\n\n### Method 1: Using WordPress Filter (Recommended)\n\nAdd this code to your theme's `functions.php` file or in a custom plugin:\n\n```php\n/**\n * Exclude specific sources from height attribute application\n */\nfunction my_embedpress_exclude_height_sources($excluded_sources) {\n    // Add provider names that should not have height applied\n    $excluded_sources[] = 'twitter';\n    $excluded_sources[] = 'instagram';\n    $excluded_sources[] = 'facebook';\n    $excluded_sources[] = 'tiktok';\n    \n    return $excluded_sources;\n}\nadd_filter('embedpress_excluded_height_sources', 'my_embedpress_exclude_height_sources');\n```\n\n### Method 2: Direct Configuration\n\nYou can also modify the default excluded sources directly in the `get_excluded_height_sources()` method in `EmbedPress/Shortcode.php`:\n\n```php\nprotected static function get_excluded_height_sources()\n{\n    // Default excluded sources - you can add more here\n    $defaultExcluded = [\n        'twitter',\n        'instagram', \n        'facebook',\n        'tiktok',\n        // Add more provider names here\n    ];\n    \n    // ... rest of the method\n}\n```\n\n## Provider Names\n\nThe provider names are normalized (lowercase, spaces and commas replaced with hyphens). Common provider names include:\n\n- `twitter` (for Twitter/X embeds)\n- `instagram` (for Instagram embeds)\n- `facebook` (for Facebook embeds)\n- `tiktok` (for TikTok embeds)\n- `youtube` (for YouTube embeds)\n- `vimeo` (for Vimeo embeds)\n- `twitch` (for Twitch embeds)\n- `spotify` (for Spotify embeds)\n\n## How It Works\n\n1. When an embed is processed, the system checks if the provider name is in the excluded list\n2. If excluded, width attributes are still applied (for responsive behavior) but height attributes are skipped\n3. This allows the embed to maintain its original height or use its own responsive height behavior\n\n## Example Usage\n\n```php\n// Exclude Twitter and Instagram from height modifications\nadd_filter('embedpress_excluded_height_sources', function($excluded) {\n    return array_merge($excluded, ['twitter', 'instagram']);\n});\n```\n\nThis will ensure that Twitter and Instagram embeds maintain their original height while still allowing width modifications for responsive behavior.\n", "legacy/google-docs-block-standard-structure.md": "## Feature: EmbedPress Blocks Standard Structure Implementation\n\n**Implemented**\n- Updated multiple EmbedPress blocks to follow the standard block structure\n- Converted from class components to functional components using React hooks\n- Added comprehensive attributes for social sharing, ad management, and content protection\n- Implemented save and edit functionality without render callbacks\n- Added proper block registration with metadata from block.json\n\n**Structure Followed**\n- Used existing PDF block structure as template (`/src/Blocks/embedpress-pdf/`)\n- Functional components with React hooks instead of class components\n- Standard block.json configuration with proper metadata\n- Comprehensive attributes.js file with all necessary properties\n- Edit component with proper state management and UI controls\n- Save component that renders consistent content for frontend\n\n**Blocks Updated**\n1. **Google Docs** - \u2705 Complete\n   - `/src/Blocks/google-docs/src/index.js` - Updated block registration\n   - `/src/Blocks/google-docs/src/components/attributes.js` - Added comprehensive attributes\n   - `/src/Blocks/google-docs/src/components/edit.js` - Converted to functional component\n   - `/src/Blocks/google-docs/src/components/save.js` - Updated save component\n   - `/src/Blocks/google-docs/block.json` - Updated block metadata\n\n2. **Google Drawings** - \u2705 Complete\n   - `/src/Blocks/google-drawings/src/index.js` - Updated block registration\n   - `/src/Blocks/google-drawings/src/components/attributes.js` - Added comprehensive attributes\n   - `/src/Blocks/google-drawings/src/components/edit.js` - Converted to functional component\n   - `/src/Blocks/google-drawings/src/components/save.js` - Updated save component\n   - `/src/Blocks/google-drawings/block.json` - Updated block metadata\n\n3. **Google Forms** - \u2705 Index Updated\n   - `/src/Blocks/google-forms/src/index.js` - Updated block registration\n\n4. **Google Maps** - \u2705 Index Updated\n   - `/src/Blocks/google-maps/src/index.js` - Updated block registration\n\n5. **Google Sheets** - \u2705 Index Updated\n   - `/src/Blocks/google-sheets/src/index.js` - Updated block registration\n\n6. **Google Slides** - \u2705 Index Updated\n   - `/src/Blocks/google-slides/src/index.js` - Updated block registration\n\n7. **Twitch** - \u2705 Index Updated\n   - `/src/Blocks/twitch/src/index.js` - Updated block registration\n\n8. **Wistia** - \u2705 Index Updated\n   - `/src/Blocks/wistia/src/index.js` - Updated block registration\n\n9. **YouTube** - \u2705 Index Updated\n   - `/src/Blocks/youtube/src/index.js` - Updated block registration\n\n**Remaining Work**\n- Create missing block.json files for all blocks\n- Update attributes.js files for remaining blocks\n- Update edit.js components for remaining blocks\n- Update save.js components for remaining blocks\n\n**Key Features Added**\n- Social sharing functionality with position controls\n- Ad manager integration for image ads\n- Content protection with password and user role options\n- Proper dimensions control (width, height, unit options)\n- Powered by EmbedPress branding option\n- Client ID tracking for analytics\n- Interactive overlay for editor experience\n- Consistent block naming convention (embedpress/block-name instead of embedpress/block-name-block)\n- Modern WordPress block registration using metadata\n- Functional components with React hooks\n- Proper useBlockProps implementation\n- MediaPlaceholder for URL input\n- BlockControls for toolbar actions\n\n**Implementation Pattern**\nEach block follows this exact structure:\n\n```javascript\n// index.js\nconst { __ } = wp.i18n;\nimport Save from \"./components/save.js\";\nimport Edit from \"./components/edit.js\";\nimport metadata from \"../block.json\";\nimport attributes from \"./components/attributes\";\nimport { registerBlockType } from \"@wordpress/blocks\";\nimport { blockIcon } from \"../../GlobalCoponents/icons.js\";\n\nlet shouldRegister = false;\nif (embedpressGutenbergData && embedpressGutenbergData.activeBlocks && embedpressGutenbergData.activeBlocks['block-name']) {\n    shouldRegister = true;\n}\n\nif (shouldRegister) {\n    registerBlockType(metadata.name, {\n        ...metadata,\n        icon: blockIcon,\n        attributes,\n        keywords: [...],\n        edit: Edit,\n        save: Save,\n    });\n}\n```\n\n**Next Steps**\n- Complete the remaining blocks implementation (google-maps, google-sheets, google-slides, twitch, wistia)\n- Create missing block.json files for all blocks\n- Update edit and save components for all remaining blocks\n- Test all updated blocks functionality\n- Ensure backward compatibility with existing content\n- Update block registration in main blocks index file\n", "providers/README.md": "# Provider System\n\nThe Provider system is the heart of EmbedPress. Every embed in the plugin is generated by a Provider class.\n\n## What a Provider is\n\nA **Provider** is a PHP class that knows how to:\n\n1. Recognize that a URL belongs to it (via host pattern matching).\n2. Parse the URL into the parts that matter (video ID, file ID, channel handle\u2026).\n3. Generate the embed HTML \u2014 usually an iframe pointing at the upstream embed endpoint.\n\nEach Provider lives in `EmbedPress/Providers/<Name>.php` and is mapped to one or more host patterns in `providers.php`.\n\n## Why the adapter pattern\n\nEmbedPress originally wrapped the [Embera](https://github.com/mauricius/embera) library, which itself uses an adapter pattern: one adapter per service. We kept that pattern even as we added our own providers because:\n\n- **Isolation**: a bug in the YouTube adapter can't break Vimeo.\n- **Testability**: each adapter is a small unit you can mock.\n- **Clarity**: adding a new source means adding one file, not hunting through a giant switch.\n\n## Anatomy of a Provider\n\nMost providers extend `Embera\\Adapters\\Service`. The minimum interface is:\n\n```php\nnamespace EmbedPress\\Providers;\n\nuse Embera\\Adapters\\Service as EmberaService;\n\nclass ExampleProvider extends EmberaService\n{\n    /** Validate this URL belongs here */\n    public function validateUrl(\\Embera\\Url $url)\n    {\n        return preg_match('~example\\.com/watch/[A-Za-z0-9_-]+~', (string) $url);\n    }\n\n    /** Normalize URL into a canonical embed URL */\n    public function normalizeUrl(\\Embera\\Url $url)\n    {\n        return $url;\n    }\n\n    /** Build the iframe HTML */\n    protected function modifyResponse(array $response = [])\n    {\n        $response['html'] = sprintf(\n            '<iframe src=\"%s\" width=\"%d\" height=\"%d\" frameborder=\"0\" allowfullscreen></iframe>',\n            esc_url($this->getEmbedUrl()),\n            $this->getWidth(),\n            $this->getHeight()\n        );\n        return $response;\n    }\n\n    private function getEmbedUrl()\n    {\n        // \u2026extract ID, build embed URL\u2026\n    }\n}\n```\n\nThe `Wrapper` class (`EmbedPress/Providers/Wrapper.php`) is a permissive base used as the **fallback provider** when no specific provider matches. See [Wrapper](../features/wrapper.md).\n\n## How URL \u2192 Provider routing happens\n\n1. User-supplied URL hits `Core::parseContent()`.\n2. Core constructs an Embera engine seeded with `$additionalServiceProviders` from `providers.php`.\n3. Embera iterates registered providers and asks each `validateUrl($url)`.\n4. The first provider that says \"yes\" wins. If none match, the **Wrapper** provider takes the URL (last-resort fallback).\n5. Core calls the matched provider, captures its HTML, and forwards it through the [Feature_Enhancer](../features/feature-enhancer.md) filter pipeline.\n\n> **Greediness warning.** A provider with a too-broad host pattern can steal URLs from neighbors. Always test that your new provider doesn't match `youtube.com/...` or `vimeo.com/...` URLs, and run the E2E provider suite before merging.\n\n## The provider registry: `providers.php`\n\n`providers.php` is a flat associative array:\n\n```php\n$additionalServiceProviders = [\n    EMBEDPRESS_NAMESPACE . \"\\\\Providers\\\\Youtube\"\n        => [\"youtube.com\"],\n    EMBEDPRESS_NAMESPACE . \"\\\\Providers\\\\Wistia\"\n        => [\"*.wistia.com\", \"wistia.com\"],\n    // \u2026\n];\n```\n\nThe wildcard `*.foo.com` matches any subdomain. EmbedPress also extends Embera's matching to support the wildcard.\n\n`SelfHosted` is special: its host list is the *current site* plus a long list of TLDs (`*.com`, `*.net`, \u2026) so any direct `.mp4` / `.mp3` / `.pdf` URL can be picked up and routed to the self-hosted media renderer.\n\n## What \"providers\" do *not* do\n\n- They don't render UI controls (that's the editor's job).\n- They don't decide whether to apply the Custom Player (Feature_Enhancer does that based on attributes).\n- They don't enqueue assets (Asset Manager does, when a marker class is detected).\n- They don't talk to any analytics or third-party APIs unless that's literally how the provider embeds (e.g., Google Photos requires a fetch to derive the album HTML).\n\nA Provider is a **pure URL \u2192 HTML transformer**. Keep it that way.\n\n## Adding a new provider\n\nSee [Adding a Provider](adding-a-provider.md) for the step-by-step.\n\n## Provider catalog\n\nSee [Provider Catalog](catalog.md) for every shipped provider, the URL patterns it matches, and known quirks.\n", "providers/adding-a-provider.md": "# Adding a New Provider\n\nStep-by-step: ship a new embed source.\n\n## Before you start\n\n1. Confirm the upstream service exposes a public embed URL or oEmbed endpoint. If they require an API key with per-request server calls, you're building a more complex integration \u2014 most providers are pure iframe wrappers.\n2. Check that no existing provider already matches the URLs you'll target. Run `grep -r \"<host>\" EmbedPress/Providers providers.php`.\n3. Decide which **editor surfaces** the new provider needs to appear in \u2014 sometimes you only need shortcode/auto-embed (cheap), sometimes you need a dedicated block (more work).\n\n## The fast path (auto-embed + shortcode only)\n\nUse this when you just want pasted URLs to \"just work\" without a dedicated block or widget.\n\n### Step 1 \u2014 Scaffold\n\nFrom the docker repo:\n\n```bash\nmake shell\nscripts/new-provider.sh AcmeVideo\n```\n\nThis creates `EmbedPress/Providers/AcmeVideo.php` from a template.\n\n(If you don't use the script, copy an existing simple provider like `Calendly.php` or `Boomplay.php` and rename.)\n\n### Step 2 \u2014 Fill in the methods\n\n```php\nnamespace EmbedPress\\Providers;\n\nuse Embera\\Adapters\\Service as EmberaService;\n\nclass AcmeVideo extends EmberaService\n{\n    public function validateUrl(\\Embera\\Url $url)\n    {\n        // Be tight. Reject anything that's not /watch/<id>.\n        return preg_match(\n            '~^https?://(www\\.)?acmevideo\\.com/watch/(?P<id>[A-Za-z0-9_-]+)~i',\n            (string) $url,\n            $m\n        );\n    }\n\n    protected function modifyResponse(array $response = [])\n    {\n        preg_match(\n            '~/watch/(?P<id>[A-Za-z0-9_-]+)~',\n            (string) $this->url,\n            $m\n        );\n        $id = $m['id'] ?? '';\n\n        $embedUrl = sprintf('https://acmevideo.com/embed/%s', $id);\n\n        $response['html'] = sprintf(\n            '<iframe src=\"%s\" width=\"%d\" height=\"%d\" frameborder=\"0\" allow=\"autoplay; fullscreen\" allowfullscreen></iframe>',\n            esc_url($embedUrl),\n            $this->getWidth(),\n            $this->getHeight()\n        );\n        $response['type'] = 'video';\n        $response['provider_name'] = 'AcmeVideo';\n        return $response;\n    }\n}\n```\n\n### Step 3 \u2014 Register in `providers.php`\n\n```php\nEMBEDPRESS_NAMESPACE . \"\\\\Providers\\\\AcmeVideo\"\n    => [\"acmevideo.com\", \"*.acmevideo.com\"],\n```\n\n### Step 4 \u2014 Smoke test\n\n```bash\nmake wp ARG=\"post create --post_type=post --post_title='Acme test' --post_content='https://acmevideo.com/watch/abc123' --post_status=publish\"\n```\n\nOpen the post in the browser. You should see the iframe.\n\n### Step 5 \u2014 E2E\n\nAdd a test in `tests/playwright/<surface>/providers/acme.spec.ts` covering: paste in editor, verify iframe `src`, verify it loads in frontend.\n\n### Step 6 \u2014 Update docs\n\n- Add an entry to [Provider Catalog](catalog.md).\n- If the provider has unusual quirks, add a section to its catalog entry.\n\nThat's it for the fast path.\n\n## The full path (with a dedicated block)\n\nIf you need a custom block (because the provider needs special controls \u2014 e.g., date pickers for a calendar), additionally:\n\n1. **Scaffold the block**: `scripts/new-block.sh acme-video`\n2. **Implement the block** in `src/Blocks/acme-video/`:\n   - `index.js` \u2014 register the block\n   - `edit.js` \u2014 editor UI (URL input + provider-specific controls)\n   - `save.js` \u2014 output the URL + attributes (use `useBlockProps.save()`)\n   - `block.json` \u2014 metadata\n3. **Wire server-side render** in `EmbedPress/Gutenberg/EmbedPressBlockRenderer.php` (add a `case` for the block name; it should call `Core::parseContent` with the block attributes).\n4. **Build**: `npm run build`\n5. **Add an Elementor widget** *only if* customers will use Elementor with this provider. Often the existing `Embedpress_Elementor` widget is enough \u2014 it accepts any URL.\n\n## Pro-only providers\n\nPro providers live in `embedpress-pro/includes/Providers/` and register on `embedpress_pro_register_providers`. Same shape as free, but loaded by Pro's bootstrap.\n\n## Common pitfalls\n\n- **URL regex too greedy.** Use `^https?://` and anchor to the host. Without `^`, your regex will match `https://example.com/?ref=acmevideo.com/watch/x` and steal that URL.\n- **Iframe missing `allowfullscreen`.** Customers will report \"fullscreen doesn't work.\"\n- **Unescaped HTML.** Always wrap user-derived values in `esc_url`, `esc_attr`, `esc_html`. Even if upstream is \"trusted,\" a paste from a phishing URL is not.\n- **Forgetting `provider_name` and `type`** in the response array. Some downstream filters branch on these.\n- **Hardcoded width/height.** Use `$this->getWidth()` / `$this->getHeight()` \u2014 they respect block / widget overrides.\n\n## How to test for greediness\n\nBefore merging, run the full E2E provider suite:\n\n```bash\nnpm run test:e2e -- --grep=\"provider\"\n```\n\nSpecifically watch for failures in YouTube, Vimeo, and Wrapper tests \u2014 those are the most likely victims of an over-broad new regex.\n", "providers/catalog.md": "# Provider Catalog\n\nEvery Provider class shipped with the free plugin and how it's wired in.\n\n> Verified against `EmbedPress/Providers/` (28 PHP files) and `providers.php` (26 active host registrations) on the `4.5.1` baseline. Two files (`Wrapper.php`, `TikTok.php`) exist in the Providers directory but are not registered in `providers.php` \u2014 they're invoked via different paths. **Vimeo is NOT a custom Provider class** \u2014 it's handled by Embera's built-in adapter.\n\n## How to read this catalog\n\nFor each provider:\n\n- **Class** \u2014 the EmbedPress\\Providers\\* file\n- **Hosts in `providers.php`** \u2014 the URL patterns Embera matches against (if registered there)\n- **Notes** \u2014 anything special\n\n## Video / Streaming\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **Youtube** | `youtube.com` | Most-used provider. Routed via `Feature_Enhancer::isEmbra`. Pro extender in `embedpress-pro/includes/Providers/Youtube.php` adds channel/playlist/livechat controls. |\n| **Wistia** | `*.wistia.com`, `wistia.com` | Volume + custom player params via Feature_Enhancer. Pro extender adds advanced controls. |\n| **Twitch** | `twitch.tv`, `clips.twitch.tv` | Channel, clips, VODs all flow through one provider. Pro adds chat parameter. |\n| **FITE** | `fite.tv`, `triller.tv`, `trillertv.com` | Live event streaming. |\n| (TikTok) | (not in providers.php) | File exists at `Providers/TikTok.php`; Feature_Enhancer::isEmbra invokes it directly when host matches. |\n\n> **Vimeo, Dailymotion, SoundCloud, Spotify, Apple Podcasts** etc. are handled via Embera's built-in adapters and EmbedPress's Feature_Enhancer decoration \u2014 no custom Provider class in `EmbedPress/Providers/`.\n\n## Documents / PDFs / Files\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **GoogleDocs** | `docs.google.com` | Docs, Sheets, Slides, Forms all share host but each has its own Gutenberg block. |\n| **GoogleDrive** | `drive.google.com` | Drive file embed. |\n| **OneDrive** | `onedrive.live.com`, `1drv.ms` | Microsoft's Drive equivalent. |\n| **GoogleCalendar** | `calendar.google.com` | Calendar iframe + ICS feed. |\n| **SelfHosted** | site host + long TLD wildcard list | Catches direct file URLs (`.mp4`, `.mp3`, `.pdf`, `.docx`, etc.). The fallback for self-hosted media. **Five regex copies** (PHP + JS) to keep in sync. |\n\n## Maps / Locations\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **GoogleMaps** | `google.com`, `google.com.*`, `maps.google.com`, `goo.gl`, `google.co.*` | Tight regex needed because `google.com` is shared with Google's other services. |\n\n## Social / Feeds\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **InstagramFeed** | `instagram.com` | Single post; multi-post feed UX is Pro. |\n| **X** | `*.x.com`, `x.com` | Renamed from Twitter. Class is `X`. |\n| **LinkedIn** | `*.linkedin.com`, `linkedin.com` | Posts + share embeds. |\n| **GitHub** | `gist.github.com`, `github.com` | Gists and source files. |\n| **OpenSea** | `opensea.io` | NFT widget. Has separate Elementor `ep-preset-1/-2` styling unrelated to Custom Player presets. |\n\n## Audio\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **Boomplay** | `boomplay.com` | African music streaming. |\n| **Spreaker** | `*.spreaker.com`, `spreaker.com` | Podcast hosting. Routed via `isEmbra`. |\n| **NRKRadio** | `radio.nrk.no`, `nrk.no` | Norwegian public radio. |\n\n## Tools / Forms / Misc\n\n| Class | Hosts | Notes |\n|---|---|---|\n| **Calendly** | `*.calendly.com`, `calendly.com` | Booking widget. Pro adds OAuth + sync. |\n| **AirTable** | `*.airtable.com`, `airtable.com` | Database / view embed. |\n| **Canva** | `*.canva.com`, `canva.com` | Design embed. |\n| **Gumroad** | `*.gumroad.com`, `gumroad.com` | Product/store embed. |\n| **GooglePhotos** | `photos.app.goo.gl`, `photos.google.com` | Album embed (server-side fetch to derive). Routed via `isEmbra`. |\n| **GettyImages** | `gettyimages.com` | Stock image embed. |\n| **Giphy** | `giphy.com`, `i.giphy.com` | GIF embed. |\n| **Meetup** | `meetup.com` | Event embed. Pro extender adds advanced controls. |\n\n## The Wrapper\n\n`Providers/Wrapper.php` is the universal fallback. Not registered in `providers.php` \u2014 instead, `Feature_Enhancer::isEmbra` invokes it when no other provider matches. It renders a sandboxed iframe pointing at the URL.\n\nSee [Universal Wrapper](../features/wrapper.md).\n\n## Where the \"250+ providers\" number comes from\n\nThe bundled **Embera library** ships adapters for many additional services (Vimeo, SoundCloud, Spotify, Apple Podcasts, Dailymotion, TED, SlideShare, Codepen, dozens of social and tool sites). Combined with EmbedPress's custom Provider classes here and the Wrapper fallback, the total catalog crosses 250 sources.\n\nWhen you see a provider's controls in the editor that isn't listed above, it's almost certainly an Embera-adapter source decorated by `Feature_Enhancer` rather than a custom Provider class. To confirm, grep for the provider name in `vendor/mauricius/embera/` (Composer).\n\n## How to keep this catalog accurate\n\nWhen you add or rename a Provider class, update:\n\n1. The file in `EmbedPress/Providers/`\n2. The host registration in `providers.php`\n3. The corresponding row in this catalog\n4. (If applicable) the Pro extender in `embedpress-pro/includes/Providers/`\n"};

  'providers': 'Providers',
  'gutenberg': 'Gutenberg',
  'elementor': 'Elementor',
  'features': 'Features',
  'integration': 'Integration',
  'api': 'API',
  'guides': 'Guides',
  'contributing': 'Contributing',
  'legacy': 'Legacy notes',
};

function buildNav(filter) {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  const groups = {};
  for (const path of ORDER) {
    const parts = path.split('/');
    const section = parts.length === 1 ? '_root' : parts[0];
    if (!groups[section]) groups[section] = [];
    groups[section].push(path);
  }
  for (const section of Object.keys(groups)) {
    const items = groups[section].filter(p => !filter || p.toLowerCase().includes(filter.toLowerCase()) || (DOCS[p] || '').toLowerCase().includes(filter.toLowerCase()));
    if (!items.length) continue;
    if (sectionLabels[section]) {
      const h = document.createElement('h2');
      h.textContent = sectionLabels[section];
      nav.appendChild(h);
    }
    for (const path of items) {
      const a = document.createElement('a');
      a.href = '#' + path;
      a.textContent = prettyName(path);
      a.dataset.path = path;
      a.onclick = (e) => { e.preventDefault(); show(path); };
      nav.appendChild(a);
    }
  }
}

function prettyName(path) {
  const file = path.split('/').pop().replace(/\.md$/, '');
  if (path === 'README.md') return 'Home';
  if (file === 'README') return 'Overview';
  return file.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function show(path) {
  const md = DOCS[path];
  if (!md) { document.getElementById('rendered').innerHTML = '<p>Not found.</p>'; return; }
  document.getElementById('topbar').textContent = path;
  let html = marked.parse(md);
  // rewrite relative .md links to in-page hash links
  html = html.replace(/href="([^"]+\.md(?:#[^"]*)?)"/g, (m, href) => {
    if (/^https?:/.test(href)) return m;
    const [hrefPath, anchor] = href.split('#');
    const base = path.split('/').slice(0, -1);
    const target = resolvePath(base, hrefPath);
    if (DOCS[target] !== undefined) {
      return `href="#${target}" data-internal="${target}"${anchor ? ' data-anchor="' + anchor + '"' : ''}`;
    }
    return m;
  });
  document.getElementById('rendered').innerHTML = html;
  document.querySelectorAll('a[data-internal]').forEach(a => {
    a.onclick = (e) => { e.preventDefault(); show(a.dataset.internal); };
  });
  document.querySelectorAll('#sidebar a').forEach(a => a.classList.toggle('active', a.dataset.path === path));
  document.querySelectorAll('#rendered pre code').forEach(b => hljs.highlightElement(b));
  window.scrollTo(0, 0);
  document.getElementById('content').scrollTo(0, 0);
  history.replaceState(null, '', '#' + path);
}

function resolvePath(baseParts, href) {
  const parts = [...baseParts];
  for (const seg of href.split('/')) {
    if (seg === '..') parts.pop();
    else if (seg !== '.' && seg !== '') parts.push(seg);
  }
  return parts.join('/');
}

document.getElementById('search').addEventListener('input', (e) => buildNav(e.target.value));

// Theme toggle
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('hljs-light').disabled = (t === 'dark');
  document.getElementById('hljs-dark').disabled = (t !== 'dark');
  document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀' : '◐';
  try { localStorage.setItem('ep-docs-theme', t); } catch (e) {}
}
const savedTheme = (() => {
  try { return localStorage.getItem('ep-docs-theme'); } catch (e) { return null; }
})() || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(savedTheme);
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

buildNav('');
const initial = location.hash ? location.hash.slice(1) : (DOCS['README.md'] ? 'README.md' : ORDER[0]);
show(initial);
</script>
