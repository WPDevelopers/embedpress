<!DOCTYPE html>
<html>

<head>
  <title>Debugging</title>
  <meta charset="utf-8" />
</head>

<body>
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
    }

    .viewer-container {
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .fullscreen {
      background-color: #333;
    }
  </style>

  <div class="viewer-container" id="viewer-container"></div>

  <script src="../../../../../wp-includes/js/jquery/jquery.js"></script>
  <script src="js/html2canvas.min.js"></script>
  <script src="js/three.min.js"></script>
  <script src="js/pdf.min.js"></script>

  <!-- Watermark: intercept WebGL texImage2D to stamp watermark on PDF page
       canvases just before Three.js uploads them as GPU textures -->
  <script>
  (function() {
    window._epWmConfig = null;

    var hexToRgba = function(hex, alpha) {
      if (!hex || hex === 'transparent') {
        return 'rgba(0, 0, 0, ' + alpha + ')';
      }
      // Support 3 and 6 character hex
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) {
        hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
      }
      if (!/^[0-9A-Fa-f]{6}$/.test(hex)) {
        return 'rgba(0, 0, 0, ' + alpha + ')';
      }
      var r = parseInt(hex.slice(0, 2), 16);
      var g = parseInt(hex.slice(2, 4), 16);
      var b = parseInt(hex.slice(4, 6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    };

    var drawWm = function(canvas) {
      var wm = window._epWmConfig;
      if (!wm || !wm.text || !canvas) return;
      var ctx = canvas.getContext('2d');
      if (!ctx) return;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = hexToRgba(wm.color, wm.opacity);
      ctx.font = 'bold ' + wm.fontSize + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (wm.style === 'tiled') {
        var tw = ctx.measureText(wm.text).width;
        var stepX = tw + 80;
        var stepY = wm.fontSize * 3;
        var diag = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-Math.PI / 6);
        for (var y = -diag; y < diag; y += stepY) {
          for (var x = -diag; x < diag; x += stepX) {
            ctx.fillText(wm.text, x, y);
          }
        }
      } else {
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-Math.atan2(canvas.height, canvas.width));
        var tw2 = ctx.measureText(wm.text).width;
        var maxW = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height) * 0.8;
        if (tw2 > maxW) {
          ctx.font = 'bold ' + Math.floor(wm.fontSize * (maxW / tw2)) + 'px sans-serif';
        }
        ctx.fillText(wm.text, 0, 0);
      }
      ctx.restore();
    };

    // Intercept WebGL texImage2D — Three.js calls this to upload canvas content
    // as a GPU texture. Draw watermark on the canvas just before upload.
    // This bypasses all pdfjsLib patching issues (non-configurable getters).
    var patchTexImage2D = function(proto) {
      if (!proto || !proto.texImage2D) return;
      var orig = proto.texImage2D;
      proto.texImage2D = function() {
        var lastArg = arguments[arguments.length - 1];
        if (lastArg instanceof HTMLCanvasElement && window._epWmConfig && lastArg.width >= 300 && lastArg.height >= 300) {
          drawWm(lastArg);
        }
        return orig.apply(this, arguments);
      };
    };

    var patchTexSubImage2D = function(proto) {
      if (!proto || !proto.texSubImage2D) return;
      var orig = proto.texSubImage2D;
      proto.texSubImage2D = function() {
        var lastArg = arguments[arguments.length - 1];
        if (lastArg instanceof HTMLCanvasElement && window._epWmConfig && lastArg.width >= 300 && lastArg.height >= 300) {
          drawWm(lastArg);
        }
        return orig.apply(this, arguments);
      };
    };

    if (typeof WebGLRenderingContext !== 'undefined') {
      patchTexImage2D(WebGLRenderingContext.prototype);
      patchTexSubImage2D(WebGLRenderingContext.prototype);
    }
    if (typeof WebGL2RenderingContext !== 'undefined') {
      patchTexImage2D(WebGL2RenderingContext.prototype);
      patchTexSubImage2D(WebGL2RenderingContext.prototype);
    }
  })();
  </script>

  <script src="js/3dflipbook.min.js"></script>

  <script type="text/javascript">
    var template = {
      html: "templates/book-view.html",
      links: [],
      styles: ["css/ep-black-book-view.css"],
      script: "js/default-book-view.js",
      sounds: {
        startFlip: "sounds/start-flip.mp3",
        endFlip: "sounds/end-flip.mp3",
      },
    };
  </script>

  <script>
    // Ensure the script runs after the page has fully loaded

    // Function to extract the file URL from the query parameters
    function extractFileParamData(src, $param) {
      // Parse the URL
      var url = new URL(src);
      // Extract the 'file' parameter from the query string
      var fileUrl = url.searchParams.get($param);
      return fileUrl;
    }

    var parentIframeSrc;

    var params = {};

    window.onload = function () {
      // Access the parent window
      var parentWindow = window.parent;

      // Get the iframes within the parent window
      var iframes = parentWindow.document.getElementsByTagName("iframe");

      for (var i = 0; i < iframes.length; i++) {
        if (iframes[i].contentWindow === window) {
          // Get the src attribute of the iframe
          parentIframeSrc = iframes[i].src;

          // The encoded string you want to decode
          const encodedString = extractFileParamData(parentIframeSrc, "key");

          // Step 1: Base64 Decode
          const decodedString = atob(encodedString);

          // Step 1: Create URLSearchParams object
          const urlParams = new URLSearchParams(decodedString);

          // Step 2: Convert URLSearchParams to Object
          const paramsObject = {};
          for (const [key, value] of urlParams.entries()) {
            params[key] =
              value == "yes" || value == "true"
                ? true
                : value == "no"
                  ? false
                  : value;
          }

          // Apply sound setting to template
          if (params.sound === false || params.sound === "false") {
            template.sounds = {};
          }

          // Determine the page number to open at
          var epPageNumber = null;
          try {
            var topUrl = new URL(window.top.location.href);
            var urlPage = topUrl.searchParams.get('eppage');
            if (urlPage && parseInt(urlPage, 10) > 0) {
              epPageNumber = parseInt(urlPage, 10);
            }
          } catch (e) {
            // Cross-origin access may fail, ignore
          }
          if (!epPageNumber && params.pageNumber && parseInt(params.pageNumber, 10) > 1) {
            epPageNumber = parseInt(params.pageNumber, 10);
          }

          // Set watermark config (the pdfjsLib patch was applied before 3dflipbook loaded)
          if (params.watermark_text) {
            window._epWmConfig = {
              text: params.watermark_text,
              fontSize: parseInt(params.watermark_font_size, 10) || 48,
              color: (function() { var c = params.watermark_color; if (c && c.charAt(0) !== '#') c = '#' + c; return c || '#000000'; })(),
              opacity: (parseInt(params.watermark_opacity, 10) || 15) / 100,
              style: params.watermark_style || 'center'
            };
          }

          // Build FlipBook options
          var flipBookOptions = {
            pdf: extractFileParamData(parentIframeSrc, "file"),
            template: template,
          };

          // Set initial page via autoNavigation option
          if (epPageNumber && epPageNumber > 1) {
            flipBookOptions.autoNavigation = {
              pageN: epPageNumber,
            };
          }

          // Initialize FlipBook
          jQuery("#viewer-container").FlipBook(flipBookOptions);


          const newSettings = decodedString;

          let oldData = localStorage.getItem("flipbook_settings");
          let settingsArray;

          try {
            settingsArray = oldData ? JSON.parse(oldData) : [];
            if (!Array.isArray(settingsArray)) {
              settingsArray = [];
            }
          } catch (e) {
            settingsArray = [];
          }

          settingsArray.push(newSettings);

          let newData = JSON.stringify(settingsArray);
          localStorage.setItem("flipbook_settings", newData);

          let updatedData = localStorage.getItem("flipbook_settings");


          break; // Exit the loop once the matching iframe is found and processed
        }
      }
    };
  </script>
</body>

</html>
