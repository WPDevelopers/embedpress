<!DOCTYPE html>
<html>

<head>
  <title>Debugging</title>
  <meta charset="utf-8" />
</head>

<body>
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
    }

    .viewer-container {
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .fullscreen {
      background-color: #333;
    }
  </style>

  <div class="viewer-container" id="viewer-container"></div>

  <script src="../../../../../wp-includes/js/jquery/jquery.js"></script>
  <script src="js/html2canvas.min.js"></script>
  <script src="js/three.min.js"></script>
  <script src="js/pdf.min.js"></script>
  <script src="js/3dflipbook.min.js"></script>

  <script type="text/javascript">
    var template = {
      html: "templates/book-view.html",
      links: [],
      styles: ["css/ep-black-book-view.css"],
      script: "js/default-book-view.js",
      sounds: {
        startFlip: "sounds/start-flip.mp3",
        endFlip: "sounds/end-flip.mp3",
      },
    };
  </script>

  <script>
    // Ensure the script runs after the page has fully loaded

    // Function to extract the file URL from the query parameters
    function extractFileParamData(src, $param) {
      // Parse the URL
      var url = new URL(src);
      // Extract the 'file' parameter from the query string
      var fileUrl = url.searchParams.get($param);
      return fileUrl;
    }

    var parentIframeSrc;

    var params = {};

    window.onload = function () {
      // Access the parent window
      var parentWindow = window.parent;

      // Get the iframes within the parent window
      var iframes = parentWindow.document.getElementsByTagName("iframe");

      for (var i = 0; i < iframes.length; i++) {
        if (iframes[i].contentWindow === window) {
          // Get the src attribute of the iframe
          parentIframeSrc = iframes[i].src;

          // The encoded string you want to decode
          const encodedString = extractFileParamData(parentIframeSrc, "key");

          // Step 1: Base64 Decode
          const decodedString = atob(encodedString);

          // Step 1: Create URLSearchParams object
          const urlParams = new URLSearchParams(decodedString);

          // Step 2: Convert URLSearchParams to Object
          const paramsObject = {};
          for (const [key, value] of urlParams.entries()) {
            params[key] =
              value == "yes" || value == "true"
                ? true
                : value == "no"
                  ? false
                  : value;
          }

          // Apply sound setting to template
          if (params.sound === false || params.sound === "false") {
            template.sounds = {};
          }

          // ── Watermark: patch pdfjsLib to draw on each page canvas ──
          if (params.watermark_text && window.pdfjsLib) {
            var _wmData = {
              text: params.watermark_text,
              fontSize: parseInt(params.watermark_font_size, 10) || 48,
              color: params.watermark_color || '#000000',
              opacity: (parseInt(params.watermark_opacity, 10) || 15) / 100,
              style: params.watermark_style || 'center'
            };

            var _epHexToRgba = function(hex, alpha) {
              var r = parseInt(hex.slice(1, 3), 16);
              var g = parseInt(hex.slice(3, 5), 16);
              var b = parseInt(hex.slice(5, 7), 16);
              return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
            };

            var _drawWm = function(canvas) {
              if (!canvas || !canvas.getContext) return;
              var ctx = canvas.getContext('2d');
              if (!ctx) return;
              ctx.save();
              ctx.fillStyle = _epHexToRgba(_wmData.color, _wmData.opacity);
              ctx.font = 'bold ' + _wmData.fontSize + 'px sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';

              if (_wmData.style === 'tiled') {
                var tw = ctx.measureText(_wmData.text).width;
                var stepX = tw + 80;
                var stepY = _wmData.fontSize * 3;
                var diag = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(-Math.PI / 6);
                for (var y = -diag; y < diag; y += stepY) {
                  for (var x = -diag; x < diag; x += stepX) {
                    ctx.fillText(_wmData.text, x, y);
                  }
                }
              } else {
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(-Math.atan2(canvas.height, canvas.width));
                var tw2 = ctx.measureText(_wmData.text).width;
                var maxW = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height) * 0.8;
                if (tw2 > maxW) {
                  ctx.font = 'bold ' + Math.floor(_wmData.fontSize * (maxW / tw2)) + 'px sans-serif';
                }
                ctx.fillText(_wmData.text, 0, 0);
              }
              ctx.restore();
            };

            // Patch pdfjsLib.getDocument to intercept page.render()
            // NOTE: renderTask.promise and loadingTask.promise are getters (read-only)
            // so we must NOT try to replace them — only chain .then() for side effects.
            // .then() callbacks run in registration order, so registering watermark FIRST
            // ensures it draws BEFORE the library creates textures from the canvas.
            var _origGetDoc = pdfjsLib.getDocument.bind(pdfjsLib);
            pdfjsLib.getDocument = function() {
              var loadingTask = _origGetDoc.apply(this, arguments);
              // Chain onto promise to patch pdfDoc (runs before library's .then)
              loadingTask.promise.then(function(pdfDoc) {
                var origGetPage = pdfDoc.getPage.bind(pdfDoc);
                pdfDoc.getPage = function() {
                  return origGetPage.apply(this, arguments).then(function(page) {
                    var origRender = page.render.bind(page);
                    page.render = function(renderParams) {
                      var renderTask = origRender(renderParams);
                      // Chain watermark draw — registered BEFORE library's .then
                      renderTask.promise.then(function() {
                        if (renderParams.canvasContext && renderParams.canvasContext.canvas) {
                          _drawWm(renderParams.canvasContext.canvas);
                        }
                      });
                      return renderTask;
                    };
                    return page;
                  });
                };
              });
              return loadingTask;
            };
          }

          // Book 1 {
          jQuery("#viewer-container").FlipBook({
            pdf: extractFileParamData(parentIframeSrc, "file"),
            template: template,
          });


          const newSettings = decodedString;

          let oldData = localStorage.getItem("flipbook_settings");
          let settingsArray;

          try {
            settingsArray = oldData ? JSON.parse(oldData) : [];
            if (!Array.isArray(settingsArray)) {
              settingsArray = [];
            }
          } catch (e) {
            settingsArray = [];
          }

          settingsArray.push(newSettings);

          let newData = JSON.stringify(settingsArray);
          localStorage.setItem("flipbook_settings", newData);

          let updatedData = localStorage.getItem("flipbook_settings");


          break; // Exit the loop once the matching iframe is found and processed
        }
      }
    };
  </script>
</body>

</html>
